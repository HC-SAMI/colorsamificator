            if (hI !== hIndex) return false;
            return colIdx === 0 ? (lI < 11) : (lI >= 11);
        });
    };

    const swapNoun = (rowIdx, colIdx, dir) => {
        setNounData(prev => {
            const next = [...prev];
            if (rowIdx < 0 || rowIdx >= next.length) return prev;
            if (isNounLockedAt(rowIdx, colIdx)) return prev;

            const getParts = (r) => {
                const parts = (next[r] || '').split(',');
                while (parts.length < 2) parts.push('');
                return parts;
            };

            if (dir === 'left' || dir === 'right') {
                const otherCol = colIdx === 0 ? 1 : 0;
                if (isNounLockedAt(rowIdx, otherCol)) return prev;
                const parts = getParts(rowIdx);
                const tmp = parts[colIdx];
                parts[colIdx] = parts[otherCol];
                parts[otherCol] = tmp;
                next[rowIdx] = parts[0] + ',' + parts[1];
                return next;
            }

            const step = dir === 'up' ? -1 : (dir === 'down' ? 1 : 0);
            if (!step) return prev;

            let t = rowIdx + step;
            while (t >= 0 && t < next.length && isNounLockedAt(t, colIdx)) t += step;
            if (t < 0 || t >= next.length) return prev;
            if (isNounLockedAt(t, colIdx)) return prev;

            const a = getParts(rowIdx);
            const b = getParts(t);
            const tmp = a[colIdx];
            a[colIdx] = b[colIdx];
            b[colIdx] = tmp;
            next[rowIdx] = a[0] + ',' + a[1];
            next[t] = b[0] + ',' + b[1];
            return next;
        });
    };

    // Adjective locking in this build is evaluated by L and C only (hue ignored), matching the existing isLocked logic.
    const isAdjLockedLC = (lIdx, cIdx) => {
        return lockedCells.some(k => {
            const p = (k || '').split('_');
            return (p[1] == lIdx && p[3] == cIdx);
        });
    };

    const swapAdjective = (l1, c1, l2, c2) => {
        setAdjectiveMatrix(prev => {
            const next = prev.map(r => [...r]);
            if (!next[l1] || !next[l2]) return prev;
            const tmp = next[l1][c1];
            next[l1][c1] = next[l2][c2];
            next[l2][c2] = tmp;
            return next;
        });
    };
const updateMajorGroup = (rIdx, cIdx, val) => {
        setMajorGroups(prev => {
            const next = [...prev];
            if (!next[rIdx]) next[rIdx] = [];
            next[rIdx] = [...next[rIdx]];
            next[rIdx][cIdx] = val;
            return next;
        });
    };

    const updateNote = (key, text) => {
        setNotes(prev => ({...prev, [key]: text}));
    };
    
    const hIdx = getIndexFromHue(h, hueValues);
    const lIdx = getRangeIndex(l, lightRanges); 
    const cIdx = getRangeIndex(c, chromaRanges); 
    const getNounColumnIndex = (lIdx) => lIdx < 11 ? 0 : 1; 

    const currentMapping = useMemo(() => { 
        const rowLIdx = getRangeIndex(l, lightRanges);
        const rowCIdx = getRangeIndex(c, chromaRanges);
        const sIdx = getNounColumnIndex(rowLIdx);
        
        const isSingularity = rowLIdx === 0 || rowLIdx === 21 || rowCIdx === 0;
        const evalL = lightRanges[rowLIdx]?.mid ?? l;
        const evalC = isSingularity ? 0 : chromaRanges[rowCIdx]?.mid ?? c;

        let bNoun = parsedNouns[hIdx]?.[sIdx] || "Hue"; 
        if (evalC === 0) {
            if (evalL >= 90) bNoun = "Blanche";
            else if (evalL < 20) bNoun = "Nero";
            else bNoun = "Cinza";
        }
        
        let adj = adjectiveMatrix[rowLIdx]?.[rowCIdx] || ""; 
        if (bNoun && adj && bNoun.toLowerCase() === adj.toLowerCase()) adj = ""; 
        
        let code;
        if (isSingularity) {
            if (rowLIdx === 0) code = 'AA000';
            else if (rowLIdx === 21) code = 'VA000';
            else code = `${lightRanges[rowLIdx]?.label || 'A'}A000`;
        } else {
            code = `${lightRanges[rowLIdx]?.label || '?'}${chromaRanges[rowCIdx]?.label || '?'}${Math.round(h).toString().padStart(3,'0')}`;
        }

        return { baseNoun: bNoun, adj, code }; 
    }, [l, c, h, adjectiveMatrix, parsedNouns, hIdx, lightRanges, chromaRanges]);

    const isCurrentAdjDupe = duplicates.adjs.has(normalizeText(currentMapping.adj));
    const isCurrentNounDupe = duplicates.nouns.has(normalizeText(currentMapping.baseNoun));

    const safeLIdx = getRangeIndex(l, lightRanges);
    const safeCIdx = getRangeIndex(c, chromaRanges);
    
    const currentCellKey = `l_${safeLIdx}_c_${safeCIdx}_h_${hIdx}`;
    const isCurrentExplicitlyLocked = lockedCells.includes(currentCellKey);

    const isAdjLocked = useMemo(() => {
        return lockedCells.some(k => {
            const parts = k.split('_');
            return parseInt(parts[1]) === safeLIdx && parseInt(parts[3]) === safeCIdx;
        });
    }, [lockedCells, safeLIdx, safeCIdx]);

    const isNounLocked = useMemo(() => {
        const currentLightBand = safeLIdx < 11 ? 0 : 1;
        return lockedCells.some(k => {
            const parts = k.split('_');
            const locL = parseInt(parts[1]);
            const locC = parseInt(parts[3]);
            const locH = parseInt(parts[5]);
            
            const cVal = chromaRanges[locC]?.mid ?? 0;
            if (locL === 0 || locL === 21 || cVal === 0) return false;
            
            const locLightBand = locL < 11 ? 0 : 1;
            return locH === hIdx && locLightBand === currentLightBand;
        });
    }, [lockedCells, safeLIdx, hIdx, chromaRanges]);

    const isCurrentlyNeutral = useMemo(() => {
        const rowLIdx = getRangeIndex(l, lightRanges);
        const rowCIdx = getRangeIndex(c, chromaRanges);
        const isSingularity = rowLIdx === 0 || rowLIdx === 21 || rowCIdx === 0;
        const evalC = isSingularity ? 0 : chromaRanges[rowCIdx]?.mid ?? c;
        return evalC === 0;
    }, [l, c, lightRanges, chromaRanges]);

    const handleAdjChange = (val) => {
        if (isAdjLocked) return;
        const rL = getRangeIndex(l, lightRanges);
        const rC = getRangeIndex(c, chromaRanges);
        if (rL === 0 || rL === 21) return;
        updateAdjective(rL, rC, val.trim());
    };

    const handleNounChange = (val) => {
        if (isNounLocked) return;
        const rL = getRangeIndex(l, lightRanges);
        const rC = getRangeIndex(c, chromaRanges);
        if (rL === 0 || rL === 21 || c === 0) return;
        const sIdx = getNounColumnIndex(rL);
        updateNoun(hIdx, sIdx, val.trim());
    };

    useEffect(() => {
        let warning = null;
        if (duplicates.nouns.size > 0) warning = `Duplicate Words Found: ${[...duplicates.nouns].slice(0, 3).join(', ')}`;
        else if (duplicates.mgs.size > 0) warning = `Duplicate Major Groups Found: ${[...duplicates.mgs].slice(0, 3).join(', ')}`;
        setNameWarning(warning);
    }, [duplicates]);

    const searchResults = useMemo(() => {
        if (!searchQuery || searchQuery.trim().length < 2) return [];
        const q = searchQuery.trim().toLowerCase();
        const tokens = q.split(/\s+/);
        
        const matchesAll = (str) => {
            const s = str.toLowerCase();
            return tokens.every(t => s.includes(t));
        };
        
        const results = [];

        Object.entries(notes).forEach(([key, note]) => {
            if (matchesAll(note)) {
                const parts = key.split('_');
                const cLIdx = parseInt(parts[1]);
                const cCIdx = parseInt(parts[3]);
                const cHIdx = parseInt(parts[5]);
                const lVal = lightRanges[cLIdx]?.mid ?? 50;
                const cVal = chromaRanges[cCIdx]?.mid ?? 0;
                const hVal = hueValues[cHIdx] ?? 0;
                results.push({
                    id: `note_${key}`,
                    type: 'Note',
                    label: note.substring(0, 40) + (note.length > 40 ? '...' : ''),
                    sub: `L${Math.round(lVal)} C${Math.round(cVal)} H${Math.round(hVal)}`,
                    action: () => updateColorWithHistory(lVal, cVal, hVal)
                });
            }
        });

        const neutralNouns = [
            { noun: "Blanche", lVal: 95, cVal: 0 },
            { noun: "Nero", lVal: 10, cVal: 0 },
            { noun: "Cinza", lVal: 50, cVal: 0 }
        ];
        neutralNouns.forEach(({noun, lVal, cVal}) => {
             if (matchesAll(noun)) {
                 results.push({
                     id: `noun_neutral_${noun}`,
                     type: 'Noun',
                     label: noun,
                     sub: `Neutral Core (${noun})`,
                     action: () => updateColorWithHistory(lVal, cVal, h) 
                 });
             }
        });

        parsedNouns.forEach((row, hi) => {
            row.forEach((noun, sIdx) => {
                if (noun && noun !== "Hue" && matchesAll(noun)) {
                    const hVal = hueValues[hi];
                    const lVal = sIdx === 0 ? 40 : 75; 
                    results.push({
                        id: `noun_${hi}_${sIdx}`,
                        type: 'Noun',
                        label: noun,
                        sub: `H${hVal}° (${sIdx === 0 ? 'Shades' : 'Tints'})`,
                        action: () => updateColorWithHistory(lVal, c, hVal) 
                    });
                }
            });
        });

        adjectiveMatrix.forEach((row, li) => {
            if(!row) return;
            row.forEach((adj, ci) => {
                if (adj && matchesAll(adj)) {
                    const lVal = lightRanges[li]?.mid ?? 50;
                    const cVal = chromaRanges[ci]?.mid ?? 0;
                    results.push({
                        id: `adj_${li}_${ci}`,
                        type: 'Adjective',
                        label: adj,
                        sub: `L${Math.round(lVal)} C${Math.round(cVal)}`,
                        action: () => updateColorWithHistory(lVal, cVal, h) 
                    });
                }
            });
        });

        Object.entries(extremeGroups).forEach(([k, v]) => {
             if (matchesAll(v)) {
                 let lL = 50, cC = 0, hH = h;
                 if(k === 'white') lL = 98;
                 if(k === 'black') lL = 2;
                 if(k === 'lightGray') lL = 82;
                 if(k === 'mediumGray') lL = 55;
                 if(k === 'darkGray') lL = 25;
                 results.push({
                     id: `mg_ext_${k}`,
                     type: 'Group',
                     label: v,
                     sub: `Neutral ${k}`,
                     action: () => updateColorWithHistory(lL, cC, hH)
                 });
             }
        });

        majorGroups.forEach((row, ri) => {
            if(!row) return;
            row.forEach((mg, ci) => {
                if (mg && matchesAll(mg)) {
                    const hGroupMid = (ri * 30);
                    let lL = ci < 2 ? 30 : 80;
                    let cC = (ci % 2 === 0) ? 20 : 90; 
                    results.push({
                        id: `mg_${ri}_${ci}`,
                        type: 'Group',
                        label: mg,
                        sub: `H${hGroupMid}° Sector`,
                        action: () => updateColorWithHistory(lL, cC, hGroupMid)
                    });
                }
            });
        });

        if (tokens.length > 1) {
            let comboCount = 0;
            for (let li = 0; li < adjectiveMatrix.length; li++) {
                if (!adjectiveMatrix[li]) continue;
                const lVal = lightRanges[li]?.mid ?? 50;
                const sIdx = li < 11 ? 0 : 1; 
                
                for (let ci = 0; ci < adjectiveMatrix[li].length; ci++) {
                    const adj = adjectiveMatrix[li][ci];
                    if (!adj) continue;
                    const cVal = chromaRanges[ci]?.mid ?? 0;
                    
                    if (cVal === 0) {
                        let bNoun = "Cinza";
                        if (lVal >= 90) bNoun = "Blanche";
                        else if (lVal < 20) bNoun = "Nero";

                        const fullName = `${adj} ${bNoun}`;
                        if (matchesAll(fullName)) {
                            results.push({
                                id: `combo_${li}_${ci}_neutral`,
                                type: 'Color',
                                label: fullName,
                                sub: `L${Math.round(lVal)} C${Math.round(cVal)} Neutral`,
                                action: () => updateColorWithHistory(lVal, cVal, h)
                            });
                            comboCount++;
                        }
                    } else {
                        for (let hi = 0; hi < parsedNouns.length; hi++) {
                            const noun = parsedNouns[hi][sIdx];
                            if (!noun || noun === "Hue") continue;
                            
                            const hVal = hueValues[hi];
                            const fullName = `${adj} ${noun}`;
                            if (matchesAll(fullName)) {
                                results.push({
                                    id: `combo_${li}_${ci}_${hi}`,
                                    type: 'Color',
                                    label: fullName,
                                    sub: `L${Math.round(lVal)} C${Math.round(cVal)} H${Math.round(hVal)}`,
                                    action: () => updateColorWithHistory(lVal, cVal, hVal)
                                });
                                comboCount++;
                                if (comboCount > 20) break;
                            }
                        }
                    }
                    if (comboCount > 20) break;
                }
                if (comboCount > 20) break;
            }
        }

        return results.slice(0, 20); 
    }, [searchQuery, notes, parsedNouns, adjectiveMatrix, majorGroups, extremeGroups, lightRanges, chromaRanges, hueValues, c, h, updateColorWithHistory]);

    const exactGamut = useMemo(() => checkGamut(l, c, h), [l, c, h]);
    const isExactOut = displayGamut === 'p3' ? !exactGamut.isP3 : !exactGamut.isSRGB;
    const exactBgColor = getMappedCssColor(l, c, h, displayGamut);
    
    const swatchStyle = useMemo(() => ({ 
        backgroundColor: exactBgColor
    }), [exactBgColor]);

    const deltaE = useMemo(() => {
        let canonicalL = lightRanges[safeLIdx]?.mid ?? 50;
        let canonicalC = chromaRanges[safeCIdx]?.mid ?? 0;
        if (safeLIdx === 0 || safeLIdx === 21 || safeCIdx === 0) canonicalC = 0;
        return Math.sqrt(Math.pow(canonicalL - l, 2) + Math.pow(canonicalC - c, 2)).toFixed(1);
    }, [safeLIdx, safeCIdx, lightRanges, chromaRanges, l, c]); 

    const activeMajorHueIdx = Math.floor(((h + 15) % 360) / 30);
    const activeMajorQuadIdx = l < 63 ? (c < 40 ? 0 : 1) : (c >= 40 ? 2 : 3);

    const isWhiteActive = l >= 90 && c <= 5;
    const isLightGrayActive = c <= 5 && l >= 70 && l < 90;
    const isMediumGrayActive = c <= 5 && l >= 45 && l < 70;
    const isDarkGrayActive = c <= 5 && l >= 20 && l < 45;
    const isBlackActive = l < 20 && c <= 5;

    const majorGroup = useMemo(() => {
        if (c <= 5) {
            if (l >= 90) return extremeGroups.white;
            if (l >= 70) return extremeGroups.lightGray;
            if (l >= 45) return extremeGroups.mediumGray;
            if (l >= 20) return extremeGroups.darkGray;
            return extremeGroups.black;
        }
        return majorGroups[activeMajorHueIdx][activeMajorQuadIdx];
    }, [l, c, activeMajorHueIdx, activeMajorQuadIdx, majorGroups, extremeGroups]);

    const lockedList = useMemo(() => {
        return lockedCells.map(key => {
            const parts = key.split('_');
            const cLIdx = parseInt(parts[1]);
            const cCIdx = parseInt(parts[3]);
            const cHIdx = parseInt(parts[5]);
            
            const lVal = lightRanges[cLIdx]?.mid ?? 50;
            const cVal = chromaRanges[cCIdx]?.mid ?? 0;
            const hVal = hueValues[cHIdx] ?? 0;

            const sIdx = cLIdx < 11 ? 0 : 1;
            let noun = parsedNouns[cHIdx]?.[sIdx] || "Hue";
            if (cVal === 0) {
                if (lVal >= 90) noun = "Blanche";
                else if (lVal < 20) noun = "Nero";
                else noun = "Cinza";
            }
            let adj = adjectiveMatrix[cLIdx]?.[cCIdx] || "";
            if (noun && adj && noun.toLowerCase() === adj.toLowerCase()) adj = "";

            const gamutStatus = checkGamut(lVal, cVal, hVal);
            const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
            const color = getMappedCssColor(lVal, cVal, hVal, displayGamut);
            
            const note = notes[key] || "";

            // --- ADD: compute the parametric Color Code (matches swatch code rules) ---
            const isSingularity =
                (cLIdx === 0) || (cLIdx === 21) || (cCIdx === 0) || (cVal === 0);

            let code = '';
            if (isSingularity) {
                if (cLIdx === 0) code = 'AA000';
                else if (cLIdx === 21) code = 'VA000';
                else code = `${lightRanges[cLIdx]?.label || 'A'}A000`;
            } else {
                code = `${lightRanges[cLIdx]?.label || '?'}${chromaRanges[cCIdx]?.label || '?'}${Math.round(hVal).toString().padStart(3,'0')}`;
            }


            return { key, code, lVal, cVal, hVal, noun, adj, color, isOut, note };
        });
    }, [lockedCells, lightRanges, chromaRanges, hueValues, parsedNouns, adjectiveMatrix, displayGamut, notes]);

    const sortedLockedList = useMemo(() => {
        let sortableItems = [...lockedList];
        if (sortConfig && sortConfig.key) {
            sortableItems.sort((a, b) => {
                let aVal = a[sortConfig.key];
                let bVal = b[sortConfig.key];
                if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                if (typeof bVal === 'string') bVal = bVal.toLowerCase();

                if (aVal < bVal) return sortConfig.direction === 'ascending' ? -1 : 1;
                if (aVal > bVal) return sortConfig.direction === 'ascending' ? 1 : -1;
                return 0;
            });
        }
        return sortableItems;
    }, [lockedList, sortConfig]);

    const requestSort = (key) => {
        let direction = 'ascending';
        if (sortConfig && sortConfig.key === key && sortConfig.direction === 'ascending') {
            direction = 'descending';
        }
        setSortConfig({ key, direction });
    };

    const lightRangeData = useMemo(() => lightRanges.map((r, i) => ({ label: r.label, index: i, isActive: i === safeLIdx, data: r })), [safeLIdx, lightRanges]);
    const chromaRangeData = useMemo(() => chromaRanges.map((r, i) => ({ label: r.label, index: i, isActive: i === safeCIdx, data: r })), [safeCIdx, chromaRanges]);
    const hueRangesData = useMemo(() => hueValues.map((val, i) => {
        const nextVal = hueValues[i+1] !== undefined ? hueValues[i+1] : 360;
        const maxVal = nextVal - (nextVal > val ? 1 : 0);
        return { label: `${val}°`, index: i, isActive: i === hIdx, data: { min: val, max: maxVal > val ? maxVal : val } };
    }), [hIdx, hueValues]);

    let currentXData = [];
    let currentYData = [];
    let currentXLabel = "";
    let currentYLabel = "";
    let currentActiveR = 0;
    let currentActiveC = 0;

    if (activeView === 'hue_pivot') {
        currentXData = isFlipped ? lightRangeData : chromaRangeData;
        currentYData = isFlipped ? chromaRangeData : lightRangeData;
        currentXLabel = isFlipped ? "L" : "C";
        currentYLabel = isFlipped ? "C" : "L";
        currentActiveR = isFlipped ? safeCIdx : safeLIdx;
        currentActiveC = isFlipped ? safeLIdx : safeCIdx;
    } else if (activeView === 'chroma_pivot') {
        currentXData = isFlipped ? hueRangesData : lightRangeData;
        currentYData = isFlipped ? lightRangeData : hueRangesData;
        currentXLabel = isFlipped ? "H" : "L";
        currentYLabel = isFlipped ? "L" : "H";
        currentActiveR = isFlipped ? safeLIdx : hIdx;
        currentActiveC = isFlipped ? hIdx : safeLIdx;
    } else if (activeView === 'light_pivot') {
        currentXData = isFlipped ? hueRangesData : chromaRangeData;
        currentYData = isFlipped ? chromaRangeData : hueRangesData;
        currentXLabel = isFlipped ? "H" : "C";
        currentYLabel = isFlipped ? "C" : "H";
        currentActiveR = isFlipped ? safeCIdx : hIdx;
        currentActiveC = isFlipped ? hIdx : safeCIdx;
    }

    const finalXData = flipX ? [...currentXData].reverse() : currentXData;
    const finalYData = flipY ? [...currentYData].reverse() : currentYData;

    const getExplorerParams = useCallback((view, flipped, xIdx, yIdx) => {
        let localLIdx = safeLIdx, localCIdx = safeCIdx, localHIdx = hIdx;
        
        let targetX = xIdx;
        let targetY = yIdx;

        if (view === "hue_pivot") { 
            localCIdx = flipped ? targetY : targetX; 
            localLIdx = flipped ? targetX : targetY; 
        } else if (view === "chroma_pivot") { 
            localLIdx = flipped ? targetY : targetX; 
            localHIdx = flipped ? targetX : targetY; 
        } else if (view === "light_pivot") { 
            localCIdx = flipped ? targetY : targetX; 
            localHIdx = flipped ? targetX : targetY; 
        }
        
        const safeL = lightRanges[localLIdx] || lightRanges[0];
        const safeC = chromaRanges[localCIdx] || chromaRanges[0];
        const safeH = hueValues[localHIdx] ?? 0;
        let cVal = safeC.mid; let hVal = safeH;
        if (localLIdx === 0 || localLIdx === 21 || localCIdx === 0) { cVal = 0; }
        return { lVal: safeL.mid, cVal, hVal, lIdx: localLIdx, cIdx: localCIdx, hIdx: localHIdx };
    }, [safeLIdx, safeCIdx, hIdx, lightRanges, chromaRanges, hueValues]);

    const activeGroupId = useMemo(() => getGroupId(l, c, h), [l, c, h, getGroupId]);

    const groupCenters = useMemo(() => {
        const centers = {};
        if (matrixLOD !== 'macro') return centers;
        const groups = {};
        for (let y = 0; y < finalYData.length; y++) {
            for (let x = 0; x < finalXData.length; x++) {
                const p = getExplorerParams(activeView, isFlipped, x, y);
                if ((p.lIdx === 0 || p.lIdx === 21) && p.cIdx > 0) continue;
                const gId = getGroupId(p.lVal, p.cVal, p.hVal);
                if (!groups[gId]) groups[gId] = { minX: x, maxX: x, minY: y, maxY: y };
                else {
                    groups[gId].minX = Math.min(groups[gId].minX, x);
                    groups[gId].maxX = Math.max(groups[gId].maxX, x);
                    groups[gId].minY = Math.min(groups[gId].minY, y);
                    groups[gId].maxY = Math.max(groups[gId].maxY, y);
                }
            }
        }
        for (const gId in groups) {
            const g = groups[gId];
            const cx = Math.floor((g.minX + g.maxX) / 2);
            const cy = Math.floor((g.minY + g.maxY) / 2);
            centers[`${cy}-${cx}`] = gId;
        }
        return centers;
    }, [matrixLOD, finalXData.length, finalYData.length, activeView, isFlipped, getExplorerParams, getGroupId]);

    const renderCell = useCallback((yIdx, xIdx) => {
        const currentParams = getExplorerParams(activeView, isFlipped, xIdx, yIdx);
        const { lVal, cVal, hVal, lIdx: cellL, cIdx: cellC, hIdx: cellH } = currentParams;
        const gamutStatus = checkGamut(lVal, cVal, hVal);
        const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
        const isActive = cellL === safeLIdx && cellC === safeCIdx && cellH === hIdx;
        
        const anchor = getNounColumnIndex(cellL);
        let noun = parsedNouns[cellH]?.[anchor] || "Hue";
        if (cVal === 0) {
            if (lVal >= 90) noun = "Blanche";
            else if (lVal < 20) noun = "Nero";
            else noun = "Cinza";
        }

        const adj = adjectiveMatrix[cellL]?.[cellC] || "";
        const cellKey = `l_${cellL}_c_${cellC}_h_${cellH}`;
        const isLocked = lockedCells.includes(cellKey);

        let borders = { top: false, bottom: false, left: false, right: false };
        let groupBg = '';
        let groupL = 50;
        let showGroupName = null;
        let isDupe = false;
        const isMacro = matrixLOD === 'macro';
        let isActiveMacro = false;

        let exactDot = null;
        if (isActive && !isMacro) {
            const getBounds = (type) => {
                if (type === 'c') return { val: c, min: chromaRanges[cellC].min, max: chromaRanges[cellC].max };
                if (type === 'l') return { val: l, min: lightRanges[cellL].min, max: lightRanges[cellL].max };
                if (type === 'h') {
                    let minH = hueValues[cellH];
                    let maxH = hueValues[cellH+1] !== undefined ? hueValues[cellH+1] : 360;
                    let v = h;
                    if (minH > maxH) maxH += 360;
                    if (v < minH && (v + 360) < maxH) v += 360;
                    return { val: v, min: minH, max: maxH };
                }
                return { val: 0, min: 0, max: 1 };
            };

            const xTypeStr = currentXLabel.toLowerCase();
            const yTypeStr = currentYLabel.toLowerCase();

            const xB = getBounds(xTypeStr);
            const yB = getBounds(yTypeStr);

            let pctX = xB.max > xB.min ? (xB.val - xB.min) / (xB.max - xB.min) : 0.5;
            let pctY = yB.max > yB.min ? (yB.val - yB.min) / (yB.max - yB.min) : 0.5;

            pctX = Math.max(0, Math.min(1, pctX));
            pctY = Math.max(0, Math.min(1, pctY));

            if (flipX) pctX = 1 - pctX;
            if (flipY) pctY = 1 - pctY;

            exactDot = { x: pctX * 100, y: pctY * 100 };
        }

        if (isMacro && !((cellL === 0 || cellL === 21) && cellC > 0)) {
            const currentGroupId = getGroupId(lVal, cVal, hVal);
            isActiveMacro = currentGroupId === activeGroupId;
            
            if (currentGroupId === 'white') { groupBg = groupBackgrounds.white.bg; groupL = groupBackgrounds.white.l; }
            else if (currentGroupId === 'black') { groupBg = groupBackgrounds.black.bg; groupL = groupBackgrounds.black.l; }
            else if (currentGroupId === 'lightGray') { groupBg = groupBackgrounds.lightGray.bg; groupL = groupBackgrounds.lightGray.l; }
            else if (currentGroupId === 'mediumGray') { groupBg = groupBackgrounds.mediumGray.bg; groupL = groupBackgrounds.mediumGray.l; }
            else if (currentGroupId === 'darkGray') { groupBg = groupBackgrounds.darkGray.bg; groupL = groupBackgrounds.darkGray.l; }
            else {
                const match = currentGroupId.match(/h(\d+)-q(\d+)/);
                if (match) {
                    groupBg = groupBackgrounds.quads[parseInt(match[1])][parseInt(match[2])].bg;
                    groupL = groupBackgrounds.quads[parseInt(match[1])][parseInt(match[2])].l;
                }
            }

            const getGroupAt = (x, y) => {
                if (x < 0 || x >= finalXData.length || y < 0 || y >= finalYData.length) return 'out_of_bounds';
                const p = getExplorerParams(activeView, isFlipped, x, y);
                if ((p.lIdx === 0 || p.lIdx === 21) && p.cIdx > 0) return 'empty';
                return getGroupId(p.lVal, p.cVal, p.hVal);
            };

            const visualUpY = flipY ? yIdx + 1 : yIdx - 1;
            const visualDownY = flipY ? yIdx - 1 : yIdx + 1;
            const visualLeftX = flipX ? xIdx + 1 : xIdx - 1;
            const visualRightX = flipX ? xIdx - 1 : xIdx + 1;

            borders.top = currentGroupId !== getGroupAt(xIdx, visualUpY);
            borders.bottom = currentGroupId !== getGroupAt(xIdx, visualDownY);
            borders.left = currentGroupId !== getGroupAt(visualLeftX, yIdx);
            borders.right = currentGroupId !== getGroupAt(visualRightX, yIdx);

            if (groupCenters[`${yIdx}-${xIdx}`] === currentGroupId) {
                if (currentGroupId === 'white') showGroupName = extremeGroups.white;
                else if (currentGroupId === 'black') showGroupName = extremeGroups.black;
                else if (currentGroupId === 'lightGray') showGroupName = extremeGroups.lightGray;
                else if (currentGroupId === 'mediumGray') showGroupName = extremeGroups.mediumGray;
                else if (currentGroupId === 'darkGray') showGroupName = extremeGroups.darkGray;
                else {
                    const match = currentGroupId.match(/h(\d+)-q(\d+)/);
                    if (match) showGroupName = majorGroups[parseInt(match[1])][parseInt(match[2])];
                }
                isDupe = showGroupName && duplicates.mgs.has(normalizeText(showGroupName));
            }
        } else {
            isDupe = duplicates.adjs.has(normalizeText(adj)) || duplicates.nouns.has(normalizeText(noun));
        }

        return (
            <MatrixCell 
                key={`${yIdx}-${xIdx}`}
                rI={yIdx} cI={xIdx} 
                isActive={isActive} isLocked={isLocked} cellL={cellL} cellC={cellC} 
                lVal={lVal} cVal={cVal} hVal={hVal} 
                noun={noun} adj={adj} displayGamut={displayGamut}
                onClick={handleCellClick}
                isMacro={isMacro} isActiveMacro={isActiveMacro} borders={borders}
                groupBg={groupBg} groupL={groupL}
                showGroupName={showGroupName}
                zoom={gridZoom} isDupe={isDupe}
                exactDot={exactDot}
            />
        );
    }, [activeView, isFlipped, getExplorerParams, safeLIdx, safeCIdx, hIdx, parsedNouns, adjectiveMatrix, displayGamut, handleCellClick, lockedCells, matrixLOD, finalXData.length, finalYData.length, groupBackgrounds, flipX, flipY, groupCenters, extremeGroups, majorGroups, getGroupId, gridZoom, activeGroupId, duplicates, l, c, h, lightRanges, chromaRanges, hueValues, currentXLabel, currentYLabel]);

    const handleRgbConvert = (val) => {
        const hasPercent = val.includes('%');
        const cleanVal = val.replace(/[^0-9., \-]/g, '').trim();
        const parts = cleanVal.includes(',') ? cleanVal.split(',') : cleanVal.split(/\s+/);
        const numParts = parts.map(n => parseFloat(n.trim()));
        
        if (numParts.length === 3 && numParts.every(n => !isNaN(n))) {
            const r = hasPercent ? (numParts[0] / 100) * 255 : numParts[0];
            const g = hasPercent ? (numParts[1] / 100) * 255 : numParts[1];
            const b = hasPercent ? (numParts[2] / 100) * 255 : numParts[2];
            const res = rgbToLchConvert(r, g, b, h);
            updateColorWithHistory(res.l, res.c, res.h);
        }
    };

    const handleHexConvert = (val) => {
        let clean = val.replace(/[^0-9A-F]/gi, '');
        if (clean.length === 3) clean = clean.split('').map(c => c+c).join('');
        if (clean.length !== 6) return null;
        let r = parseInt(clean.substring(0,2), 16);
        let g = parseInt(clean.substring(2,4), 16);
        let b = parseInt(clean.substring(4,6), 16);
        const res = rgbToLchConvert(r, g, b, h);
        if (res) updateColorWithHistory(res.l, res.c, res.h);
    };

    const handleLabConvert = (val) => {
        const parts = val.replace(/[^0-9., \-]/g, '').split(',').map(n => parseFloat(n.trim()));
        if (parts.length === 3 && parts.every(n => !isNaN(n))) {
            const res = labToLchConvert(parts[0], parts[1], parts[2], h);
            updateColorWithHistory(res.l, res.c, res.h);
        }
    };

    const handleExport = () => { 
        const wb = XLSX.utils.book_new(); 
        const rangesData = [["Type", "Label", "Min", "Max", "Mid"], ...lightRanges.map(r => ["Light", r.label, r.min, r.max, r.mid]), ...chromaRanges.map(r => ["Chroma", r.label, r.min, r.max, r.mid])];
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rangesData), "Ranges");
        const adjHeader = ["(L/C)", ...chromaRanges.map(c => c.label)];
        const adjBody = adjectiveMatrix.map((row, i) => [lightRanges[i]?.label || `L${i}`, ...row]);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([adjHeader, ...adjBody]), "Adjectives"); 
        const nounHeader = ["Hue Angle", "Shades (L<63)", "Tints (L≥63)"];
        const nounBody = nounData.map((row, i) => [`${hueValues[i]}°`, ...row.split(',')]);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([nounHeader, ...nounBody]), "Nouns"); 
        
        const mgHeader = ["Hue Range", "Dark Neutral (L<63, C<40)", "Dark Vivid (L<63, C>=40)", "Light Vivid (L>=63, C>=40)", "Light Neutral (L>=63, C<40)"];
        const mgBody = majorGroups.map((row, i) => [HUE_RANGES_MAJOR[i], row[0], row[1], row[2], row[3]]);
        const extremeBody = [
            ["Extremes", "Value"],
            ["White (L>=90, C<=5)", extremeGroups.white],
            ["Light Gray (70<=L<90, C<=5)", extremeGroups.lightGray],
            ["Medium Gray (45<=L<70, C<=5)", extremeGroups.mediumGray],
            ["Dark Gray (20<=L<45, C<=5)", extremeGroups.darkGray],
            ["Black (L<20, C<=5)", extremeGroups.black],
            [],
            mgHeader,
            ...mgBody
        ];
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(extremeBody), "Major Groups");

        const notesHeader = ["Cell Key", "Note Text"];
        const notesBody = Object.entries(notes).map(([k, v]) => [k, v]);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([notesHeader, ...notesBody]), "Notes");

        const sessionBody = [["Current L", l], ["Current C", c], ["Current H", h], ["Active View", activeView], ["Flipped", isFlipped], ["Locked Cells", JSON.stringify(lockedCells)], ["Flip X", flipX], ["Flip Y", flipY], ["Palette JSON", JSON.stringify(palette)]];
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Key", "Value"], ...sessionBody]), "Session");
        
        const now = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        const timestamp = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}-${pad(now.getMinutes())}`;
        XLSX.writeFile(wb, `The ColorSAMIficator v3.9.6.3 ${timestamp}.xlsx`); 
    }; 

    const handleImport = (e) => { 
        const file = e.target.files[0]; if(!file) return; 
        const reader = new FileReader(); 
        reader.onload = (evt) => { 
            const wb = XLSX.read(evt.target.result, { type: 'array' }); 
            
            let tempAdjMatrix = [...adjectiveMatrix];
            let tempNounData = [...nounData];
            let tempMg = [...majorGroups];
            let tempExtremes = { ...extremeGroups };
            let tempNotes = { ...notes };

            const newDiffs = [];
            let diffId = 0;

            const isCoreDupe = (val) => {
                const v = normalizeText(val);
                if (!v || v === 'hue') return false;
                let found = false;
                parsedNouns.forEach(row => row.forEach(n => { if (normalizeText(n) === v) found = true; }));
                adjectiveMatrix.forEach(row => { if (row) row.forEach(a => { if (normalizeText(a) === v) found = true; })});
                return found;
            }
            const isMgDupe = (val) => {
                const v = normalizeText(val);
                if (!v) return false;
                let found = false;
                Object.values(extremeGroups).forEach(mg => { if (normalizeText(mg) === v) found = true; });
                majorGroups.forEach(row => { if (row) row.forEach(mg => { if (normalizeText(mg) === v) found = true; })});
                return found;
            }

            if(wb.Sheets["Ranges"]) {
                const rangeRaw = XLSX.utils.sheet_to_json(wb.Sheets["Ranges"]);
                const newL = rangeRaw.filter(r => r.Type === "Light").map(r => ({ label: r.Label, min: parseInt(r.Min), max: parseInt(r.Max), mid: parseFloat(r.Mid) }));
                const newC = rangeRaw.filter(r => r.Type === "Chroma").map(r => ({ label: r.Label, min: parseInt(r.Min), max: parseInt(r.Max), mid: parseFloat(r.Mid) }));
                if (newL.length > 0) setLightRanges(newL); if (newC.length > 0) setChromaRanges(newC);
            }
            
            if(wb.Sheets["Adjectives"]) { 
                const rawAdj = XLSX.utils.sheet_to_json(wb.Sheets["Adjectives"], {header: 1}); 
                let matrixData = rawAdj.length > 0 && rawAdj[0][0] === "(L/C)" ? rawAdj.slice(1).map(row => row.slice(1)) : rawAdj;
                tempAdjMatrix = matrixData.map(row => row.map(cell => cell || ""));
                
                for (let i = 0; i < 22; i++) {
                    if (!tempAdjMatrix[i]) continue;
                    for (let j = 0; j < 15; j++) {
                        const oldV = adjectiveMatrix[i]?.[j] || "";
                        const newV = tempAdjMatrix[i]?.[j] || "";
                        if (oldV !== newV) {
                            newDiffs.push({ id: diffId++, type: 'Adjective', loc: `L${i} C${j}`, oldVal: oldV, newVal: newV, r: i, c: j, isDupe: isCoreDupe(newV) });
                        }
                    }
                }
            } 
            
            if(wb.Sheets["Nouns"]) { 
                const rawNouns = XLSX.utils.sheet_to_json(wb.Sheets["Nouns"], {header: 1}); 
                if (rawNouns.length > 0) {
                    const startIndex = rawNouns[0][0] === "Hue Angle" ? 1 : 0;
                    const newHues = [];
                    tempNounData = rawNouns.slice(1).map(row => {
                        newHues.push(parseInt(row[0].toString().replace('°','')));
                        return row.slice(startIndex, startIndex + 2).map(n => n || "Hue").join(',');
                    });
                    setHueValues(newHues); 

                    for (let i = 0; i < 120; i++) {
                        const oldParts = (nounData[i] || "Hue,Hue").split(',');
                        const newParts = (tempNounData[i] || "Hue,Hue").split(',');
                        
                        if (oldParts[0] !== newParts[0]) {
                            newDiffs.push({ id: diffId++, type: 'Noun', loc: `${hueValues[i]}° Shade`, oldVal: oldParts[0], newVal: newParts[0], idx: i, col: 0, isDupe: isCoreDupe(newParts[0]) });
                        }
                        if (oldParts[1] !== newParts[1]) {
                            newDiffs.push({ id: diffId++, type: 'Noun', loc: `${hueValues[i]}° Tint`, oldVal: oldParts[1], newVal: newParts[1], idx: i, col: 1, isDupe: isCoreDupe(newParts[1]) });
                        }
                    }
                }
            }

            if(wb.Sheets["Major Groups"]) {
                const rawMG = XLSX.utils.sheet_to_json(wb.Sheets["Major Groups"], {header: 1});
                tempMg = [];
                rawMG.forEach(row => {
                    if(!row[0]) return;
                    const key = row[0].toString();
                    if(key.includes("White")) tempExtremes.white = row[1] || "White";
                    else if(key.includes("Black")) tempExtremes.black = row[1] || "Black";
                    else if(key.includes("Light Gray") || key.includes("Light")) tempExtremes.lightGray = row[1] || "Light Gray";
                    else if(key.includes("Medium Gray") || key.includes("Medium")) tempExtremes.mediumGray = row[1] || "Medium Gray";
                    else if(key.includes("Dark Gray") || key.includes("Dark")) tempExtremes.darkGray = row[1] || "Dark Gray";
                    else if(key.includes("Gray")) tempExtremes.lightGray = row[1] || "Gray";
                    else if(key.includes("°")) {
                        tempMg.push([row[1]||"", row[2]||"", row[3]||"", row[4]||""]);
                    }
                });

                for (let r = 0; r < 12; r++) {
                    for (let c = 0; c < 4; c++) {
                        const oldV = majorGroups[r]?.[c] || "";
                        const newV = tempMg[r]?.[c] || "";
                        if (oldV !== newV) {
                            newDiffs.push({ id: diffId++, type: 'Major Group', loc: `${HUE_RANGES_MAJOR[r]} [${c}]`, oldVal: oldV, newVal: newV, r, c, isDupe: isMgDupe(newV) });
                        }
                    }
                }

                ['white', 'lightGray', 'mediumGray', 'darkGray', 'black'].forEach(k => {
                    const oldV = extremeGroups[k] || "";
                    const newV = tempExtremes[k] || "";
                    if (oldV !== newV) {
                        newDiffs.push({ id: diffId++, type: 'Extreme Group', loc: k, oldVal: oldV, newVal: newV, key: k, isDupe: isMgDupe(newV) });
                    }
                });
            }

            if(wb.Sheets["Notes"]) {
                const rawNotes = XLSX.utils.sheet_to_json(wb.Sheets["Notes"]);
                tempNotes = {};
                rawNotes.forEach(r => {
                    if (r["Cell Key"] && r["Note Text"]) {
                        tempNotes[r["Cell Key"]] = r["Note Text"];
                    }
                });

                const allNoteKeys = new Set([...Object.keys(notes), ...Object.keys(tempNotes)]);
                allNoteKeys.forEach(k => {
                    const oldV = notes[k] || "";
                    const newV = tempNotes[k] || "";
                    if (oldV !== newV) {
                        newDiffs.push({ id: diffId++, type: 'Note', loc: k, oldVal: oldV, newVal: newV, key: k, isDupe: false });
                    }
                });
            }

            if(wb.Sheets["Session"]) {
                const sessionRaw = XLSX.utils.sheet_to_json(wb.Sheets["Session"]);
                const lockedRow = sessionRaw.find(r => r.Key === "Locked Cells");
                if (lockedRow && lockedRow.Value) {
                    try { setLockedCells(JSON.parse(lockedRow.Value)); } catch(e) {}
                }
                const fXRow = sessionRaw.find(r => r.Key === "Flip X");
                if (fXRow && fXRow.Value !== undefined) setFlipX(fXRow.Value === true || fXRow.Value === "true");
                const fYRow = sessionRaw.find(r => r.Key === "Flip Y");
                if (fYRow && fYRow.Value !== undefined) setFlipY(fYRow.Value === true || fYRow.Value === "true");
            }

            if (newDiffs.length > 0) {
                setImportDiffs(newDiffs);
            }
        }; 
        reader.readAsArrayBuffer(file); e.target.value = "";
    }; 

    const applyImportDiffs = (selectedIds) => {
        const diffsToApply = importDiffs.filter(d => selectedIds.has(d.id));
        
        let nextAdj = [...adjectiveMatrix.map(r => r ? [...r] : [])];
        let nextNouns = [...nounData];
        let nextMg = [...majorGroups.map(r => r ? [...r] : [])];
        let nextExt = { ...extremeGroups };
        let nextNotes = { ...notes };
        
        diffsToApply.forEach(d => {
            if (d.type === 'Adjective') {
                if(!nextAdj[d.r]) nextAdj[d.r] = [];
                nextAdj[d.r][d.c] = d.newVal;
            } else if (d.type === 'Noun') {
                const parts = (nextNouns[d.idx] || "Hue,Hue").split(',');
                parts[d.col] = d.newVal;
                nextNouns[d.idx] = parts.join(',');
            } else if (d.type === 'Major Group') {
                if(!nextMg[d.r]) nextMg[d.r] = [];
                nextMg[d.r][d.c] = d.newVal;
            } else if (d.type === 'Extreme Group') {
                nextExt[d.key] = d.newVal;
            } else if (d.type === 'Note') {
                if (d.newVal === "") {
                    delete nextNotes[d.key];
                } else {
                    nextNotes[d.key] = d.newVal;
                }
            }
        });
        
        setAdjectiveMatrix(nextAdj);
        setNounData(nextNouns);
        setMajorGroups(nextMg);
        setExtremeGroups(nextExt);
        setNotes(nextNotes);
        
        setImportDiffs(null); 
    };

    const activeNounColIdx = l < 50 ? 0 : 1; 

    return (

            <span className="text-xs md:text-sm font-bold text-slate-400 dark:text-neutral-600 ml-2 tracking-normal align-middle">v3.9.5</span>

        {/* NEW TOP OMNIBAR SEARCH */}
        <div className="mt-2 w-full max-w-sm relative z-[100]">

                />
            </div>
            {isSearchFocused && searchQuery && searchResults.length > 0 && (
                <div className="absolute top-full mt-1 left-0 w-full bg-white dark:bg-neutral-900 border border-slate-200 dark:border-neutral-700 rounded-xl shadow-2xl max-h-60 overflow-y-auto z-50 custom-scroll">
                    {searchResults.map(res => (
                        <div key={res.id} onMouseDown={(e) => { e.preventDefault(); res.action(); setIsSearchFocused(false); setSearchQuery(''); }} className="p-2.5 border-b border-slate-100 dark:border-neutral-800 hover:bg-blue-50 dark:hover:bg-neutral-800 cursor-pointer flex flex-col last:border-0 transition-colors">
                            <span className="text-xs font-bold text-slate-800 dark:text-neutral-200 flex justify-between items-center">
                                {res.label} <span className="text-[9px] font-mono font-black text-blue-500 uppercase px-1.5 py-0.5 bg-blue-100/50 dark:bg-blue-900/30 rounded">{res.type}</span>

            {isSearchFocused && searchQuery && searchResults.length === 0 && (

        {/* Left Toolbar (History + Help) */}

            <button onClick={handleUndo} disabled={historyIndex === 0} className={`p-2 rounded-full transition-colors ${historyIndex === 0 ? 'opacity-30 cursor-not-allowed text-slate-400' : 'hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300'}`}>

            <img

            <button onClick={() => setShowHelp(true)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300 transition-colors hidden md:block">

          Math.pow(labA[1] - labB[1], 2) +

        );

        const mapFor = (L0, C0, H0) => {
          const hI = getIndexFromHue(H0, hueValues);

          const cI = getRangeIndex(C0, chromaRanges);
          const isSingularity = (lI === 0 || lI === 21 || cI === 0);
          const evalL = lightRanges[lI]?.mid ?? L0;
          const evalC = isSingularity ? 0 : (chromaRanges[cI]?.mid ?? C0);
          const evalH = isSingularity ? 0 : (hueValues[hI] ?? H0);
          const sIdx = lI < 11 ? 0 : 1;
          let noun = parsedNouns[hI]?.[sIdx] || "Hue";
          if (evalC === 0) {
            if (evalL >= 90) noun = "Blanche";
            else if (evalL < 20) noun = "Nero";
            else noun = "Cinza";
          }
          let adj = adjectiveMatrix[lI]?.[cI] || "";
          if (noun && adj && noun.toLowerCase() === adj.toLowerCase()) adj = "";
          let code;
          if (isSingularity) {
            if (lI === 0) code = 'AA000';
            else if (lI === 21) code = 'VA000';
            else code = `${lightRanges[lI]?.label || 'A'}A000`;
          } else {
            code = `${lightRanges[lI]?.label || '?'}${chromaRanges[cI]?.label || '?'}${Math.round(evalH).toString().padStart(3,'0')}`;
          }
          return { noun, adj, code };
        };

        const mA = mapFor(compareA.l, compareA.c, compareA.h);
        const mB = mapFor(compareB.l, compareB.c, compareB.h);

        const gamutA = checkGamut(compareA.l, compareA.c, compareA.h);
        const gamutB = checkGamut(compareB.l, compareB.c, compareB.h);
        const outA = displayGamut === 'p3' ? !gamutA.isP3 : !gamutA.isSRGB;
        const outB = displayGamut === 'p3' ? !gamutB.isP3 : !gamutB.isSRGB;

        const colA = getMappedCssColor(compareA.l, compareA.c, compareA.h, displayGamut);
        const colB = getMappedCssColor(compareB.l, compareB.c, compareB.h, displayGamut);

        const rgbA = realLchToRgb(compareA.l, compareA.c, compareA.h);
        const rgbB = realLchToRgb(compareB.l, compareB.c, compareB.h);
        const hexA = `#${rgbA.r.toString(16).padStart(2,'0')}${rgbA.g.toString(16).padStart(2,'0')}${rgbA.b.toString(16).padStart(2,'0')}`.toUpperCase();

        const hatch = 'repeating-linear-gradient(45deg, var(--hatch-dark) 0px, var(--hatch-dark) 4px, var(--hatch-light) 4px, var(--hatch-light) 8px)';

        return (

                  <button onClick={() => toggleFs('compare')} className="px-3 py-2 rounded-xl text-xs font-black bg-white dark:bg-neutral-950 border border-slate-200 dark:border-neutral-800 hover:bg-slate-50 dark:hover:bg-neutral-900 transition-colors" title="Fullscreen Compare">
                    <Maximize2 className="w-4 h-4" />
                  </button>
                  <button onClick={() => { const t = compareA; setCompareA(compareB); setCompareB(t); }} className="px-3 py-2 rounded-xl text-xs font-black bg-white dark:bg-neutral-950 border border-slate-200 dark:border-neutral-800 hover:bg-slate-50 dark:hover:bg-neutral-900 transition-colors" title="Swap A and B">Swap</button>
                </div>
              </div>

              <div className="flex gap-3">
                <div className="flex-1 rounded-xl border border-slate-200 dark:border-neutral-800 overflow-hidden shadow-sm">
                  <div className="relative h-20" style={{ backgroundColor: colA }}>
                    {outA && <div className="absolute inset-0" style={{backgroundImage: hatch}}></div>}
                    <div className="absolute top-2 left-2 text-[9px] font-black tracking-widest uppercase px-2 py-1 rounded bg-white/80 dark:bg-black/70 backdrop-blur border border-white/40 dark:border-white/10">A</div>
                    <button onClick={() => updateColorWithHistory(compareA.l, compareA.c, compareA.h)} className="absolute top-2 right-2 text-[9px] font-black px-2 py-1 rounded bg-black/40 text-white hover:bg-black/55 transition-colors">Jump</button>
                  </div>
                  <div className="p-3 space-y-2 bg-white dark:bg-neutral-950">
                    <div className="flex items-center justify-between gap-2">
                      <div className="text-xs font-black text-slate-800 dark:text-neutral-100 truncate">{mA.adj ? `${mA.adj} ` : ''}{mA.noun}</div>
                      <div className="text-[10px] font-mono font-bold text-slate-500 dark:text-neutral-400 shrink-0">{mA.code}</div>
                    </div>
                    <div className="grid grid-cols-2 gap-2 text-[10px]">
                      <div className="font-mono text-slate-600 dark:text-neutral-300">{hexA}</div>
                      <div className="font-mono text-slate-600 dark:text-neutral-300 text-right">L{compareA.l.toFixed(1)} C{compareA.c.toFixed(1)} H{compareA.h.toFixed(1)}</div>

                    <button onClick={() => setCompareA({ l, c, h })} className="w-full mt-1 px-3 py-2 rounded-lg text-xs font-black bg-blue-500 text-white hover:bg-blue-600 transition-colors shadow-sm">Set A</button>
                  </div>

                  <div className="relative h-20" style={{ backgroundColor: colB }}>
                    {outB && <div className="absolute inset-0" style={{backgroundImage: hatch}}></div>}
                    <div className="absolute top-2 left-2 text-[9px] font-black tracking-widest uppercase px-2 py-1 rounded bg-white/80 dark:bg-black/70 backdrop-blur border border-white/40 dark:border-white/10">B</div>

                    </div>
                    <button onClick={() => setCompareB({ l, c, h })} className="w-full mt-1 px-3 py-2 rounded-lg text-xs font-black bg-blue-500 text-white hover:bg-blue-600 transition-colors shadow-sm">Set B</button>
                  </div>
                </div>
              </div>
              <div className="text-[10px] text-slate-500 dark:text-neutral-400 leading-snug">ΔE is computed in CIELAB space (CIE76) using each color’s LCH→LAB conversion.</div>
            </div>

<CollapsiblePanel title={`Palette Playground (${palette.length}/10)`} icon={<Layers className="w-3 h-3" />} defaultOpen={false}>

                                 <div key={k} className="flex flex-col gap-1">
                                     <label className="text-[9px] font-bold text-slate-500 capitalize pl-1 flex items-center justify-between">
                                        <span>{k.replace(/([A-Z])/g, ' $1').trim()} {k === 'white' ? '(L ≥ 90)' : k === 'black' ? '(L < 20)' : k === 'lightGray' ? '(70 ≤ L < 90)' : k === 'mediumGray' ? '(45 ≤ L < 70)' : '(20 ≤ L < 45)'}</span>
                                        {groupCounts && groupCounts[k] !== undefined && <span className={`px-1.5 py-0.5 rounded text-[8px] font-mono ${groupCounts[k] > 0 ? 'bg-slate-200 dark:bg-neutral-800 text-slate-500 dark:text-neutral-400' : 'bg-red-100 text-red-500 dark:bg-red-900/30'}`}>{groupCounts[k]} in-gamut</span>}
                                     </label>
                                     <div className={`relative rounded-lg overflow-hidden border shadow-sm ${cellOpacity} ${isDupe ? 'ring-4 ring-red-500 border-red-500' : 'border-slate-200 dark:border-neutral-800'}`} style={{backgroundColor: cellData.bg}}>
                                         <input type="text" value={extremeGroups[k]} onChange={e => setExtremeGroups(p => ({...p, [k]: e.target.value}))} className={`w-full bg-transparent p-2.5 text-xs font-bold focus:outline-none transition-colors ${isDupe ? 'text-red-500' : (cellData.l < 55 ? 'text-white' : 'text-black')}`} style={{textShadow: isDupe ? 'none' : (cellData.l < 55 ? '0 1px 3px rgba(0,0,0,0.8)' : 'none')}}/>
                                     </div>
                                 </div>
                             )
                         })}
                     </div>
                 </div>

                 <div className="pb-8">
                     <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-3">Hue Segments (L × C)</h3>
                     <div className="border border-slate-200 dark:border-neutral-800 rounded-xl overflow-hidden shadow-sm">
                         <table className="w-full text-xs text-left table-fixed border-separate border-spacing-0">
                             <thead className="bg-slate-50 dark:bg-neutral-900/50">
                                 <tr>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 w-1/5 text-center bg-white dark:bg-neutral-950 sticky left-0 z-20">Hue Range</th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800"><div className="flex flex-col items-start">Dark Neutral<span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">L&lt;63, C&lt;40</span></div></th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800"><div className="flex flex-col items-start">Dark Vivid<span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">L&lt;63, C&ge;40</span></div></th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800"><div className="flex flex-col items-start">Light Vivid<span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">L&ge;63, C&ge;40</span></div></th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-slate-200 dark:border-neutral-800"><div className="flex flex-col items-start">Light Neutral<span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">L&ge;63, C&lt;40</span></div></th>
                                 </tr>
                             </thead>
                             <tbody>
                                 {majorGroups.map((row, rIdx) => {
                                     const isRowActive = activeMajorHueIdx === rIdx && !isWhiteActive && !isBlackActive && !isLightGrayActive && !isMediumGrayActive && !isDarkGrayActive;
                                     return (
                                         <tr key={rIdx} className={isRowActive ? 'bg-blue-50/10 dark:bg-blue-900/5' : ''} data-active={isRowActive}>
                                             <td className={`p-3 border-b border-r border-slate-100 dark:border-neutral-900 font-mono text-center text-[10px] sticky left-0 z-10 ${isRowActive ? 'font-bold text-blue-600 dark:text-blue-400 bg-white dark:bg-neutral-950' : 'text-slate-500 dark:text-neutral-500 bg-slate-50/50 dark:bg-neutral-900/30'}`}>
                                                 {HUE_RANGES_MAJOR[rIdx]}
                                             </td>
                                             {[0,1,2,3].map(cIdx => {
                                                 const isCellActive = isRowActive && activeMajorQuadIdx === cIdx;
                                                 const cellData = groupBackgrounds.quads[rIdx][cIdx];
                                                 const count = groupCounts && groupCounts.quads && groupCounts.quads[rIdx] ? groupCounts.quads[rIdx][cIdx] : 0;
                                                 const cellOpacity = isCellActive ? 'opacity-100 scale-105 shadow-2xl z-20 relative ring-4 ring-blue-500' : (count === 0 ? 'opacity-25' : 'opacity-100 transition-all');
                                                 const isDupe = duplicates.mgs.has(normalizeText(row[cIdx]));

                                                 return (
                                                     <td key={cIdx} className={`p-0 border-b border-slate-100 dark:border-neutral-900 ${cIdx < 3 ? 'border-r' : ''}`}>
                                                        <div className={`relative w-full h-full flex flex-col justify-center ${cellOpacity} ${isDupe && !isCellActive ? 'ring-inset ring-4 ring-red-500' : ''}`} style={{backgroundColor: cellData.bg}}>
                                                             <input 
                                                                 type="text" 
                                                                 value={row[cIdx]} 
                                                                 onChange={(e) => updateMajorGroup(rIdx, cIdx, e.target.value)} 
                                                                 className={`w-full h-11 px-3 pb-3 pt-2 bg-transparent border-none outline-none font-medium transition-colors ${isDupe ? 'text-red-500' : (cellData.l < 55 ? 'text-white' : 'text-black')} ${isCellActive ? 'ring-2 ring-inset ring-blue-500 bg-white/20 dark:bg-black/20 font-bold' : 'hover:bg-white/10 dark:hover:bg-black/10'}`}
                                                                 style={{textShadow: isDupe ? 'none' : (cellData.l < 55 ? '0 1px 3px rgba(0,0,0,0.8)' : 'none')}}
                                                             />
                                                             {count !== undefined && <span className={`absolute bottom-1 right-2 text-[8px] font-mono font-bold pointer-events-none ${count > 0 ? (cellData.l < 55 ? 'text-white opacity-60' : 'text-black opacity-60') : 'text-red-400 opacity-100 drop-shadow-md'}`}>
                                                                 {count} in-gamut
                                                             </span>}
                                                         </div>
                                                     </td>
                                                 )
                                             })}
                                         </tr>
                                     );
                                 })}
                             </tbody>
                         </table>
                     </div>
                 </div>
             </div> 
            )} 
            {activeView === 'locked_cells' && (
             <div className="h-full w-full overflow-hidden rounded-xl border border-slate-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 shadow-sm transition-colors duration-300 flex flex-col p-4 md:p-6">
                 <div className="flex justify-between items-center mb-4 shrink-0">
                     <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider flex items-center gap-2"><Lock className="w-4 h-4"/> Locked Colors</h3>
                     <span className="text-[10px] font-bold text-slate-500 bg-slate-100 dark:bg-neutral-900 px-3 py-1 rounded-full">{lockedList.length} Total</span>
                 </div>
                 {lockedList.length === 0 ? (
                     <div className="flex-1 flex flex-col items-center justify-center text-slate-400 dark:text-neutral-600 space-y-3 opacity-60">
                         <Unlock className="w-12 h-12" />
                         <p className="text-sm font-medium">No locked colors currently.</p>
                     </div>
                 ) : (
                     <div className="flex-1 min-h-0 border border-slate-200 dark:border-neutral-800 rounded-xl overflow-y-auto shadow-sm custom-scroll">
                         <table className="w-full text-xs text-left table-auto border-separate border-spacing-0">
                             <thead className="bg-slate-50/90 dark:bg-neutral-900/90 backdrop-blur-md sticky top-0 z-10 shadow-sm">
                                 <tr>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 w-16 text-center">Color</th>
                                     <th onClick={() => requestSort('hVal')} className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 cursor-pointer hover:bg-slate-200/50 dark:hover:bg-neutral-800/50 transition-colors select-none">
                                        Coordinates {sortConfig?.key === 'hVal' ? (sortConfig.direction === 'ascending' ? '↑' : '↓') : ''}
                                     </th>
                                     <th onClick={() => requestSort('code')} className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 w-28 cursor-pointer hover:bg-slate-200/50 dark:hover:bg-neutral-800/50 transition-colors select-none">
                                        Code {sortConfig?.key === 'code' ? (sortConfig.direction === 'ascending' ? '↑' : '↓') : ''}
                                     </th>
                                     <th onClick={() => requestSort('adj')} className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 w-[20%] cursor-pointer hover:bg-slate-200/50 dark:hover:bg-neutral-800/50 transition-colors select-none">
                                        Adjective {sortConfig?.key === 'adj' ? (sortConfig.direction === 'ascending' ? '↑' : '↓') : ''}
                                     </th>
                                     <th onClick={() => requestSort('noun')} className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 w-[20%] cursor-pointer hover:bg-slate-200/50 dark:hover:bg-neutral-800/50 transition-colors select-none">
                                        Noun {sortConfig?.key === 'noun' ? (sortConfig.direction === 'ascending' ? '↑' : '↓') : ''}
                                     </th>
                                     <th onClick={() => requestSort('note')} className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 w-[30%] cursor-pointer hover:bg-slate-200/50 dark:hover:bg-neutral-800/50 transition-colors select-none">
                                        Notes {sortConfig?.key === 'note' ? (sortConfig.direction === 'ascending' ? '↑' : '↓') : ''}
                                     </th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-slate-200 dark:border-neutral-800 w-16 text-center">Action</th>
                                 </tr>
                             </thead>
                             <tbody>
                                 {sortedLockedList.map((item) => (
                                     <tr key={item.key} className="hover:bg-slate-50/50 dark:hover:bg-neutral-900/30 transition-colors">
                                         <td className="p-2 border-b border-r border-slate-100 dark:border-neutral-900 text-center">
                                             <div 
                                                onClick={() => updateColorWithHistory(item.lVal, item.cVal, item.hVal)}
                                                className="w-8 h-8 rounded-md mx-auto shadow-inner border border-black/10 dark:border-white/10 cursor-pointer hover:scale-110 transition-transform" 
                                                style={{backgroundColor: item.color, backgroundImage: item.isOut ? 'repeating-linear-gradient(45deg, var(--hatch-dark) 0px, var(--hatch-dark) 4px, var(--hatch-light) 4px, var(--hatch-light) 8px)' : 'none'}}></div>
                                         </td>
                                         <td className="p-3 border-b border-r border-slate-100 dark:border-neutral-900 font-mono text-[10px] text-slate-500 dark:text-neutral-400">
                                             <div className="flex gap-2 font-bold"><span className="w-6">L {Math.round(item.lVal)}</span> <span className="w-6">C {Math.round(item.cVal)}</span> <span className="w-6">H {Math.round(item.hVal)}</span></div>
                                         </td>
                                         <td className="p-3 border-b border-r border-slate-100 dark:border-neutral-900 font-mono text-[10px] font-black text-slate-600 dark:text-neutral-300">
                                             {item.code}
                                         </td>
                                         <td className="p-3 border-b border-r border-slate-100 dark:border-neutral-900 font-bold text-slate-700 dark:text-neutral-200">
                                             {item.adj || <span className="opacity-30">-</span>}
                                         </td>
                                         <td className="p-3 border-b border-r border-slate-100 dark:border-neutral-900 font-black text-slate-800 dark:text-neutral-100">
                                             {item.noun}
                                         </td>
                                         <td className="p-3 border-b border-r border-slate-100 dark:border-neutral-900 text-slate-600 dark:text-neutral-400 italic text-[10px]">
                                             {item.note || <span className="opacity-30">-</span>}
                                         </td>
                                         <td className="p-2 border-b border-slate-100 dark:border-neutral-900 text-center">
                                             <button 
                                                 onClick={() => setLockedCells(prev => prev.filter(k => k !== item.key))}
                                                 className="p-1.5 rounded-md hover:bg-red-100 hover:text-red-600 dark:hover:bg-red-900/30 dark:hover:text-red-400 text-slate-400 transition-colors mx-auto flex items-center justify-center"
                                                 title="Unlock"
                                             >
                                                 <Unlock className="w-4 h-4" />
                                             </button>
                                         </td>
                                     </tr>
                                 ))}
                             </tbody>
                         </table>
                     </div>
                 )}
             </div>
            )}
        </div> 
        </div> 
    </div> 
    </div> 
    ); 
 }; 
 const root = ReactDOM.createRoot(document.getElementById('root')); 
 root.render(<ColorSAMIfier />); 
 







</script> 
</body> 
</html>
