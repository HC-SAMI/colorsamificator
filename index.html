 // --- W3C REFERENCE MATH ENGINE (D50 at 2° Observer) ---
 const lch2lab = (l, c, h) => {
    const hRad = (h * Math.PI) / 180;
    return [l, c * Math.cos(hRad), c * Math.sin(hRad)];
 };

 const lab2xyz = (l, a, b) => {
    const y = (l + 16) / 116;
    const x = a / 500 + y;
    const z = y - b / 200;
    const fInv = (n) => n > 0.20689655172413793 ? Math.pow(n, 3) : (116 * n - 16) / 903.2962962962963;
    const D50 = [0.96422, 1.00000, 0.82521]; 
    return [D50[0] * fInv(x), D50[1] * fInv(y), D50[2] * fInv(z)];
 };

 const xyz2lin_srgb = (X, Y, Z) => {
    const r =  3.1338561 * X - 1.6168667 * Y - 0.4906146 * Z;
    const g = -0.9787684 * X + 1.9161415 * Y + 0.0334540 * Z;
    const b =  0.0719453 * X - 0.2289914 * Y + 1.4052427 * Z;
    return [r, g, b];
 };

 const lin2srgb = (lin) => {
    const gamma = (v) => {
        let absV = Math.abs(v);
        let res = absV <= 0.0031308 ? 12.92 * absV : 1.055 * Math.pow(absV, 1/2.4) - 0.055;
        return v < 0 ? -res : res;
    };
    return [gamma(lin[0]), gamma(lin[1]), gamma(lin[2])];
 };

 const xyz2lin_p3 = (X, Y, Z) => {
    const r =  2.4039833 * X - 0.9898394 * Y - 0.3976295 * Z;
    const g = -0.8421528 * X + 1.7988085 * Y + 0.0163351 * Z;
    const b =  0.0482087 * X - 0.0972828 * Y + 1.2730104 * Z;
    return [r, g, b];
 };

 const inGamut = ([r, g, b]) => {
    const e = 0.001; 
    return r >= -e && r <= 1+e && g >= -e && g <= 1+e && b >= -e && b <= 1+e;
 };

 const realLchToRgb = (l, c, h) => {
    if (l >= 100) return { r: 255, g: 255, b: 255, outOfGamut: false };
    if (l <= 0) return { r: 0, g: 0, b: 0, outOfGamut: false };
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    let linRGB = xyz2lin_srgb(X, Y, Z);
    let outOfGamut = !inGamut(linRGB);
    
    if (outOfGamut) {
        let minC = 0; let maxC = c; let bestC = 0;
        for (let i = 0; i < 20; i++) {
            const midC = (minC + maxC) / 2;
            const [tL, ta, tb] = lch2lab(l, midC, h);
            const [tX, tY, tZ] = lab2xyz(tL, ta, tb);
            const tRGB = xyz2lin_srgb(tX, tY, tZ);
            if (inGamut(tRGB)) { bestC = midC; minC = midC; } else { maxC = midC; }
        }
        const [mL, ma, mb] = lch2lab(l, bestC, h);
        const [mX, mY, mZ] = lab2xyz(mL, ma, mb);
        linRGB = xyz2lin_srgb(mX, mY, mZ);
    }
    const [rr, gg, bb] = lin2srgb(linRGB);
    const clamp = (v) => Math.round(Math.max(0, Math.min(1, v)) * 255);
    return { r: clamp(rr), g: clamp(gg), b: clamp(bb), outOfGamut };
 };

 const rawLchToRgb = (l, c, h) => {
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    const linRGB = xyz2lin_srgb(X, Y, Z);
    const [rr, gg, bb] = lin2srgb(linRGB);
    return {
        r: Math.round(rr * 255),
        g: Math.round(gg * 255),
        b: Math.round(bb * 255)
    };
 };

 const checkGamutStatus = (l, c, h) => {
    if (l >= 100 || l <= 0) return { isSRGB: true, isP3: true }; 
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    const linSRGB = xyz2lin_srgb(X, Y, Z);
    const linP3 = xyz2lin_p3(X, Y, Z);
    return { isSRGB: inGamut(linSRGB), isP3: inGamut(linP3) };
 };
 
 const checkGamut = checkGamutStatus;

 const srgb2lin = (c) => {
    let v = c / 255;
    let absV = Math.abs(v);
    let res = absV <= 0.04045 ? absV / 12.92 : Math.pow((absV + 0.055) / 1.055, 2.4);
    return v < 0 ? -res : res;
 };

 const rgbToLchConvert = (r, g, b, currentH) => {
    let lr = srgb2lin(r), lg = srgb2lin(g), lb = srgb2lin(b);
    let x = 0.4360747 * lr + 0.3850649 * lg + 0.1430804 * lb;
    let y = 0.2225045 * lr + 0.7168786 * lg + 0.0606169 * lb;
    let z = 0.0139322 * lr + 0.0971045 * lg + 0.7141733 * lb;

    const f = (n) => n > 216/24389 ? Math.pow(n, 1/3) : (24389/27 * n + 16) / 116;
    let fx = f(x / 0.96422), fy = f(y / 1.0), fz = f(z / 0.82521);

    let L = 116 * fy - 16;
    let a_val = 500 * (fx - fy);
    let b_val = 200 * (fy - fz);

    let C = Math.sqrt(a_val*a_val + b_val*b_val);
    let H = Math.atan2(b_val, a_val) * (180 / Math.PI);
    if (H < 0) H += 360;
    return { l: Math.max(0, Math.min(100, L)), c: Math.max(0, C), h: C < 0.1 ? currentH : (isNaN(H) ? currentH : H) };
 };

 const hexToLchConvert = (hex, currentH) => {
    let clean = hex.replace(/[^0-9A-F]/gi, '');
    if (clean.length === 3) clean = clean.split('').map(c => c+c).join('');
    if (clean.length !== 6) return null;
    let r = parseInt(clean.substring(0,2), 16);
    let g = parseInt(clean.substring(2,4), 16);
    let b = parseInt(clean.substring(4,6), 16);
    return rgbToLchConvert(r, g, b, currentH);
 };

 const labToLchConvert = (l, a, b_val, currentH) => {
    let C = Math.sqrt(a*a + b_val*b_val);
    let H = Math.atan2(b_val, a) * (180 / Math.PI);
    if (H < 0) H += 360;
    return { l: Math.max(0, Math.min(100, l)), c: Math.max(0, C), h: C < 0.1 ? currentH : (isNaN(H) ? currentH : H) };
 };

 const getMappedCssColor = (l, c, h, gamut) => {
    if (l >= 100) return '#FFFFFF';
    if (l <= 0) return '#000000';
    
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    let linColor = gamut === 'p3' ? xyz2lin_p3(X, Y, Z) : xyz2lin_srgb(X, Y, Z);
    
    if (!inGamut(linColor)) {
        let minC = 0; let maxC = c; let bestC = 0;
        for (let i = 0; i < 20; i++) {
            const midC = (minC + maxC) / 2;
            const [tL, ta, tb] = lch2lab(l, midC, h);
            const [tX, tY, tZ] = lab2xyz(tL, ta, tb);
            const tLin = gamut === 'p3' ? xyz2lin_p3(tX, tY, tZ) : xyz2lin_srgb(tX, tY, tZ);
            if (inGamut(tLin)) { bestC = midC; minC = midC; } else { maxC = midC; }
        }
        const [mL, ma, mb] = lch2lab(l, bestC, h);
        const [mX, mY, mZ] = lab2xyz(mL, ma, mb);
        linColor = gamut === 'p3' ? xyz2lin_p3(mX, mY, mZ) : xyz2lin_srgb(mX, mY, mZ);
    }

    const [v1, v2, v3] = lin2srgb(linColor); 
    const clamp = (v) => Math.max(0, Math.min(1, v));
    
    if (gamut === 'p3') {
        return `color(display-p3 ${clamp(v1).toFixed(4)} ${clamp(v2).toFixed(4)} ${clamp(v3).toFixed(4)})`;
    } else {
        const r = Math.round(clamp(v1) * 255);
        const g = Math.round(clamp(v2) * 255);
        const b = Math.round(clamp(v3) * 255);
        return `rgb(${r},${g},${b})`;
    }
 };

 const generateLightRanges = () => {
    const ranges = [{ label: "A", min: 0, max: 0, mid: 0 }]; 
    const numBins = 19;
    const maxLight = 95;
    let currentStart = 1;

    for (let i = 1; i <= numBins; i++) {
        let end = Math.round(maxLight * (1 - Math.pow(1 - i / numBins, 1.4)));
        if (i === numBins) end = maxLight;
        if (end < currentStart) end = currentStart;

        ranges.push({
            label: String.fromCharCode(65 + i),
            min: currentStart,
            max: end,
            mid: (currentStart + end) / 2
        });
        currentStart = end + 1;
    }
    ranges.push({ label: "U", min: 96, max: 99, mid: 97.5 });
    ranges.push({ label: "V", min: 100, max: 100, mid: 100 });
    return ranges;
 };

 const generateChromaRanges = () => {
    const ranges = [{ label: "A", min: 0, max: 0, mid: 0 }];

        if (i === numBins) end = maxChroma; 
        if (end < currentStart) end = currentStart; 

        ranges.push({ 
            label: String.fromCharCode(65 + i), 
            min: currentStart, 
            max: end,

        });

 const generateAdjectiveMatrix = () => {
    const lines = RAW_ADJECTIVES_CSV.trim().split('\n').map(l => l.trim()).filter(l => l && !l.toLowerCase().startsWith('l \\ c'));
    const matrix = Array(22).fill(null).map(() => Array(15).fill(""));

    lines.forEach(line => {
        const parts = line.split(',');
        const label = parts[0] || "";
        const match = label.match(/L(\d+)/i);
        if (match) {
            const lVal = parseInt(match[1]);
            if (lVal >= 1 && lVal <= 20) {
                const row = parts.slice(1, 16).map(s => s.trim());
                while(row.length < 15) row.push("");
                matrix[lVal] = row;
            }
        }
    });

    return matrix;
 };

 const generateNounData = () => {
    const lines = RAW_NOUNS_CSV.trim().split('\n').map(l => l.trim()).filter(l => l && !l.toLowerCase().startsWith('hue'));
    const nouns = Array(120).fill("Hue,Hue");
    
    lines.forEach((line) => {
        const parts = line.split(',');
        const angleMatch = (parts[0] || "").match(/\d+/);
        if (angleMatch) {
            const angle = parseInt(angleMatch[0]);
            const idx = Math.round(angle / 3);
            if (idx >= 0 && idx < 120) {
                nouns[idx] = `${(parts[1] || "Hue").trim()},${(parts[2] || "Hue").trim()}`;
            }
        }
    });
    return nouns;
 };

 const generateMajorGroups = () => {
    const lines = RAW_MAJOR_GROUPS_CSV.trim().split('\n').slice(1);
    return lines.map(line => {
        const parts = line.split(',');
        return parts.slice(1).map(s => s.trim());
    });
 };

 const getRangeIndex = (val, ranges) => {
    const rounded = Math.round(val);
    let idx = ranges.findIndex(rg => rounded >= rg.min && rounded <= rg.max);
    if (idx !== -1) return idx;
    
    let closest = 0;
    let minDiff = Infinity;
    ranges.forEach((rg, i) => {
        const diff = Math.abs(val - rg.mid);
        if (diff < minDiff) { minDiff = diff; closest = i; }
    });
    return closest;
 };

 const getIndexFromHue = (hue, hueVals) => { 
    let closestIdx = 0; let minDiff = 360;
    hueVals.forEach((hVal, idx) => {
        let diff = Math.abs(hVal - hue);
        if(diff > 180) diff = 360 - diff; 
        if(diff < minDiff) { minDiff = diff; closestIdx = idx; }
    });
    return closestIdx;
 }; 

 const getGroupId = (lVal, cVal, hVal) => {
    if (cVal <= 5) {
        if (lVal >= 90) return 'white';
        if (lVal < 20) return 'black';
        if (lVal >= 70) return 'lightGray';
        if (lVal >= 45) return 'mediumGray';
        return 'darkGray';
    }
    const hueGroup = Math.floor(((hVal + 15) % 360) / 30);
    const quadGroup = lVal < 63 ? (cVal < 40 ? 0 : 1) : (cVal >= 40 ? 2 : 3);
    return `h${hueGroup}-q${quadGroup}`;
 };

        if (localVal !== value) onConvert(localVal);

    return (
        <div className="flex flex-col gap-1">
            <label className="text-[9px] font-bold text-slate-400 uppercase pl-1">{label}</label>
            <input 
                type="text" 
                value={localVal} 
                onChange={(e) => setLocalVal(e.target.value)}
                onBlur={handleBlur}

                placeholder={placeholder}

 const AutoInput = ({ value, onChange, onBlur, disabled, placeholder, emptyText = "", className, style, isDupe }) => {
    const [isFocused, setIsFocused] = useState(false);
    const showEmpty = disabled ? "" : emptyText;
    const textToMeasure = value || (isFocused ? placeholder : showEmpty);
    const dupeClass = isDupe ? "ring-4 ring-inset ring-red-500 bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-400" : "";

    return (
        <div className={`inline-grid items-center align-middle relative rounded transition-all ${dupeClass}`}>
            <span className={`invisible whitespace-pre col-start-1 row-start-1 px-1 min-w-[1ch] ${className}`} style={{ ...style, pointerEvents: 'none' }}>
                {textToMeasure || " "}
            </span>
            <input 
                type="text"
                value={value}
                onChange={onChange}
                onFocus={() => setIsFocused(true)}
                onBlur={(e) => { setIsFocused(false); if(onBlur) onBlur(e); }}
                disabled={disabled}
                placeholder={isFocused ? placeholder : showEmpty}
                className={`col-start-1 row-start-1 w-full h-full px-1 text-center m-0 bg-transparent border-none outline-none overflow-hidden ${className} ${isDupe ? 'text-red-700 dark:text-red-400' : ''}`}

            />
        </div>
    );
 };

                        <li><strong>Naming & Exporting:</strong> Click the large text in the preview box to assign custom color names. Use the download icon to export your complete color definitions to a spreadsheet.</li>
                    </ul>
                </section>
                <section>
                    <h3 className="font-bold text-lg text-slate-800 dark:text-neutral-100 mb-2">Understanding Color Values</h3>
                    <p className="mb-2"><strong>LCH</strong> is a perceptually uniform color space, meaning it scales in a way that closely matches human vision.</p>
                    <ul className="list-disc pl-5 space-y-2">
                        <li><strong>L (Lightness):</strong> Ranges from 0 (pure black) to 100 (pure white).</li>
                        <li><strong>C (Chroma):</strong> Measures the intensity or saturation. 0 is a pure gray. Higher numbers mean more vivid colors.</li>
                        <li><strong>H (Hue):</strong> The actual color plotted on a 360-degree circle (e.g., 0° is Red, 120° is Green, 240° is Blue).</li>
                        <li><strong>ΔE (Delta E):</strong> A metric that measures the visual distance between two colors. Here, it shows how far your custom slider adjustments have strayed from the nearest "locked" grid coordinate.</li>
                    </ul>
                </section>
                <section>
                    <h3 className="font-bold text-lg text-slate-800 dark:text-neutral-100 mb-2">Gamut Warnings</h3>
                    <p>Not all mathematical LCH combinations can be physically displayed by standard monitors. These are considered "out of gamut."</p>
                    <div className="mt-2 flex items-center gap-3">
                        <div className="w-10 h-10 shrink-0 rounded border border-slate-300 dark:border-neutral-800" style={{backgroundColor: '#3b82f6', backgroundImage: 'repeating-linear-gradient(45deg, var(--hatch-dark) 0px, var(--hatch-dark) 4px, var(--hatch-light) 4px, var(--hatch-light) 8px)'}}></div>
                        <span className="text-sm">If you see these stripes on a cell or swatch, the precise color cannot be displayed perfectly accurately on your screen. The app will automatically render the closest visual match it can.</span>
                    </div>
                </section>
            </div>
        </div>
    </div>
 );

    const commitChange = () => { 
        let val = parseInt(localText); 
        if (isNaN(val)) { setLocalText(displayVal); return; } 
        if (label === "Hue") { if (val < 0) val = 0; if (val > 360) val = 360; setter(val); } 
        else { if (val < 0) val = 0; if (val > max) val = max; setter(val); }

    </div>

    );

 const ContinuousSpace = memo(({ xType, yType, fixedVal, h, c, l, flipX, flipY, displayGamut, updateColor, width, height, isDark }) => {
    const canvasRef = useRef(null);
    const containerRef = useRef(null);
    const isDragging = useRef(false);

    const xMax = xType === 'c' ? 140 : xType === 'l' ? 100 : 360;
    const yMax = yType === 'c' ? 140 : yType === 'l' ? 100 : 360;

    const activeXVal = xType === 'l' ? l : xType === 'c' ? c : h;
    const activeYVal = yType === 'l' ? l : yType === 'c' ? c : h;

    const getChromaFromNorm = useCallback((norm) => {
        return 140 * Math.pow(norm, 1.8);
    }, []);

    const getNormFromChroma = useCallback((cVal) => {
        if (cVal <= 0) return 0;
        return Math.pow(cVal / 140, 1 / 1.8);
    }, []);

    const getLightFromNorm = useCallback((norm) => {
        return Math.max(0, Math.min(100, 100 * (1 - Math.pow(1 - norm, 1.4))));
    }, []);

    const getNormFromLight = useCallback((lVal) => {
        if (lVal <= 0) return 0;
        if (lVal >= 100) return 1;
        return 1 - Math.pow(1 - lVal / 100, 1 / 1.4);
    }, []);

    useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // OPTIMIZATION: Max res capped to 150 to prevent main thread blocking while dragging
        const MAX_RES = 150;
        const scale = Math.min(MAX_RES / Math.max(width, 1), MAX_RES / Math.max(height, 1), 1);
        const cvsW = Math.max(1, Math.floor(width * scale));
        const cvsH = Math.max(1, Math.floor(height * scale));
        
        canvas.width = cvsW;
        canvas.height = cvsH;
        
        const imgData = ctx.createImageData(cvsW, cvsH);

        for(let py = 0; py < cvsH; py++) {
            for(let px = 0; px < cvsW; px++) {
                const normX = flipX ? (cvsW - 1 - px) / cvsW : px / cvsW;
                const normY = flipY ? (cvsH - 1 - py) / cvsH : py / cvsH;

                const valX = xType === 'c' ? getChromaFromNorm(normX) : (xType === 'l' ? getLightFromNorm(normX) : normX * xMax);
                const valY = yType === 'c' ? getChromaFromNorm(normY) : (yType === 'l' ? getLightFromNorm(normY) : normY * yMax);

                let pxL = fixedVal, pxC = fixedVal, pxH = fixedVal;
                if (xType === 'l') pxL = valX; else if (xType === 'c') pxC = valX; else pxH = valX;
                if (yType === 'l') pxL = valY; else if (yType === 'c') pxC = valY; else pxH = valY;

                const gamutStatus = checkGamut(pxL, pxC, pxH);
                const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;

                const rgb = rawLchToRgb(pxL, pxC, pxH);
                let r = Math.max(0, Math.min(255, rgb.r));
                let g = Math.max(0, Math.min(255, rgb.g));
                let b = Math.max(0, Math.min(255, rgb.b));

                const i = (py * cvsW + px) * 4;
                imgData.data[i] = r;
                imgData.data[i+1] = g;
                imgData.data[i+2] = b;
                imgData.data[i+3] = isOut ? 64 : 255;
            }
        }
        ctx.putImageData(imgData, 0, 0);
    }, [fixedVal, xType, yType, flipX, flipY, displayGamut, xMax, yMax, width, height, isDark, getChromaFromNorm, getLightFromNorm]);

    const handlePointer = useCallback((e) => {
        if (!containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        
        let normX = (e.clientX - rect.left) / rect.width;
        let normY = (e.clientY - rect.top) / rect.height;
        normX = Math.max(0, Math.min(1, normX));
        normY = Math.max(0, Math.min(1, normY));

        if (flipX) normX = 1 - normX;
        if (flipY) normY = 1 - normY;

        const valX = xType === 'c' ? getChromaFromNorm(normX) : (xType === 'l' ? getLightFromNorm(normX) : normX * xMax);
        const valY = yType === 'c' ? getChromaFromNorm(normY) : (yType === 'l' ? getLightFromNorm(normY) : normY * yMax);

        let newL = l, newC = c, newH = h;
        if (xType === 'l') newL = valX; else if (xType === 'c') newC = valX; else newH = valX;
        if (yType === 'l') newL = valY; else if (yType === 'c') newC = valY; else newH = valY;

        updateColor(newL, newC, newH);
    }, [flipX, flipY, l, c, h, updateColor, xType, yType, xMax, yMax, getChromaFromNorm, getLightFromNorm]);

    let crossX = xType === 'c' ? getNormFromChroma(activeXVal) : (xType === 'l' ? getNormFromLight(activeXVal) : activeXVal / xMax);
    let crossY = yType === 'c' ? getNormFromChroma(activeYVal) : (yType === 'l' ? getNormFromLight(activeYVal) : activeYVal / yMax);
    if (flipX) crossX = 1 - crossX;
    if (flipY) crossY = 1 - crossY;

    return (
        <div 
            ref={containerRef}
            className="relative overflow-hidden cursor-crosshair touch-none"
            style={{ width: width, height: height }}
            onPointerDown={(e) => { isDragging.current = true; handlePointer(e); containerRef.current.setPointerCapture(e.pointerId); }}
            onPointerMove={(e) => { if (isDragging.current) handlePointer(e); }}
            onPointerUp={(e) => { isDragging.current = false; containerRef.current.releasePointerCapture(e.pointerId); }}
            onPointerCancel={(e) => { isDragging.current = false; containerRef.current.releasePointerCapture(e.pointerId); }}
        >
            <canvas ref={canvasRef} className="w-full h-full object-fill pointer-events-none relative z-10" />
            <div 
                className="absolute pointer-events-none w-5 h-5 -ml-2.5 -mt-2.5 rounded-full border-[1.5px] border-white crosshair-shadow flex items-center justify-center z-50 transition-none"
                style={{ left: `${crossX * 100}%`, top: `${crossY * 100}%` }}
            >
                <div className="w-1 h-1 bg-white rounded-full shadow-[0_0_0_1px_rgba(0,0,0,0.6)]"></div>
            </div>
        </div>
    );
 });

 const Lch3DView = memo(({ l, c, h, displayGamut, isDark, matrixLOD, lightRanges, chromaRanges, hueValues, groupBackgrounds, sceneRotationRef }) => {
    const containerRef = useRef(null);
    
    useEffect(() => {
        if (typeof window === 'undefined' || !window.THREE || !containerRef.current) return;
        const w = containerRef.current.clientWidth;
        const h_canvas = containerRef.current.clientHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, w / h_canvas, 1, 1000);
        camera.position.set(0, 50, 260);
        camera.lookAt(0, 0, 0);

        // Memory Safe Context Init
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(w, h_canvas);
        renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
        containerRef.current.innerHTML = '';
        containerRef.current.appendChild(renderer.domElement);

        const isGrid = matrixLOD === 'grid';
        const isMacro = matrixLOD === 'macro';
        const isSeamless = matrixLOD === 'seamless';

        const gapMult = isGrid ? 0.85 : 1.01;
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        
        // FIX: Removed vertexColors=true so individual Float32 Array colors render correctly via instanceColor
        const inMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.25, depthWrite: false });
        const outMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.01, depthWrite: false });
        const highlightMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 1.0, depthWrite: true, depthTest: false });
        
        const maxInstances = lightRanges.length * chromaRanges.length * hueValues.length;
        let inInstanced, outInstanced, highlightInstanced;
        const pts = []; 

        if (isGrid || isMacro) {
            inInstanced = new THREE.InstancedMesh(boxGeo, inMat, maxInstances);
            outInstanced = new THREE.InstancedMesh(boxGeo, outMat, maxInstances);
            highlightInstanced = new THREE.InstancedMesh(boxGeo, highlightMat, maxInstances);
            
            // Explicitly map all colors for highlightInstanced immediately so buffer exists
            const tempCol = new THREE.Color(0xffffff);
            for(let i=0; i<maxInstances; i++) highlightInstanced.setColorAt(i, tempCol);
            
            highlightInstanced.count = 0;
            highlightInstanced.renderOrder = 997; // Keep above clouds

            let inCount = 0; let outCount = 0;
            const dummy = new THREE.Object3D();
            const color = new THREE.Color();

            for (let lI = 0; lI < lightRanges.length; lI++) {
                const lr = lightRanges[lI];
                if (lr.mid === undefined) continue;
                for (let cI = 0; cI < chromaRanges.length; cI++) {
                    const cr = chromaRanges[cI];
                    if (cr.mid === undefined) continue;
                    
                    if ((lI === 0 || lI === lightRanges.length - 1) && cI > 0) continue;
                    
                    const isSing = cI === 0 || lI === 0 || lI === lightRanges.length - 1;
                    const hMax = isSing ? 1 : hueValues.length;
                    
                    for (let hI = 0; hI < hMax; hI++) {
                        const H = isSing ? 0 : hueValues[hI];
                        const L = lr.mid;
                        const C = isSing ? 0 : cr.mid;
                        
                        const gamut = checkGamut(L, C, H);
                        const valid = displayGamut === 'p3' ? gamut.isP3 : gamut.isSRGB;
                        
                        const rad = H * Math.PI / 180;
                        dummy.position.set(C * Math.cos(rad), L - 50, C * Math.sin(rad));
                        dummy.rotation.y = -rad;
                        
                        const dL = Math.max(0.5, lr.max - lr.min); 
                        const dC = Math.max(0.5, cr.max - cr.min);
                        const dH = isSing ? Math.PI*2 : 3 * Math.PI / 180;
                        const arc = isSing ? 4 : Math.max(0.5, C * dH);
                        
                        if (isSing) {
                            dummy.scale.set(4 * gapMult, dL * gapMult, 4 * gapMult);
                        } else {
                            dummy.scale.set(dC * gapMult, dL * gapMult, arc * gapMult);
                        }
                        dummy.updateMatrix();
                        
                        let r = 0, g = 0, b = 0;
                        let gId = 'darkGray';
                        if (C <= 5) {
                            if (L >= 90) gId = 'white';
                            else if (L < 20) gId = 'black';
                            else if (L >= 70) gId = 'lightGray';
                            else if (L >= 45) gId = 'mediumGray';
                        } else {
                            const hueGroup = Math.floor(((H + 15) % 360) / 30);
                            const quadGroup = L < 63 ? (C < 40 ? 0 : 1) : (C >= 40 ? 2 : 3);
                            gId = `h${hueGroup}-q${quadGroup}`;
                        }

                        if (isMacro) {
                            let gObj = groupBackgrounds.darkGray;
                            if (gId === 'white') gObj = groupBackgrounds.white;
                            else if (gId === 'black') gObj = groupBackgrounds.black;
                            else if (gId === 'lightGray') gObj = groupBackgrounds.lightGray;
                            else if (gId === 'mediumGray') gObj = groupBackgrounds.mediumGray;
                            else if (gId === 'darkGray') gObj = groupBackgrounds.darkGray;
                            else {
                                const match = gId.match(/h(\d+)-q(\d+)/);
                                if (match) gObj = groupBackgrounds.quads[parseInt(match[1])][parseInt(match[2])];
                            }
                            if (gObj && typeof gObj.r === 'number' && !isNaN(gObj.r)) {
                                r = gObj.r; g = gObj.g; b = gObj.b;
                            } else {
                                const rgbFallback = rawLchToRgb(L, C, H);
                                r = rgbFallback.r; g = rgbFallback.g; b = rgbFallback.b;
                            }
                        } else {
                            const rgb = rawLchToRgb(L, C, H);
                            r = rgb.r; g = rgb.g; b = rgb.b;
                        }

                        color.setRGB(
                            Math.max(0, Math.min(255, r)) / 255, 
                            Math.max(0, Math.min(255, g)) / 255, 
                            Math.max(0, Math.min(255, b)) / 255
                        );

                        const cellKey = `${lI}-${cI}-${isSing ? 0 : hI}`;
                        pts.push({
                            matrix: dummy.matrix.clone(),
                            color: color.clone(),
                            valid,
                            cellKey,
                            gId,
                            isSing,
                            L, C, H
                        });

                        if (valid) {
                            inInstanced.setMatrixAt(inCount, dummy.matrix);
                            inInstanced.setColorAt(inCount, color);
                            inCount++;
                        } else {
                            outInstanced.setMatrixAt(outCount, dummy.matrix);
                            outInstanced.setColorAt(outCount, color);
                            outCount++;
                        }
                    }
                }
            }
            
            inInstanced.count = inCount;
            inInstanced.instanceMatrix.needsUpdate = true;
            if(inInstanced.instanceColor) inInstanced.instanceColor.needsUpdate = true;
            
            outInstanced.count = outCount;
            outInstanced.instanceMatrix.needsUpdate = true;
            if(outInstanced.instanceColor) outInstanced.instanceColor.needsUpdate = true;
            
            scene.add(inInstanced);
            scene.add(outInstanced);
            scene.add(highlightInstanced);
        }

        let seamlessMarker = null;
        let cylGeo = null, cMat = null, cylMesh = null;
        let axisGroup = null;

        if (isSeamless) {
            cylGeo = new THREE.CylinderGeometry(1, 1, 100, 72, 50, false);
            const cpos = cylGeo.attributes.position;
            const ccol = new Float32Array(cpos.count * 3);
            
            for (let i = 0; i < cpos.count; i++) {
                const cy = cpos.getY(i);
                const cL = Math.min(100, Math.max(0, cy + 50));
                const cpx = cpos.getX(i);
                const cpz = cpos.getZ(i);
                
                let cH = Math.atan2(cpz, cpx) * (180 / Math.PI);
                if (cH < 0) cH += 360;
                
                let bestC = 0;
                if (cL > 0 && cL < 100) {
                    let minC = 0, maxC = 140;
                    for(let j=0; j<15; j++){
                        const midC = (minC + maxC) / 2;
                        const gamut = checkGamut(cL, midC, cH);
                        if(displayGamut === 'p3' ? gamut.isP3 : gamut.isSRGB) {
                            bestC = midC;
                            minC = midC;
                        } else {
                            maxC = midC;
                        }
                    }
                }
                
                const rad = cH * (Math.PI / 180);
                cpos.setXYZ(i, bestC * Math.cos(rad), cy, bestC * Math.sin(rad));
                const crgb = realLchToRgb(cL, bestC, cH); 
                ccol[i*3] = crgb.r/255; ccol[i*3+1] = crgb.g/255; ccol[i*3+2] = crgb.b/255;
            }
            
            cylGeo.setAttribute('color', new THREE.BufferAttribute(ccol, 3));
            cylGeo.computeVertexNormals();
            
            // ONLY Seamless CylGeo needs vertexColors=true
            cMat = new THREE.MeshStandardMaterial({ 
                vertexColors: true, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.25,
                roughness: 0.4,
                depthWrite: false
            });
            cylMesh = new THREE.Mesh(cylGeo, cMat);
            scene.add(cylMesh);

            // NEW: Outer Smooth Ghost Cylinder (1% LCH boundary for Seamless Mode)
            const outerCylGeo = new THREE.CylinderGeometry(1, 1, 100, 72, 50, false);
            const opos = outerCylGeo.attributes.position;
            const ocol = new Float32Array(opos.count * 3);
            
            for (let i = 0; i < opos.count; i++) {
                const cy = opos.getY(i);
                const cL = Math.min(100, Math.max(0, cy + 50));
                const cpx = opos.getX(i);
                const cpz = opos.getZ(i);
                
                let cH = Math.atan2(cpz, cpx) * (180 / Math.PI);
                if (cH < 0) cH += 360;
                
                const rad = cH * (Math.PI / 180);
                // Push to the absolute maximum limit of the coordinate space (C = 140)
                opos.setXYZ(i, 140 * Math.cos(rad), cy, 140 * Math.sin(rad));
                const crgb = rawLchToRgb(cL, 140, cH); 
                ocol[i*3] = crgb.r/255; ocol[i*3+1] = crgb.g/255; ocol[i*3+2] = crgb.b/255;
            }
            
            outerCylGeo.setAttribute('color', new THREE.BufferAttribute(ocol, 3));
            outerCylGeo.computeVertexNormals();
            
            const oMat = new THREE.MeshBasicMaterial({ 
                vertexColors: true, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.02,
                depthWrite: false
            });
            const outerCylMesh = new THREE.Mesh(outerCylGeo, oMat);
            scene.add(outerCylMesh);

            seamlessMarker = new THREE.Group();
            const sSphereGeo = new THREE.SphereGeometry(3, 16, 16);
            const sSphereMat = new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false });
            const sSphere = new THREE.Mesh(sSphereGeo, sSphereMat);
            sSphere.renderOrder = 998;
            
            const sRingGeo = new THREE.RingGeometry(3.5, 4.5, 32);
            const sRingMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide, depthTest: false });
            const sRing = new THREE.Mesh(sRingGeo, sRingMat);
            sRing.renderOrder = 999;
            sRing.rotation.x = Math.PI / 2;
            sSphere.add(sRing);

            axisGroup = new THREE.Group();
            const axisMat = new THREE.LineBasicMaterial({ color: isDark ? 0xffffff : 0x000000, transparent: true, opacity: 0.5 });
            const lxGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-150, 0, 0), new THREE.Vector3(150, 0, 0)]);
            const lyGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, -120, 0), new THREE.Vector3(0, 120, 0)]);
            const lzGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, -150), new THREE.Vector3(0, 0, 150)]);
            axisGroup.add(new THREE.Line(lxGeo, axisMat));
            axisGroup.add(new THREE.Line(lyGeo, axisMat));
            axisGroup.add(new THREE.Line(lzGeo, axisMat));
            
            seamlessMarker.add(sSphere);
            seamlessMarker.add(axisGroup);
            scene.add(seamlessMarker);
        }

        const markerGroup = new THREE.Group();
        const mMeshMat = new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false, transparent: true, opacity: 1.0 });
        const mMesh = new THREE.Mesh(boxGeo, mMeshMat);
        mMesh.renderOrder = 998;
        const mEdgeGeo = new THREE.EdgesGeometry(boxGeo);
        const mEdgeMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2, depthTest: false, transparent: true, opacity: 1.0 });
        const mEdge = new THREE.LineSegments(mEdgeGeo, mEdgeMat);
        mEdge.renderOrder = 999;
        markerGroup.add(mMesh);
        markerGroup.add(mEdge);
        scene.add(markerGroup);

        if (isSeamless) markerGroup.visible = false;

        let macroBoundary = new THREE.Group();
        scene.add(macroBoundary);

        containerRef.current._lastUpdateId = null;

        containerRef.current._updateMarker = (lVal, cVal, hVal) => {
            if (isSeamless) {
                const rad = hVal * (Math.PI / 180);
                seamlessMarker.position.set(cVal * Math.cos(rad), lVal - 50, cVal * Math.sin(rad));
                const rgb = realLchToRgb(lVal, cVal, hVal);
                seamlessMarker.children[0].material.color.setRGB(rgb.r / 255, rgb.g / 255, rgb.b / 255);
                axisGroup.rotation.y = -rad;
                return;
            }

            const cLIdx = getRangeIndex(lVal, lightRanges);
            const cCIdx = getRangeIndex(cVal, chromaRanges);
            let cHIdx = 0; let minHDiff = 360;
            hueValues.forEach((hV, idx) => {
                let diff = Math.abs(hV - hVal);
                if(diff > 180) diff = 360 - diff; 
                if(diff < minHDiff) { minHDiff = diff; cHIdx = idx; }
            });

            const isSing = cCIdx === 0 || cLIdx === 0 || cLIdx === lightRanges.length - 1;
            const activeCellKey = `${cLIdx}-${cCIdx}-${isSing ? 0 : cHIdx}`;
            
            let targetGId = 'darkGray';
            const evalC = isSing ? 0 : chromaRanges[cCIdx]?.mid ?? cVal;
            const evalL = lightRanges[cLIdx]?.mid ?? lVal;
            const evalH = isSing ? 0 : hueValues[cHIdx];

            if (evalC <= 5) {
                if (evalL >= 90) targetGId = 'white';
                else if (evalL < 20) targetGId = 'black';
                else if (evalL >= 70) targetGId = 'lightGray';
                else if (evalL >= 45) targetGId = 'mediumGray';
            } else {
                const hueGroup = Math.floor(((evalH + 15) % 360) / 30);
                const quadGroup = evalL < 63 ? (evalC < 40 ? 0 : 1) : (evalC >= 40 ? 2 : 3);
                targetGId = `h${hueGroup}-q${quadGroup}`;
            }

            if (isMacro) targetGId = getGroupId(lVal, cVal, hVal);

            const updateId = isMacro ? targetGId : activeCellKey;
            
            if (containerRef.current._lastUpdateId !== updateId) {
                containerRef.current._lastUpdateId = updateId;
                let hCount = 0;
                const highlightColor = new THREE.Color();
                
                if (isMacro) {
                    for (let i = 0; i < pts.length; i++) {
                        const p = pts[i];
                        if (p.gId === targetGId && p.valid) {
                            highlightInstanced.setMatrixAt(hCount, p.matrix);
                            highlightColor.copy(p.color);
                            highlightInstanced.setColorAt(hCount, highlightColor);
                            hCount++;
                        }
                    }
                    highlightInstanced.count = hCount;
                    highlightInstanced.instanceMatrix.needsUpdate = true;
                    if(highlightInstanced.instanceColor) highlightInstanced.instanceColor.needsUpdate = true;

                    // Rebuild macro border
                    while(macroBoundary.children.length > 0) {
                        const c = macroBoundary.children[0];
                        macroBoundary.remove(c);
                        if(c.geometry) c.geometry.dispose();
                        if(c.material) c.material.dispose();
                    }

                    let minL, maxL, minC, maxC, minH, maxH;
                    if (targetGId === 'white') { minL = 90; maxL = 100; minC = 0; maxC = 5; minH = 0; maxH = 360; }
                    else if (targetGId === 'black') { minL = 0; maxL = 20; minC = 0; maxC = 5; minH = 0; maxH = 360; }
                    else if (targetGId === 'lightGray') { minL = 70; maxL = 90; minC = 0; maxC = 5; minH = 0; maxH = 360; }
                    else if (targetGId === 'mediumGray') { minL = 45; maxL = 70; minC = 0; maxC = 5; minH = 0; maxH = 360; }
                    else if (targetGId === 'darkGray') { minL = 20; maxL = 45; minC = 0; maxC = 5; minH = 0; maxH = 360; }
                    else {
                        const match = targetGId.match(/h(\d+)-q(\d+)/);
                        if (match) {
                            const hGroup = parseInt(match[1]);
                            const qGroup = parseInt(match[2]);
                            minH = hGroup * 30 - 15; maxH = minH + 30;
                            minL = qGroup < 2 ? 0 : 63; maxL = qGroup < 2 ? 63 : 100;
                            minC = (qGroup % 2 === 0) ? 5 : 40; maxC = (qGroup % 2 === 0) ? 40 : 140;
                        }
                    }

                    const shape = new THREE.Shape();
                    const startRad = minH * Math.PI / 180;
                    const endRad = maxH * Math.PI / 180;
                    
                    shape.absarc(0, 0, maxC, startRad, endRad, false);
                    if (minC > 0) {
                        shape.lineTo(minC * Math.cos(endRad), minC * Math.sin(endRad));
                        shape.absarc(0, 0, minC, endRad, startRad, true);
                        shape.lineTo(maxC * Math.cos(startRad), maxC * Math.sin(startRad));
                    } else {
                        shape.lineTo(0,0);
                    }
                    
                    const extrudeSettings = { depth: maxL - minL, curveSegments: 32, bevelEnabled: false, steps: 1 };
                    const shapeGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                    
                    // FIX: Rotate mathematically correctly so the wireframe faces outward instead of backward.
                    shapeGeo.rotateX(Math.PI / 2); 
                    shapeGeo.translate(0, maxL - 50, 0);

                    const edges = new THREE.EdgesGeometry(shapeGeo);
                    const lineMat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.8, depthTest: false });
                    const line = new THREE.LineSegments(edges, lineMat);
                    line.renderOrder = 999;
                    macroBoundary.add(line);
                    shapeGeo.dispose();
                }
            }

            // Always update the active cell marker outline/core
            const lr = lightRanges[cLIdx];
            const cr = chromaRanges[cCIdx];

            const C = isSing ? 0 : cr.mid;
            const L = lr.mid;
            const H = isSing ? 0 : hueValues[cHIdx];
            const rad = H * Math.PI / 180;
            
            markerGroup.position.set(C * Math.cos(rad), L - 50, C * Math.sin(rad));
            markerGroup.rotation.y = -rad;
            
            const dL = Math.max(0.5, lr.max - lr.min); 
            const dC = Math.max(0.5, cr.max - cr.min);
            const dH = isSing ? Math.PI*2 : 3 * Math.PI / 180;
            const arc = isSing ? 4 : Math.max(0.5, C * dH);
            
            const mGapMult = isGrid ? 0.95 : 1.05;
            
            if (isSing) {
                markerGroup.scale.set(4 * mGapMult, dL * mGapMult, 4 * mGapMult);
            } else {
                markerGroup.scale.set(dC * mGapMult, dL * mGapMult, arc * mGapMult);
            }
            
            const rgb = realLchToRgb(L, C, H);
            mMeshMat.color.setRGB(rgb.r/255, rgb.g/255, rgb.b/255);
        };
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight.position.set(100, 200, 100);
        scene.add(dirLight);

        const matLine = new THREE.LineBasicMaterial({ color: isDark ? 0xffffff : 0x000000, transparent: true, opacity: 0.15 });
        const pointsLine = [new THREE.Vector3(0, -50, 0), new THREE.Vector3(0, 50, 0)];
        const geoLine = new THREE.BufferGeometry().setFromPoints(pointsLine);
        const line = new THREE.Line(geoLine, matLine);
        scene.add(line);

        // PERSISTENT ROTATION STATE
        scene.rotation.x = sceneRotationRef.current.x;
        scene.rotation.y = sceneRotationRef.current.y;

        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        const onDown = (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; };
        const onUp = () => { isDragging = false; };
        const onMove = (e) => {
            if (isDragging) {
                const dx = e.clientX - prevMouse.x;
                const dy = e.clientY - prevMouse.y;
                scene.rotation.y += dx * 0.01;
                scene.rotation.x += dy * 0.01;
                sceneRotationRef.current.x = scene.rotation.x;
                sceneRotationRef.current.y = scene.rotation.y;
                prevMouse = { x: e.clientX, y: e.clientY };
            }
        };

        const canvasDom = renderer.domElement;
        canvasDom.addEventListener('pointerdown', onDown);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('pointermove', onMove);

        let reqId;
        const loop = () => {
            reqId = requestAnimationFrame(loop);
            renderer.render(scene, camera);
        };
        loop(); 

        const onResize = () => {
            if (!containerRef.current) return;
            const nw = containerRef.current.clientWidth;
            const nh = containerRef.current.clientHeight;
            camera.aspect = nw / nh;
            camera.updateProjectionMatrix();
            renderer.setSize(nw, nh);
        };
        window.addEventListener('resize', onResize);

        // INITIAL UPDATE SYNC
        if (containerRef.current._updateMarker) {
            containerRef.current._updateMarker(l, c, h);
        }

        return () => {
            cancelAnimationFrame(reqId);
            window.removeEventListener('resize', onResize);
            window.removeEventListener('pointerup', onUp);
            window.removeEventListener('pointermove', onMove);
            if (canvasDom) canvasDom.removeEventListener('pointerdown', onDown);
            if (containerRef.current) containerRef.current.innerHTML = '';
            
            scene.traverse((object) => {
                if (object.isMesh || object.isLine || object.isPoints) {
                    if (object.geometry) object.geometry.dispose();
                    if (object.material) {
                        if (Array.isArray(object.material)) object.material.forEach(m => m.dispose());
                        else object.material.dispose();
                    }
                }
            });
            renderer.dispose();
            renderer.forceContextLoss(); 
        };
    }, [displayGamut, isDark, matrixLOD, lightRanges, chromaRanges, hueValues, groupBackgrounds, sceneRotationRef]);

    useEffect(() => {
        if (containerRef.current && containerRef.current._updateMarker) {
            containerRef.current._updateMarker(l, c, h);
        }
    }, [l, c, h, matrixLOD, displayGamut, isDark]);

    return (
        <div className="w-full h-full relative bg-slate-50 dark:bg-black rounded-xl overflow-hidden shadow-inner border border-slate-200 dark:border-neutral-800 transition-colors duration-300">
            <div ref={containerRef} className="w-full h-full cursor-move touch-none" />
            <div className="absolute top-4 left-4 bg-white/90 dark:bg-black/80 backdrop-blur text-slate-800 dark:text-neutral-200 text-[10px] uppercase font-bold px-3 py-1.5 rounded-lg shadow-sm border border-black/10 dark:border-white/10 pointer-events-none z-10 flex items-center gap-2">
                <CrosshairIcon className="w-3 h-3 text-blue-500" /> Drag to Rotate
            </div>
        </div>
    );
 });

 const MatrixCell = memo(({ rI, cI, isActive, isLocked, cellL, cellC, lVal, cVal, hVal, noun, adj, displayGamut, onClick, isMacro, isActiveMacro, borders, groupBg, groupL, showGroupName, zoom, isDupe, exactDot }) => {

            <div onClick={() => onClick(lVal, cVal, hVal)} 
                className={`w-full h-full flex flex-col items-center justify-center relative ease-[cubic-bezier(0.34,1.56,0.64,1)] overflow-hidden ${modeClasses}`}
                style={{ ...radiusStyles, ...borderStyles }}
                data-active={isActive}>
                
                <div className={`absolute inset-0 pointer-events-none transition-opacity duration-300`}
                     style={{ backgroundColor: activeBg }}>
                </div>

                <div className={`relative z-30 w-full h-full flex flex-col items-center justify-center pointer-events-none`} style={{ color: activeL > 55 ? 'black' : 'white' }}>
                    {!isMacro && isLocked && zoom >= 0.9 && <div className="absolute top-1 right-1 opacity-70"><Lock className="w-2.5 h-2.5" /></div>}
                    {!isMacro && zoom >= 0.9 && <div className={`font-bold leading-none mb-0.5 text-[9px] px-1 text-center truncate w-full ${isDupe ? 'text-red-500 drop-shadow-md' : 'opacity-70'}`}>{adj}</div>}
                    {!isMacro && zoom >= 0.9 && <div className={`leading-none opacity-90 text-[8px] px-1 text-center truncate w-full`}>{noun}</div>}
                    
                    {/* Exact Slider Position Dot */}
                    {!isMacro && exactDot && (
                        <div className="absolute w-2.5 h-2.5 rounded-full pointer-events-none z-[100] transform -translate-x-1/2 -translate-y-1/2 transition-all duration-100 ease-out border shadow-sm ring-1 ring-blue-500/50"
                             style={{ 
                                left: `${exactDot.x}%`, top: `${exactDot.y}%`,
                                backgroundColor: activeL > 55 ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.4)',
                                borderColor: activeL > 55 ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.2)'
                             }}>
                        </div>
                    )}
                    
                    {isMacro && isActive && (
                        <div className="w-6 h-6 rounded-full border-[1.5px] border-white crosshair-shadow flex items-center justify-center">
                            <div className="w-1.5 h-1.5 bg-white rounded-full shadow-[0_0_0_1px_rgba(0,0,0,0.6)]"></div>
                        </div>
                    )}
                </div>

            {isMacro && showGroupName && (

                    <span className={`font-black tracking-widest uppercase whitespace-nowrap px-3 py-1.5 rounded-full shadow-lg backdrop-blur-md ${isDupe ? 'ring-4 ring-red-500 text-red-500' : ''}`}
                          style={{
                              fontSize: `12px`,
                              backgroundColor: activeL > 55 ? 'rgba(255, 255, 255, 0.65)' : 'rgba(0, 0, 0, 0.55)',

            )}
        </td>
    );
 });

 const MatrixTable = ({ yData, xData, yLabel, xLabel, renderCell, activeIds, interactionSource, zoom, setZoom, matrixLOD, h, c, l, flipX, flipY, displayGamut, updateColor, isDark }) => { 
    const containerRef = useRef(null);
    const activeRowIdx = activeIds.r;
    const activeColIdx = activeIds.c;

    const isSeamless = matrixLOD === 'seamless';
    const isMacro = matrixLOD === 'macro';
    const xType = xLabel.toLowerCase();
    const yType = yLabel.toLowerCase();
    const fixedType = ['l', 'c', 'h'].find(t => t !== xType && t !== yType);
    const fixedVal = fixedType === 'l' ? l : fixedType === 'c' ? c : h;

    const zoomRef = useRef(zoom);
    useEffect(() => { zoomRef.current = zoom; }, [zoom]);

    useEffect(() => {
        if (interactionSource && interactionSource.current === 'click') {
            interactionSource.current = null;
            return;
        }
        if (containerRef.current) {
            const activeEl = containerRef.current.querySelector('[data-active="true"]');
            if (activeEl) {
                activeEl.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'nearest' });
            }
        }
    }, [activeRowIdx, activeColIdx, interactionSource, zoom]);

    useEffect(() => {
        const el = containerRef.current;
        if (!el) return;

        const handleWheel = (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                setZoom(Math.min(Math.max(0.1, zoomRef.current - e.deltaY * 0.01), 3.0));
            }
        };

        let initDist = 0;
        let initZ = 1;
        
        const handleTouchStart = (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                initDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initZ = zoomRef.current;
            }
        };
        
        const handleTouchMove = (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const scale = dist / initDist;
                setZoom(Math.min(Math.max(0.1, initZ * scale), 3.0));
            }
        };

        el.addEventListener('wheel', handleWheel, { passive: false });
        el.addEventListener('touchstart', handleTouchStart, { passive: false });
        el.addEventListener('touchmove', handleTouchMove, { passive: false });

        return () => {
            el.removeEventListener('wheel', handleWheel);
            el.removeEventListener('touchstart', handleTouchStart);
            el.removeEventListener('touchmove', handleTouchMove);
        };
    }, [setZoom]);

    return ( 
    <div 
        ref={containerRef} 
        className={`h-full w-full overflow-auto rounded-xl border border-slate-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 shadow-sm flex flex-col relative custom-scroll`}> 
        <div style={{ transformOrigin: 'top left' }}> 
            <table className={`min-w-max text-[10px] text-center table-fixed relative z-10 pointer-events-none border-collapse border-spacing-0`}> 
                <thead> 
                    <tr> 
                        <th className="p-2 text-slate-400 dark:text-neutral-500 font-mono text-left bg-white dark:bg-neutral-950 sticky top-0 z-40 border-b border-slate-100 dark:border-neutral-900 pointer-events-auto w-20 min-w-[5rem]">
                            {zoom >= 0.9 && <span>{yLabel}\{xLabel}</span>}
                        </th> 
                        {xData.map((col) => ( 
                        <th key={col.index} style={{ width: 64 * zoom, minWidth: 64 * zoom, maxWidth: 64 * zoom }} className={`p-1 font-bold border-b border-slate-100 dark:border-neutral-900 bg-white dark:bg-neutral-950 sticky top-0 z-40 pointer-events-auto box-border ${col.isActive ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 ring-inset ring-2 ring-blue-500/20 dark:ring-blue-400/30 rounded-t' : 'text-slate-500 dark:text-neutral-400'}`}> 
                            <div className="flex flex-col items-center justify-center overflow-hidden w-full h-full px-0.5">
                                {zoom >= 0.9 && <span className="text-xs truncate w-full">{col.label}</span>}
                                {zoom >= 0.9 && col.data && (<span className="text-[8px] font-normal opacity-50 font-mono truncate w-full">{col.data.min === col.data.max ? col.data.min : `${col.data.min}-${col.data.max}`}</span>)}
                            </div> 
                        </th> 
                        ))} 
                    </tr> 
                </thead> 
                <tbody className="pointer-events-auto"> 
                    {yData.map((row, rI) => (
                        <tr key={row.index}>
                            <td style={{ height: 64 * zoom, minHeight: 64 * zoom, maxHeight: 64 * zoom }} className={`p-1 font-bold border-r border-slate-100 dark:border-neutral-900 text-left bg-white dark:bg-neutral-950 sticky left-0 z-30 w-20 min-w-[5rem] box-border ${row.isActive ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 ring-inset ring-2 ring-blue-500/20 dark:ring-blue-400/30 rounded-l' : 'text-slate-500 dark:text-neutral-400'}`}>
                                <div className="flex flex-col items-start justify-center overflow-hidden w-full h-full pl-1">
                                    {zoom >= 0.9 && <span className="text-xs truncate w-full leading-none">{row.label}</span>}
                                    {zoom >= 0.9 && row.data && (<span className="text-[8px] font-normal opacity-50 font-mono truncate w-full mt-0.5 leading-none">{row.data.min === row.data.max ? row.data.min : `${row.data.min}-${row.data.max}`}</span>)}
                                </div>
                            </td>
                            {isSeamless && rI === 0 && (
                                <td rowSpan={yData.length} colSpan={xData.length} className="p-0 border-none relative align-top">
                                    <ContinuousSpace 
                                        xType={xType} yType={yType} 
                                        fixedType={fixedType} fixedVal={fixedVal}
                                        h={h} c={c} l={l}
                                        flipX={flipX} flipY={flipY}
                                        displayGamut={displayGamut}
                                        updateColor={updateColor}
                                        width={xData.length * 64 * zoom}
                                        height={yData.length * 64 * zoom}
                                        isDark={isDark}
                                    />
                                </td>
                            )}
                            {!isSeamless && xData.map((col) => renderCell(row.index, col.index))}
                        </tr>
                    ))} 
                </tbody> 
            </table> 
        </div>
    </div> 
    ) 
 }; 

 const HarmonySwatch = ({ offset, label, currentH, currentL, currentC, onSelect, displayGamut }) => { 
    let harmH = (currentH + offset) % 360; 
    if (harmH < 0) harmH += 360; 
    
    let harmL = currentL; 
    let harmC = currentC; 
    
    const gamutStatus = checkGamut(harmL, harmC, harmH);
    const swatchColor = getMappedCssColor(harmL, harmC, harmH, displayGamut);
    
    const isOutOfGamut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;

    return ( 
    <div onClick={() => onSelect(harmH)} className="flex flex-col items-center gap-1 cursor-pointer group shrink-0"> 
        <div className="w-8 h-8 rounded-full shadow-sm border border-black/10 dark:border-white/10 group-hover:scale-110 transition-transform relative overflow-hidden" 
            style={{backgroundColor: swatchColor}}>
            {isOutOfGamut && <div className="absolute inset-0 opacity-100 pointer-events-none" style={{backgroundImage: 'repeating-linear-gradient(45deg, var(--hatch-dark) 0px, var(--hatch-dark) 4px, var(--hatch-light) 4px, var(--hatch-light) 8px)'}}></div>}
        </div> 
        <span className="text-[8px] font-bold text-slate-500 dark:text-neutral-400 uppercase">{label}</span> 
    </div> 
    ) 
 };
