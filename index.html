 <script type="text/babel"> 
 const { useState, useMemo, useEffect, useRef, useCallback, memo } = React; 

 const saveToLocal = (key, data) => localStorage.setItem(`colorsam_v185_${key}`, JSON.stringify(data));
 const getFromLocal = (key, fallback) => {
    try { 
        const stored = localStorage.getItem(`colorsam_v185_${key}`);
        return stored ? JSON.parse(stored) : fallback; 
    } catch(e) { return fallback; }
 };

 // --- W3C REFERENCE MATH ENGINE (D50 at 2° Observer) ---
 const lch2lab = (l, c, h) => {
    const hRad = (h * Math.PI) / 180;
    return [l, c * Math.cos(hRad), c * Math.sin(hRad)];
 };

 const lab2xyz = (l, a, b) => {
    const y = (l + 16) / 116;
    const x = a / 500 + y;
    const z = y - b / 200;
    const fInv = (n) => n > 0.20689655172413793 ? Math.pow(n, 3) : (116 * n - 16) / 903.2962962962963;
    const D50 = [0.96422, 1.00000, 0.82521]; 
    return [D50[0] * fInv(x), D50[1] * fInv(y), D50[2] * fInv(z)];
 };

 const xyz2lin_srgb = (X, Y, Z) => {
    const r =  3.1338561 * X - 1.6168667 * Y - 0.4906146 * Z;
    const g = -0.9787684 * X + 1.9161415 * Y + 0.0334540 * Z;
    const b =  0.0719453 * X - 0.2289914 * Y + 1.4052427 * Z;
    return [r, g, b];
 };

 const lin2srgb = (lin) => {
    const gamma = (v) => {
        let absV = Math.abs(v);
        let res = absV <= 0.0031308 ? 12.92 * absV : 1.055 * Math.pow(absV, 1/2.4) - 0.055;
        return v < 0 ? -res : res;
    };
    return [gamma(lin[0]), gamma(lin[1]), gamma(lin[2])];
 };

 const xyz2lin_p3 = (X, Y, Z) => {
    const r =  2.4039833 * X - 0.9898394 * Y - 0.3976295 * Z;
    const g = -0.8421528 * X + 1.7988085 * Y + 0.0163351 * Z;
    const b =  0.0482087 * X - 0.1093952 * Y + 1.6134379 * Z;
    return [r, g, b];
 };

 const inGamut = ([r, g, b]) => {
    const e = 0.001; 
    return r >= -e && r <= 1+e && g >= -e && g <= 1+e && b >= -e && b <= 1+e;
 };

 const realLchToRgb = (l, c, h) => {
    if (l >= 100) return { r: 255, g: 255, b: 255, outOfGamut: false };
    if (l <= 0) return { r: 0, g: 0, b: 0, outOfGamut: false };
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    let linRGB = xyz2lin_srgb(X, Y, Z);
    let outOfGamut = !inGamut(linRGB);
    
    if (outOfGamut) {
        let minC = 0; let maxC = c; let bestC = 0;
        for (let i = 0; i < 20; i++) {
            const midC = (minC + maxC) / 2;
            const [tL, ta, tb] = lch2lab(l, midC, h);
            const [tX, tY, tZ] = lab2xyz(tL, ta, tb);
            const tRGB = xyz2lin_srgb(tX, tY, tZ);
            if (inGamut(tRGB)) { bestC = midC; minC = midC; } else { maxC = midC; }
        }
        const [mL, ma, mb] = lch2lab(l, bestC, h);
        const [mX, mY, mZ] = lab2xyz(mL, ma, mb);
        linRGB = xyz2lin_srgb(mX, mY, mZ);
    }
    const [rr, gg, bb] = lin2srgb(linRGB);
    const clamp = (v) => Math.round(Math.max(0, Math.min(1, v)) * 255);
    return { r: clamp(rr), g: clamp(gg), b: clamp(bb), outOfGamut };
 };

 const rawLchToRgb = (l, c, h) => {
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    const linRGB = xyz2lin_srgb(X, Y, Z);
    const [rr, gg, bb] = lin2srgb(linRGB);
    return {
        r: Math.round(rr * 255),
        g: Math.round(gg * 255),
        b: Math.round(bb * 255)
    };
 };

 const checkGamutStatus = (l, c, h) => {
    if (l >= 100 || l <= 0) return { isSRGB: true, isP3: true }; 
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    const linSRGB = xyz2lin_srgb(X, Y, Z);
    const linP3 = xyz2lin_p3(X, Y, Z);
    return { isSRGB: inGamut(linSRGB), isP3: inGamut(linP3) };
 };
 
 const checkGamut = checkGamutStatus;

 const srgb2lin = (c) => {
    let v = c / 255;
    let absV = Math.abs(v);
    let res = absV <= 0.04045 ? absV / 12.92 : Math.pow((absV + 0.055) / 1.055, 2.4);
    return v < 0 ? -res : res;
 };

 const rgbToLchConvert = (r, g, b, currentH) => {
    let lr = srgb2lin(r), lg = srgb2lin(g), lb = srgb2lin(b);
    let x = 0.4360747 * lr + 0.3850649 * lg + 0.1430804 * lb;
    let y = 0.2225045 * lr + 0.7168786 * lg + 0.0606169 * lb;
    let z = 0.0139322 * lr + 0.0971045 * lg + 0.7141733 * lb;

    const f = (n) => n > 216/24389 ? Math.pow(n, 1/3) : (24389/27 * n + 16) / 116;
    let fx = f(x / 0.96422), fy = f(y / 1.0), fz = f(z / 0.82521);

    let L = 116 * fy - 16;
    let a_val = 500 * (fx - fy);
    let b_val = 200 * (fy - fz);

    let C = Math.sqrt(a_val*a_val + b_val*b_val);
    let H = Math.atan2(b_val, a_val) * (180 / Math.PI);
    if (H < 0) H += 360;
    return { l: Math.max(0, Math.min(100, L)), c: Math.max(0, C), h: C < 0.1 ? currentH : (isNaN(H) ? currentH : H) };
 };

 const hexToLchConvert = (hex, currentH) => {
    let clean = hex.replace(/[^0-9A-F]/gi, '');
    if (clean.length === 3) clean = clean.split('').map(c => c+c).join('');
    if (clean.length !== 6) return null;
    let r = parseInt(clean.substring(0,2), 16);
    let g = parseInt(clean.substring(2,4), 16);
    let b = parseInt(clean.substring(4,6), 16);
    return rgbToLchConvert(r, g, b, currentH);
 };

 const labToLchConvert = (l, a, b_val, currentH) => {
    let C = Math.sqrt(a*a + b_val*b_val);
    let H = Math.atan2(b_val, a) * (180 / Math.PI);
    if (H < 0) H += 360;
    return { l: Math.max(0, Math.min(100, l)), c: Math.max(0, C), h: C < 0.1 ? currentH : (isNaN(H) ? currentH : H) };
 };

 const getMappedCssColor = (l, c, h, gamut) => {
    if (l >= 100) return '#FFFFFF';
    if (l <= 0) return '#000000';
    
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    let linColor = gamut === 'p3' ? xyz2lin_p3(X, Y, Z) : xyz2lin_srgb(X, Y, Z);
    
    if (!inGamut(linColor)) {
        let minC = 0; let maxC = c; let bestC = 0;
        for (let i = 0; i < 20; i++) {
            const midC = (minC + maxC) / 2;
            const [tL, ta, tb] = lch2lab(l, midC, h);
            const [tX, tY, tZ] = lab2xyz(tL, ta, tb);
            const tLin = gamut === 'p3' ? xyz2lin_p3(tX, tY, tZ) : xyz2lin_srgb(tX, tY, tZ);
            if (inGamut(tLin)) { bestC = midC; minC = midC; } else { maxC = midC; }
        }
        const [mL, ma, mb] = lch2lab(l, bestC, h);
        const [mX, mY, mZ] = lab2xyz(mL, ma, mb);
        linColor = gamut === 'p3' ? xyz2lin_p3(mX, mY, mZ) : xyz2lin_srgb(mX, mY, mZ);
    }

    const [v1, v2, v3] = lin2srgb(linColor); 
    const clamp = (v) => Math.max(0, Math.min(1, v));
    
    if (gamut === 'p3') {
        return `color(display-p3 ${clamp(v1).toFixed(4)} ${clamp(v2).toFixed(4)} ${clamp(v3).toFixed(4)})`;
    } else {
        const r = Math.round(clamp(v1) * 255);
        const g = Math.round(clamp(v2) * 255);
        const b = Math.round(clamp(v3) * 255);
        return `rgb(${r},${g},${b})`;
    }
 };

 // --- CONSTANTS & MIGRATION DATA ---
 const HUE_RANGES_MAJOR = [
    "345° - 15°", "15° - 45°", "45° - 75°", "75° - 105°",
    "105° - 135°", "135° - 165°", "165° - 195°", "195° - 225°",
    "225° - 255°", "255° - 285°", "285° - 315°", "315° - 345°"
 ];

 const generateLightRanges = () => {
    const ranges = [{ label: "A", min: 0, max: 0, mid: 0 }]; 
    for (let i = 0; i < 19; i++) {
        const start = 1 + (i * 5);
        ranges.push({ label: String.fromCharCode(66 + i), min: start, max: start + 4, mid: start + 2 });
    }
    ranges.push({ label: "U", min: 96, max: 99, mid: 97.5 });
    ranges.push({ label: "V", min: 100, max: 100, mid: 100 });
    return ranges;
 };

 const generateChromaRanges = () => {
    const ranges = [{ label: "A", min: 0, max: 0, mid: 0 }];
    for (let i = 0; i < 14; i++) {
        const start = 1 + (i * 10);
        ranges.push({ label: String.fromCharCode(66 + i), min: start, max: start + 9, mid: start + 4.5 });
    }
    return ranges;
 };

 const NEW_LIGHT_RANGES = generateLightRanges();
 const NEW_CHROMA_RANGES = generateChromaRanges();
 const NEW_HUE_VALUES = Array.from({length: 120}, (_, i) => i * 3);
 const DEFAULT_ANCHORS = [{ label: "Dark", l: 25, c: 30 }, { label: "Light", l: 75, c: 30 }];

 const generateAdjectiveMatrix = () => {
    const lines = RAW_ADJECTIVES_CSV.trim().split('\n').map(l => l.trim()).filter(l => l && !l.toLowerCase().startsWith('l \\ c'));
    const matrix = Array(22).fill(null).map(() => Array(15).fill(""));

    lines.forEach(line => {
        const parts = line.split(',');
        const label = parts[0] || "";
        const match = label.match(/L(\d+)/i);
        if (match) {
            const lVal = parseInt(match[1]);
            if (lVal >= 1 && lVal <= 20) {
                const row = parts.slice(1, 16).map(s => s.trim());
                while(row.length < 15) row.push("");
                matrix[lVal] = row;
            }
        }
    });

    return matrix;
 };

 const generateNounData = () => {
    const lines = RAW_NOUNS_CSV.trim().split('\n').map(l => l.trim()).filter(l => l && !l.toLowerCase().startsWith('hue'));
    const nouns = Array(120).fill("Hue,Hue");
    
    lines.forEach((line) => {
        const parts = line.split(',');
        const angleMatch = (parts[0] || "").match(/\d+/);
        if (angleMatch) {
            const angle = parseInt(angleMatch[0]);
            const idx = Math.round(angle / 3);
            if (idx >= 0 && idx < 120) {
                nouns[idx] = `${(parts[1] || "Hue").trim()},${(parts[2] || "Hue").trim()}`;
            }
        }
    });
    return nouns;
 };

 const generateMajorGroups = () => {
    const lines = RAW_MAJOR_GROUPS_CSV.trim().split('\n').slice(1);
    return lines.map(line => {
        const parts = line.split(',');
        return parts.slice(1).map(s => s.trim());
    });
 };

 // Safely returns the index for a value within custom range maps
 const getRangeIndex = (val, ranges) => {
    const rounded = Math.round(val);
    let idx = ranges.findIndex(rg => rounded >= rg.min && rounded <= rg.max);
    if (idx !== -1) return idx;
    
    let closest = 0;
    let minDiff = Infinity;
    ranges.forEach((rg, i) => {
        const diff = Math.abs(val - rg.mid);
        if (diff < minDiff) { minDiff = diff; closest = i; }
    });
    return closest;
 };

    return (

        if (label === "Hue") { if (val < 0) val = 0; if (val > 360) val = 360; setter(val); }

 const ContinuousSpace = memo(({ xType, yType, fixedVal, h, c, l, flipX, flipY, displayGamut, updateColor, width, height, isDark }) => {
    const canvasRef = useRef(null);
    const containerRef = useRef(null);
    const isDragging = useRef(false);

    const xMax = xType === 'c' ? 140 : xType === 'l' ? 100 : 360;
    const yMax = yType === 'c' ? 140 : yType === 'l' ? 100 : 360;

    const activeXVal = xType === 'l' ? l : xType === 'c' ? c : h;
    const activeYVal = yType === 'l' ? l : yType === 'c' ? c : h;

    useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // Dynamically scale resolution based on the actual container up to a safe 500px maximum
        const MAX_RES = 500;
        const scale = Math.min(MAX_RES / Math.max(width, 1), MAX_RES / Math.max(height, 1), 1);
        const cvsW = Math.max(1, Math.floor(width * scale));
        const cvsH = Math.max(1, Math.floor(height * scale));
        
        canvas.width = cvsW;
        canvas.height = cvsH;
        
        const imgData = ctx.createImageData(cvsW, cvsH);

        for(let py = 0; py < cvsH; py++) {
            for(let px = 0; px < cvsW; px++) {
                const normX = flipX ? (cvsW - 1 - px) / cvsW : px / cvsW;
                const normY = flipY ? (cvsH - 1 - py) / cvsH : py / cvsH;

                const valX = normX * xMax;
                const valY = normY * yMax;

                let pxL = fixedVal, pxC = fixedVal, pxH = fixedVal;
                if (xType === 'l') pxL = valX; else if (xType === 'c') pxC = valX; else pxH = valX;
                if (yType === 'l') pxL = valY; else if (yType === 'c') pxC = valY; else pxH = valY;

                const gamutStatus = checkGamut(pxL, pxC, pxH);
                const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;

                const rgb = rawLchToRgb(pxL, pxC, pxH);
                let r = Math.max(0, Math.min(255, rgb.r));
                let g = Math.max(0, Math.min(255, rgb.g));
                let b = Math.max(0, Math.min(255, rgb.b));

                const i = (py * cvsW + px) * 4;
                imgData.data[i] = r;
                imgData.data[i+1] = g;
                imgData.data[i+2] = b;
                imgData.data[i+3] = isOut ? 64 : 255;
            }
        }
        ctx.putImageData(imgData, 0, 0);
    }, [fixedVal, xType, yType, flipX, flipY, displayGamut, xMax, yMax, width, height, isDark]);

    const handlePointer = useCallback((e) => {
        if (!containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        
        let normX = (e.clientX - rect.left) / rect.width;
        let normY = (e.clientY - rect.top) / rect.height;
        normX = Math.max(0, Math.min(1, normX));
        normY = Math.max(0, Math.min(1, normY));

        if (flipX) normX = 1 - normX;
        if (flipY) normY = 1 - normY;

        const valX = normX * xMax;
        const valY = normY * yMax;

        let newL = l, newC = c, newH = h;
        if (xType === 'l') newL = valX; else if (xType === 'c') newC = valX; else newH = valX;
        if (yType === 'l') newL = valY; else if (yType === 'c') newC = valY; else newH = valY;

        updateColor(newL, newC, newH);
    }, [flipX, flipY, l, c, h, updateColor, xType, yType, xMax, yMax]);

    let crossX = activeXVal / xMax;
    let crossY = activeYVal / yMax;
    if (flipX) crossX = 1 - crossX;
    if (flipY) crossY = 1 - crossY;

    return (
        <div 
            ref={containerRef}
            className="relative overflow-hidden cursor-crosshair touch-none"
            style={{ width: width, height: height }}
            onPointerDown={(e) => { isDragging.current = true; handlePointer(e); containerRef.current.setPointerCapture(e.pointerId); }}
            onPointerMove={(e) => { if (isDragging.current) handlePointer(e); }}
            onPointerUp={(e) => { isDragging.current = false; containerRef.current.releasePointerCapture(e.pointerId); }}
            onPointerCancel={(e) => { isDragging.current = false; containerRef.current.releasePointerCapture(e.pointerId); }}
        >
            <canvas ref={canvasRef} className="w-full h-full object-fill pointer-events-none relative z-10" />
            <div 
                className="absolute pointer-events-none w-5 h-5 -ml-2.5 -mt-2.5 rounded-full border-[1.5px] border-white crosshair-shadow flex items-center justify-center z-50 transition-none"
                style={{ left: `${crossX * 100}%`, top: `${crossY * 100}%` }}
            >
                <div className="w-1 h-1 bg-white rounded-full shadow-[0_0_0_1px_rgba(0,0,0,0.6)]"></div>
            </div>
        </div>
    );
 });

 const MatrixCell = memo(({ rI, cI, isActive, isLocked, cellL, cellC, lVal, cVal, hVal, noun, adj, displayGamut, onClick, isMacro, borders, groupBg, groupL, showGroupName, zoom }) => {
    
    const isOut = useMemo(() => {
        const gamutStatus = checkGamut(lVal, cVal, hVal);
        return displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
    }, [lVal, cVal, hVal, displayGamut]);

    const cellColor = useMemo(() => {
        return getMappedCssColor(lVal, cVal, hVal, displayGamut);
    }, [lVal, cVal, hVal, displayGamut]);

    if ((cellL === 0 || cellL === 21) && cellC > 0) {
        return <td className="p-0 border-none bg-slate-50/50 dark:bg-neutral-950/50 box-border" style={{ width: 64 * zoom, height: 64 * zoom, minWidth: 64 * zoom, minHeight: 64 * zoom, maxWidth: 64 * zoom, maxHeight: 64 * zoom }}></td>;
    }

    const activeBg = isMacro ? groupBg : cellColor;
    const activeL = isMacro ? groupL : lVal;

    let tdZIndex = 10;
    if (isActive) tdZIndex = 60;
    else if (isMacro && showGroupName) tdZIndex = 40;

    let modeClasses = "";
    let radiusStyles = {};
    
    if (isMacro) {
        modeClasses = isActive ? 'ring-inset ring-[4px] ring-black/20 dark:ring-white/20 z-50' : 'z-10';
        radiusStyles = {
            borderTopLeftRadius: borders?.top && borders?.left ? `${16 * zoom}px` : 0,
            borderTopRightRadius: borders?.top && borders?.right ? `${16 * zoom}px` : 0,
            borderBottomLeftRadius: borders?.bottom && borders?.left ? `${16 * zoom}px` : 0,
            borderBottomRightRadius: borders?.bottom && borders?.right ? `${16 * zoom}px` : 0,
        };
    } else {
        modeClasses = `border border-slate-100 dark:border-neutral-800 ${
            isActive ? 'scale-110 shadow-xl ring-2 ring-blue-500 z-50' : 'hover:scale-105 hover:shadow-md dark:hover:shadow-black/50 z-10'
        }`;
        radiusStyles = { borderRadius: `${6 * zoom}px` };
    }
    
    const opacityClass = isOut && !isActive ? 'opacity-25' : 'opacity-100';

    return (

 const MatrixTable = ({ yData, xData, yLabel, xLabel, renderCell, activeIds, interactionSource, zoom, setZoom, matrixLOD, h, c, l, flipX, flipY, displayGamut, updateColor, isDark }) => { 
    const containerRef = useRef(null);
    const activeRowIdx = activeIds.r;
    const activeColIdx = activeIds.c;

    const isSeamless = matrixLOD === 'seamless';
    const isMacro = matrixLOD === 'macro';
    const xType = xLabel.toLowerCase();
    const yType = yLabel.toLowerCase();
    const fixedType = ['l', 'c', 'h'].find(t => t !== xType && t !== yType);
    const fixedVal = fixedType === 'l' ? l : fixedType === 'c' ? c : h;

    const zoomRef = useRef(zoom);
    useEffect(() => { zoomRef.current = zoom; }, [zoom]);

    useEffect(() => {
        if (interactionSource && interactionSource.current === 'click') {
            interactionSource.current = null;
            return;
        }
        if (containerRef.current) {
            const activeEl = containerRef.current.querySelector('[data-active="true"]');
            if (activeEl) {
                activeEl.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'nearest' });
            }
        }
    }, [activeRowIdx, activeColIdx, interactionSource, zoom]);

    useEffect(() => {
        const el = containerRef.current;
        if (!el) return;

        const handleWheel = (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                setZoom(Math.min(Math.max(0.1, zoomRef.current - e.deltaY * 0.01), 3.0));
            }
        };

        let initDist = 0;
        let initZ = 1;
        
        const handleTouchStart = (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                initDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initZ = zoomRef.current;
            }
        };
        
        const handleTouchMove = (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const scale = dist / initDist;
                setZoom(Math.min(Math.max(0.1, initZ * scale), 3.0));
            }
        };

        el.addEventListener('wheel', handleWheel, { passive: false });
        el.addEventListener('touchstart', handleTouchStart, { passive: false });
        el.addEventListener('touchmove', handleTouchMove, { passive: false });

        return () => {
            el.removeEventListener('wheel', handleWheel);
            el.removeEventListener('touchstart', handleTouchStart);
            el.removeEventListener('touchmove', handleTouchMove);
        };
    }, [setZoom]);

    return ( 
    <div 
        ref={containerRef} 
        className={`h-full w-full overflow-auto rounded-xl border border-slate-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 shadow-sm flex flex-col relative custom-scroll`}>

                        {xData.map((col) => ( 
                        <th key={col.index} style={{ width: 64 * zoom, minWidth: 64 * zoom, maxWidth: 64 * zoom }} className={`p-1 font-bold border-b border-slate-100 dark:border-neutral-900 bg-white dark:bg-neutral-950 sticky top-0 z-40 pointer-events-auto box-border ${col.isActive ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 ring-inset ring-2 ring-blue-500/20 dark:ring-blue-400/30 rounded-t' : 'text-slate-500 dark:text-neutral-400'}`}> 
                            <div className="flex flex-col items-center justify-center overflow-hidden w-full h-full px-0.5">
                                {zoom >= 0.9 && <span className="text-xs truncate w-full">{col.label}</span>}
                                {zoom >= 0.9 && col.data && (<span className="text-[8px] font-normal opacity-50 font-mono truncate w-full">{col.data.min === col.data.max ? col.data.min : `${col.data.min}-${col.data.max}`}</span>)}
                            </div> 
                        </th> 
                        ))} 
                    </tr> 
                </thead> 
                <tbody className="pointer-events-auto"> 
                    {yData.map((row, rI) => (
                        <tr key={row.index}>
                            <td style={{ height: 64 * zoom, minHeight: 64 * zoom, maxHeight: 64 * zoom }} className={`p-1 font-bold border-r border-slate-100 dark:border-neutral-900 text-left bg-white dark:bg-neutral-950 sticky left-0 z-30 w-20 min-w-[5rem] box-border ${row.isActive ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 ring-inset ring-2 ring-blue-500/20 dark:ring-blue-400/30 rounded-l' : 'text-slate-500 dark:text-neutral-400'}`}>
                                <div className="flex flex-col items-start justify-center overflow-hidden w-full h-full pl-1">
                                    {zoom >= 0.9 && <span className="text-xs truncate w-full leading-none">{row.label}</span>}
                                    {zoom >= 0.9 && row.data && (<span className="text-[8px] font-normal opacity-50 font-mono truncate w-full mt-0.5 leading-none">{row.data.min === row.data.max ? row.data.min : `${row.data.min}-${row.data.max}`}</span>)}
                                </div>
                            </td>
                            {isSeamless && rI === 0 && (
                                <td rowSpan={yData.length} colSpan={xData.length} className="p-0 border-none relative align-top">
                                    <ContinuousSpace 
                                        xType={xType} yType={yType} 
                                        fixedType={fixedType} fixedVal={fixedVal}
                                        h={h} c={c} l={l}
                                        flipX={flipX} flipY={flipY}
                                        displayGamut={displayGamut}

                                        height={yData.length * 64 * zoom}

                            )}
                            {!isSeamless && xData.map((col) => renderCell(row.index, col.index))}
                        </tr>
                    ))} 
                </tbody> 
            </table> 
        </div>
    </div> 
    ) 
 };

 const ColorSAMIfier = () => { 
    const [h, setH] = useState(getFromLocal('h', 40));

    const [activeView, useStateView] = useState("hue_pivot");

    const interactionSource = useRef(null);

    const [nameWarning, setNameWarning] = useState(null);
    const [isDark, setIsDark] = useState(() => getFromLocal('darkMode', false));

    const [lightRanges, setLightRanges] = useState(getFromLocal('lightRanges', NEW_LIGHT_RANGES));
    const [chromaRanges, setChromaRanges] = useState(getFromLocal('chromaRanges', NEW_CHROMA_RANGES));
    const [anchors, setAnchors] = useState(getFromLocal('anchors', DEFAULT_ANCHORS));
    const [hueValues, setHueValues] = useState(getFromLocal('hueValues', NEW_HUE_VALUES));
    
    const [adjectiveMatrix, setAdjectiveMatrix] = useState(() => {
        const local = getFromLocal('adjectiveMatrix', null);
        return (local && local.length === 22) ? local : generateAdjectiveMatrix();
    });
    
    const [nounData, setNounData] = useState(() => {
        const local = getFromLocal('nounData', null);
        return (local && local.length === 120) ? local : generateNounData();
    });

    const [majorGroups, setMajorGroups] = useState(() => {
        const local = getFromLocal('majorGroups', null);
        return (local && local.length === 12) ? local : generateMajorGroups();
    });

    const [extremeGroups, setExtremeGroups] = useState(() => {
        return getFromLocal('extremeGroups', { white: "White", black: "Black", lightGray: "Light Gray", darkGray: "Dark Gray" });
    });
    
    const [palette, setPalette] = useState(getFromLocal('userPalette', []));
    const [tempAdj, setTempAdj] = useState(null);
    const [tempNoun, setTempNoun] = useState(null);

    const parsedNouns = useMemo(() => nounData.map(row => row.split(',')), [nounData]);

    useEffect(() => {
        if (isDark) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        saveToLocal('darkMode', isDark);
    }, [isDark]);

    const lightGradientBg = useMemo(() => {
        const stops = []; 
        for (let i = 0; i <= 20; i++) { 
            const pct = i / 20; 
            const isOut = displayGamut === 'p3' ? !checkGamut(pct * 100, c, h).isP3 : !checkGamut(pct * 100, c, h).isSRGB;
            const color = getMappedCssColor(pct * 100, c, h, displayGamut);
            stops.push(`${isOut ? 'transparent' : color} ${pct * 100}%`); 
        } 
        return `linear-gradient(to right, ${stops.join(', ')})`;
    }, [c, h, displayGamut]);

    const chromaGradientBg = useMemo(() => {
        const stops = [];
        for (let i = 0; i <= 20; i++) { 
            const pct = i / 20; 
            const isOut = displayGamut === 'p3' ? !checkGamut(l, pct * 140, h).isP3 : !checkGamut(l, pct * 140, h).isSRGB;
            const color = getMappedCssColor(l, pct * 140, h, displayGamut); 
            stops.push(`${isOut ? 'transparent' : color} ${pct * 100}%`); 
        } 
        return `linear-gradient(to right, ${stops.join(', ')})`;
    }, [l, h, displayGamut]);

    const hueGradientBg = useMemo(() => {
        const stops = []; 
        for (let i = 0; i <= 20; i++) { 
            const pct = i / 20; 
            let hV = hueValues[Math.min(hueValues.length-1, Math.round(pct * (hueValues.length-1)))]; 
            const isOut = displayGamut === 'p3' ? !checkGamut(l, c, hV).isP3 : !checkGamut(l, c, hV).isSRGB;
            const color = getMappedCssColor(l, c, hV, displayGamut); 
            stops.push(`${isOut ? 'transparent' : color} ${pct * 100}%`); 
        } 
        return `linear-gradient(to right, ${stops.join(', ')})`;
    }, [l, c, displayGamut, hueValues]);

    useEffect(() => {
        setDisplayGamut(window.matchMedia && window.matchMedia("(color-gamut: p3)").matches ? "p3" : "srgb");
        const timer = setTimeout(() => {
            saveToLocal('h', h); saveToLocal('c', c); saveToLocal('l', l);
            saveToLocal('gridZoom', gridZoom); saveToLocal('history', history); saveToLocal('historyIndex', historyIndex);
            saveToLocal('lightRanges', lightRanges); saveToLocal('chromaRanges', chromaRanges);
            saveToLocal('anchors', anchors); saveToLocal('hueValues', hueValues);
            saveToLocal('adjectiveMatrix', adjectiveMatrix); saveToLocal('nounData', nounData);
            saveToLocal('majorGroups', majorGroups); saveToLocal('extremeGroups', extremeGroups);
            saveToLocal('lockedCells', lockedCells);
            saveToLocal('flipX', flipX); saveToLocal('flipY', flipY);
            saveToLocal('userPalette', palette);
            saveToLocal('matrixLOD', matrixLOD);
        }, 300);
        return () => clearTimeout(timer);
    }, [h, c, l, gridZoom, history, historyIndex, adjectiveMatrix, nounData, majorGroups, extremeGroups, lightRanges, chromaRanges, anchors, hueValues, palette, lockedCells, flipX, flipY, matrixLOD]);
    
    useEffect(() => {
        setTempAdj(null);
        setTempNoun(null);
    }, [l, c, h]);

    // THE IDEAL ANCHOR APPROACH 
    const groupBackgrounds = useMemo(() => {
        // Accurately calibrated perceptual hue peaks for LCH
        const IDEAL_HUES = [0, 40, 60, 100, 134, 150, 180, 196, 240, 270, 300, 328]; 
        
        return {
            white: { bg: getMappedCssColor(98, 0, 0, displayGamut), l: 98 },
            black: { bg: getMappedCssColor(2, 0, 0, displayGamut), l: 2 },
            lightGray: { bg: getMappedCssColor(75, 0, 0, displayGamut), l: 75 },
            darkGray: { bg: getMappedCssColor(25, 0, 0, displayGamut), l: 25 },
            quads: Array.from({ length: 12 }, (_, rIdx) => {
                const idealH = IDEAL_HUES[rIdx];
                return [
                    { bg: getMappedCssColor(30, 20, idealH, displayGamut), l: 30 },  // Toned Shades
                    { bg: getMappedCssColor(40, 140, idealH, displayGamut), l: 40 }, // Vivid Shades (Auto-mapped to highest in-gamut chroma)
                    { bg: getMappedCssColor(80, 140, idealH, displayGamut), l: 80 }, // Vivid Tints (Auto-mapped to highest in-gamut chroma)
                    { bg: getMappedCssColor(80, 20, idealH, displayGamut), l: 80 }   // Toned Tints
                ];
            })
        };
    }, [displayGamut]);

    const getGroupId = useCallback((lVal, cVal, hVal) => {
        if (lVal > 95 && cVal < 10) return 'white';
        if (lVal < 10 && cVal < 10) return 'black';
        if (cVal < 10) return lVal >= 50 ? 'lightGray' : 'darkGray';
        const hueGroup = Math.floor(((hVal + 15) % 360) / 30);
        const quadGroup = lVal < 50 ? (cVal < 40 ? 0 : 1) : (cVal >= 40 ? 2 : 3);
        return `h${hueGroup}-q${quadGroup}`;
    }, []);

    const cellCounts = useMemo(() => {
        const nounCounts = Array(120).fill(null).map(() => [0, 0]);
        const adjCounts = Array(22).fill(null).map(() => Array(15).fill(0));
        const groupCounts = {
            white: 0, black: 0, lightGray: 0, darkGray: 0,
            quads: Array(12).fill(null).map(() => [0,0,0,0])
        };

        for (let lI = 0; lI < lightRanges.length; lI++) {
            for (let cI = 0; cI < chromaRanges.length; cI++) {
                const lVal = lightRanges[lI]?.mid;
                const cVal = chromaRanges[cI]?.mid;
                
                if (lVal === undefined || cVal === undefined) continue;

                // Skip mathematical edges that don't map to grid cells.
                if ((lI === 0 || lI === 21) && cI > 0) continue;
                
                for (let hI = 0; hI < hueValues.length; hI++) {
                    const hVal = hueValues[hI];

                    const gamutStatus = checkGamut(lVal, cVal, hVal);
                    const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
                    
                    if (!isOut) {
                        if (lI > 0 && lI < 21 && cI > 0) {
                            const sIdx = lI < 11 ? 0 : 1;
                            nounCounts[hI][sIdx]++;
                            if (adjCounts[lI] && adjCounts[lI][cI] !== undefined) {
                                adjCounts[lI][cI]++;
                            }
                        }

                        const gId = getGroupId(lVal, cVal, hVal);
                        if (gId === 'white') groupCounts.white++;
                        else if (gId === 'black') groupCounts.black++;
                        else if (gId === 'lightGray') groupCounts.lightGray++;
                        else if (gId === 'darkGray') groupCounts.darkGray++;
                        else {
                            const match = gId.match(/h(\d+)-q(\d+)/);
                            if (match) {
                                const hGrp = parseInt(match[1]);
                                const qGrp = parseInt(match[2]);
                                if (groupCounts.quads[hGrp] && groupCounts.quads[hGrp][qGrp] !== undefined) {
                                    groupCounts.quads[hGrp][qGrp]++;
                                }
                            }
                        }
                    }
                }
            }
        }
        return { nounCounts, groupCounts, adjCounts };
    }, [lightRanges, chromaRanges, hueValues, getGroupId, displayGamut]);

    const exactMappedRgb = useMemo(() => realLchToRgb(l, c, h), [l, c, h]);
    const exactRawRgb = useMemo(() => rawLchToRgb(l, c, h), [l, c, h]);
    const exactHex = useMemo(() => `#${exactMappedRgb.r.toString(16).padStart(2,'0')}${exactMappedRgb.g.toString(16).padStart(2,'0')}${exactMappedRgb.b.toString(16).padStart(2,'0')}`.toUpperCase(), [exactMappedRgb]);
    const exactLab = useMemo(() => lch2lab(l, c, h), [l, c, h]);
    const exactLabStr = useMemo(() => `${Math.round(exactLab[0])}, ${Math.round(exactLab[1])}, ${Math.round(exactLab[2])}`, [exactLab]);

    const updateColorWithHistory = useCallback((newL, newC, newH) => {
        setL(newL); setC(newC); setH(newH);
        setHistory(prev => {
            const newHist = prev.slice(0, historyIndex + 1);
            if (newHist.length > 0 && newHist[newHist.length - 1].l === newL && newHist[newHist.length - 1].c === newC && newHist[newHist.length - 1].h === newH) return newHist;
            newHist.push({l: newL, c: newC, h: newH});
            if(newHist.length > 50) newHist.shift(); 
            setHistoryIndex(newHist.length - 1);
            return newHist;
        });
    }, [historyIndex]);

    const handleCellClick = useCallback((lVal, cVal, hVal) => {
        interactionSource.current = 'click';
        updateColorWithHistory(lVal, cVal, hVal);
    }, [updateColorWithHistory]);

    const stateRef = useRef({ l, c, h });
    useEffect(() => { stateRef.current = { l, c, h }; }, [l, c, h]);
    const handleRowHueClick = useCallback((newH) => updateColorWithHistory(stateRef.current.l, stateRef.current.c, newH), [updateColorWithHistory]);

    const handleUndo = () => {
        if (historyIndex > 0) {
            const prevIdx = historyIndex - 1;
            setL(history[prevIdx].l); setC(history[prevIdx].c); setH(history[prevIdx].h);
            setHistoryIndex(prevIdx);
        }
    };

    const handleRedo = () => {
        if (historyIndex < history.length - 1) {
            const nextIdx = historyIndex + 1;
            setL(history[nextIdx].l); setC(history[nextIdx].c); setH(history[nextIdx].h);
            setHistoryIndex(nextIdx);
        }
    };

    const updateAdjective = (r, cIdx, val) => {
        setAdjectiveMatrix(prev => {
            const next = [...prev];
            if (!next[r]) next[r] = [];
            next[r] = [...next[r]];
            next[r][cIdx] = val;
            return next;
        });
    };

    const updateNoun = (r, cIdx, val) => {
        setNounData(prev => {
            const next = [...prev];
            const parts = (next[r] || "").split(',');
            while (parts.length < 2) parts.push("");
            parts[cIdx] = val;
            next[r] = parts.join(',');
            return next;
        });
    };

    const updateMajorGroup = (rIdx, cIdx, val) => {
        setMajorGroups(prev => {
            const next = [...prev];
            if (!next[rIdx]) next[rIdx] = [];
            next[rIdx] = [...next[rIdx]];
            next[rIdx][cIdx] = val;
            return next;
        });
    };

    const getIndexFromHue = (hue) => { 
        let closestIdx = 0; let minDiff = 360;
        hueValues.forEach((hVal, idx) => {
            let diff = Math.abs(hVal - hue);
            if(diff > 180) diff = 360 - diff; 
            if(diff < minDiff) { minDiff = diff; closestIdx = idx; }
        });
        return closestIdx;
    }; 
    
    const hIdx = getIndexFromHue(h);
    const lIdx = getRangeIndex(l, lightRanges); 
    const cIdx = getRangeIndex(c, chromaRanges); 
    const getNounColumnIndex = (lIdx) => lIdx < 11 ? 0 : 1; 

    const currentMapping = useMemo(() => { 
        const rowLIdx = getRangeIndex(l, lightRanges);
        const rowCIdx = getRangeIndex(c, chromaRanges);
        if (rowLIdx === 0) return { baseNoun: "Nero", adj: "", code: `AA000` }; 
        if (rowLIdx === 21) return { baseNoun: "Blanc", adj: "", code: `VA000` }; 
        if (rowCIdx === 0) return { baseNoun: "Cinza", adj: adjectiveMatrix[rowLIdx]?.[0] || "", code: `${lightRanges[rowLIdx]?.label || 'A'}A000` }; 
        const sIdx = getNounColumnIndex(rowLIdx);
        const bNoun = parsedNouns[hIdx]?.[sIdx] || "Hue"; 
        let adj = adjectiveMatrix[rowLIdx]?.[rowCIdx] || ""; 
        if (bNoun && adj && bNoun.toLowerCase() === adj.toLowerCase()) adj = ""; 
        return { baseNoun: bNoun, adj, code: `${lightRanges[rowLIdx]?.label || '?'}${chromaRanges[rowCIdx]?.label || '?'}${h.toString().padStart(3,'0')}` }; 
    }, [l, c, h, adjectiveMatrix, parsedNouns, hIdx, lightRanges, chromaRanges]);

    const safeLIdx = getRangeIndex(l, lightRanges);
    const safeCIdx = getRangeIndex(c, chromaRanges);
    
    const currentCellKey = `l_${safeLIdx}_c_${safeCIdx}_h_${hIdx}`;
    const isCurrentExplicitlyLocked = lockedCells.includes(currentCellKey);

    const isAdjLocked = useMemo(() => {
        return lockedCells.some(k => {
            const parts = k.split('_');
            return parseInt(parts[1]) === safeLIdx && parseInt(parts[3]) === safeCIdx;
        });
    }, [lockedCells, safeLIdx, safeCIdx]);

    const isNounLocked = useMemo(() => {
        const currentLightBand = safeLIdx < 11 ? 0 : 1;
        return lockedCells.some(k => {
            const parts = k.split('_');
            const locL = parseInt(parts[1]);
            const locC = parseInt(parts[3]);
            const locH = parseInt(parts[5]);
            if (locL === 0 || locL === 21 || locC === 0) return false;
            const locLightBand = locL < 11 ? 0 : 1;
            return locH === hIdx && locLightBand === currentLightBand;
        });
    }, [lockedCells, safeLIdx, hIdx]);

    const handleAdjChange = (val) => {
        if (isAdjLocked) return;
        const rL = getRangeIndex(l, lightRanges);
        const rC = getRangeIndex(c, chromaRanges);
        if (rL === 0 || rL === 21) return;
        updateAdjective(rL, rC, val.trim());
    };

    const handleNounChange = (val) => {
        if (isNounLocked) return;
        const rL = getRangeIndex(l, lightRanges);
        const rC = getRangeIndex(c, chromaRanges);
        if (rL === 0 || rL === 21 || rC === 0) return;
        const sIdx = getNounColumnIndex(rL);
        updateNoun(hIdx, sIdx, val.trim());
    };

    useEffect(() => {
        let warning = null;
        
        // 1. Check Nouns
        const seenNouns = new Map();
        for (let idx = 0; idx < parsedNouns.length; idx++) {
            for (let sIdx = 0; sIdx < 2; sIdx++) {
                const rawNoun = parsedNouns[idx][sIdx] || "";
                const noun = rawNoun.trim().toLowerCase();
                if (noun && noun !== "hue") {
                    const loc = `${hueValues[idx]}° (${sIdx === 0 ? 'Shades' : 'Tints'})`;
                    if (seenNouns.has(noun)) {
                        warning = `Duplicate Noun: '${rawNoun.trim()}' at ${seenNouns.get(noun)} & ${loc}`;
                        break;
                    }
                    seenNouns.set(noun, loc);
                }
            }
            if (warning) break;
        }

        // 2. Check Adjectives
        if (!warning) {
            const seenAdjs = new Map();
            for (let r = 0; r < adjectiveMatrix.length; r++) {
                if (!adjectiveMatrix[r]) continue;
                for (let col = 0; col < adjectiveMatrix[r].length; col++) {
                    const rawAdj = adjectiveMatrix[r][col] || "";
                    const adj = rawAdj.trim().toLowerCase();
                    if (adj) {
                        const loc = `L${lightRanges[r]?.label || r}-C${chromaRanges[col]?.label || col}`;
                        if (seenAdjs.has(adj)) {
                            warning = `Duplicate Adj: '${rawAdj.trim()}' at ${seenAdjs.get(adj)} & ${loc}`;
                            break;
                        }
                        seenAdjs.set(adj, loc);
                    }
                }
                if (warning) break;
            }
        }

        // 3. Check Major Groups
        if (!warning) {
            const seenMGs = new Map();
            for (const [k, v] of Object.entries(extremeGroups)) {
                const rawVal = v || "";
                const val = rawVal.trim().toLowerCase();
                if (val) {
                    const loc = `Extreme ${k.charAt(0).toUpperCase() + k.slice(1)}`;
                    if (seenMGs.has(val)) {
                        warning = `Duplicate Group: '${rawVal.trim()}' at ${seenMGs.get(val)} & ${loc}`;
                        break;
                    }
                    seenMGs.set(val, loc);
                }
            }
            
            if (!warning) {
                const QUAD_NAMES = ["Toned Shades", "Vivid Shades", "Vivid Tints", "Toned Tints"];
                for (let r = 0; r < majorGroups.length; r++) {
                    if (!majorGroups[r]) continue;
                    for (let col = 0; col < majorGroups[r].length; col++) {
                        const rawMg = majorGroups[r][col] || "";
                        const mg = rawMg.trim().toLowerCase();
                        if (mg) {
                            const rangeLabel = HUE_RANGES_MAJOR[r];
                            const loc = `${rangeLabel} ${QUAD_NAMES[col]}`;
                            if (seenMGs.has(mg)) {
                                warning = `Duplicate Group: '${rawMg.trim()}' at ${seenMGs.get(mg)} & ${loc}`;
                                break;
                            }
                            seenMGs.set(mg, loc);
                        }
                    }
                    if (warning) break;
                }
            }
        }

        setNameWarning(warning);
    }, [parsedNouns, adjectiveMatrix, majorGroups, extremeGroups, hueValues, lightRanges, chromaRanges]);

    let canonicalL = lightRanges[safeLIdx]?.mid ?? 50;
    let canonicalC = chromaRanges[safeCIdx]?.mid ?? 0;

    const exactGamut = useMemo(() => checkGamut(l, c, h), [l, c, h]);
    const isExactOut = displayGamut === 'p3' ? !exactGamut.isP3 : !exactGamut.isSRGB;
    const exactBgColor = getMappedCssColor(l, c, h, displayGamut);
    
    const swatchStyle = useMemo(() => ({ 
        backgroundColor: exactBgColor
    }), [exactBgColor]);

    const deltaE = useMemo(() => Math.sqrt(Math.pow(canonicalL - l, 2) + Math.pow(canonicalC - c, 2)).toFixed(1), [canonicalL, l, canonicalC, c]); 

    const activeMajorHueIdx = Math.floor(((h + 15) % 360) / 30);
    const activeMajorQuadIdx = l < 50 ? (c < 40 ? 0 : 1) : (c >= 40 ? 2 : 3);

    const isWhiteActive = l > 95 && c < 10;
    const isBlackActive = l < 10 && c < 10;
    const isLightGrayActive = c < 10 && l >= 50 && !isWhiteActive;
    const isDarkGrayActive = c < 10 && l < 50 && !isBlackActive;

    const majorGroup = useMemo(() => {
        if (l > 95 && c < 10) return extremeGroups.white;
        if (l < 10 && c < 10) return extremeGroups.black;
        if (c < 10 && l >= 50) return extremeGroups.lightGray;
        if (c < 10 && l < 50) return extremeGroups.darkGray;
        return majorGroups[activeMajorHueIdx][activeMajorQuadIdx];
    }, [l, c, activeMajorHueIdx, activeMajorQuadIdx, majorGroups, extremeGroups]);

    // Derived list for "Locked Colors" view
    const lockedList = useMemo(() => {
        return lockedCells.map(key => {
            const parts = key.split('_');
            const cLIdx = parseInt(parts[1]);
            const cCIdx = parseInt(parts[3]);
            const cHIdx = parseInt(parts[5]);
            
            const lVal = lightRanges[cLIdx]?.mid ?? 50;
            const cVal = chromaRanges[cCIdx]?.mid ?? 0;
            const hVal = hueValues[cHIdx] ?? 0;

            const sIdx = cLIdx < 11 ? 0 : 1;
            let noun = parsedNouns[cHIdx]?.[sIdx] || "Hue";
            if (cLIdx === 0) noun = "Nero"; else if (cLIdx === 21) noun = "Blanc"; else if (cCIdx === 0) noun = "Cinza";
            let adj = adjectiveMatrix[cLIdx]?.[cCIdx] || "";
            if (noun && adj && noun.toLowerCase() === adj.toLowerCase()) adj = "";

            const gamutStatus = checkGamut(lVal, cVal, hVal);
            const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
            const color = getMappedCssColor(lVal, cVal, hVal, displayGamut);
            
            return { key, lVal, cVal, hVal, noun, adj, color, isOut };
        });
    }, [lockedCells, lightRanges, chromaRanges, hueValues, parsedNouns, adjectiveMatrix, displayGamut]);

    const lightRangeData = useMemo(() => lightRanges.map((r, i) => ({ label: r.label, index: i, isActive: i === safeLIdx, data: r })), [safeLIdx, lightRanges]);
    const chromaRangeData = useMemo(() => chromaRanges.map((r, i) => ({ label: r.label, index: i, isActive: i === safeCIdx, data: r })), [safeCIdx, chromaRanges]);
    const hueRangesData = useMemo(() => hueValues.map((val, i) => {
        const nextVal = hueValues[i+1] !== undefined ? hueValues[i+1] : 360;
        const maxVal = nextVal - (nextVal > val ? 1 : 0);
        return { label: `${val}°`, index: i, isActive: i === hIdx, data: { min: val, max: maxVal > val ? maxVal : val } };
    }), [hIdx, hueValues]);

    let currentXData = [];
    let currentYData = [];
    let currentXLabel = "";
    let currentYLabel = "";
    let currentActiveR = 0;
    let currentActiveC = 0;

    if (activeView === 'hue_pivot') {
        currentXData = isFlipped ? lightRangeData : chromaRangeData;
        currentYData = isFlipped ? chromaRangeData : lightRangeData;
        currentXLabel = isFlipped ? "L" : "C";
        currentYLabel = isFlipped ? "C" : "L";
        currentActiveR = isFlipped ? safeCIdx : safeLIdx;
        currentActiveC = isFlipped ? safeLIdx : safeCIdx;
    } else if (activeView === 'chroma_pivot') {
        currentXData = isFlipped ? hueRangesData : lightRangeData;
        currentYData = isFlipped ? lightRangeData : hueRangesData;
        currentXLabel = isFlipped ? "H" : "L";
        currentYLabel = isFlipped ? "L" : "H";
        currentActiveR = isFlipped ? safeLIdx : hIdx;
        currentActiveC = isFlipped ? hIdx : safeLIdx;
    } else if (activeView === 'light_pivot') {
        currentXData = isFlipped ? hueRangesData : chromaRangeData;
        currentYData = isFlipped ? chromaRangeData : hueRangesData;
        currentXLabel = isFlipped ? "H" : "C";
        currentYLabel = isFlipped ? "C" : "H";
        currentActiveR = isFlipped ? safeCIdx : hIdx;
        currentActiveC = isFlipped ? hIdx : safeCIdx;
    }

    const finalXData = flipX ? [...currentXData].reverse() : currentXData;
    const finalYData = flipY ? [...currentYData].reverse() : currentYData;

    const getExplorerParams = useCallback((view, flipped, xIdx, yIdx) => {
        let localLIdx = safeLIdx, localCIdx = safeCIdx, localHIdx = hIdx;
        
        let targetX = xIdx;
        let targetY = yIdx;

        if (view === "hue_pivot") { 
            localCIdx = flipped ? targetY : targetX; 
            localLIdx = flipped ? targetX : targetY; 
        } else if (view === "chroma_pivot") { 
            localLIdx = flipped ? targetY : targetX; 
            localHIdx = flipped ? targetX : targetY; 
        } else if (view === "light_pivot") { 
            localCIdx = flipped ? targetY : targetX; 
            localHIdx = flipped ? targetX : targetY; 
        }
        
        const safeL = lightRanges[localLIdx] || lightRanges[0];
        const safeC = chromaRanges[localCIdx] || chromaRanges[0];
        const safeH = hueValues[localHIdx] ?? 0;
        let cVal = safeC.mid; let hVal = safeH;
        if (localLIdx === 0 || localLIdx === 21 || localCIdx === 0) { cVal = 0; }
        return { lVal: safeL.mid, cVal, hVal, lIdx: localLIdx, cIdx: localCIdx, hIdx: localHIdx };
    }, [safeLIdx, safeCIdx, hIdx, lightRanges, chromaRanges, hueValues]);

    const groupCenters = useMemo(() => {
        const centers = {};
        if (matrixLOD !== 'macro') return centers;
        const groups = {};
        for (let y = 0; y < finalYData.length; y++) {
            for (let x = 0; x < finalXData.length; x++) {
                const p = getExplorerParams(activeView, isFlipped, x, y);
                if ((p.lIdx === 0 || p.lIdx === 21) && p.cIdx > 0) continue;
                const gId = getGroupId(p.lVal, p.cVal, p.hVal);
                if (!groups[gId]) groups[gId] = { minX: x, maxX: x, minY: y, maxY: y };
                else {
                    groups[gId].minX = Math.min(groups[gId].minX, x);
                    groups[gId].maxX = Math.max(groups[gId].maxX, x);
                    groups[gId].minY = Math.min(groups[gId].minY, y);
                    groups[gId].maxY = Math.max(groups[gId].maxY, y);
                }
            }
        }
        for (const gId in groups) {
            const g = groups[gId];
            const cx = Math.floor((g.minX + g.maxX) / 2);
            const cy = Math.floor((g.minY + g.maxY) / 2);
            centers[`${cy}-${cx}`] = gId;
        }
        return centers;
    }, [matrixLOD, finalXData.length, finalYData.length, activeView, isFlipped, getExplorerParams, getGroupId]);

    const renderCell = useCallback((yIdx, xIdx) => {
        const currentParams = getExplorerParams(activeView, isFlipped, xIdx, yIdx);
        const { lVal, cVal, hVal, lIdx: cellL, cIdx: cellC, hIdx: cellH } = currentParams;
        const gamutStatus = checkGamut(lVal, cVal, hVal);
        const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
        const isActive = cellL === safeLIdx && cellC === safeCIdx && cellH === hIdx;
        
        const anchor = getNounColumnIndex(cellL);
        let noun = parsedNouns[cellH]?.[anchor] || "Hue";
        if (cellL === 0) noun = "Nero"; else if (cellL === 21) noun = "Blanc"; else if (cellC === 0) noun = "Cinza";

        const adj = adjectiveMatrix[cellL]?.[cellC] || "";
        const cellKey = `l_${cellL}_c_${cellC}_h_${cellH}`;
        const isLocked = lockedCells.includes(cellKey);

        let borders = { top: false, bottom: false, left: false, right: false };
        let groupBg = '';
        let groupL = 50;
        let showGroupName = null;
        const isMacro = matrixLOD === 'macro';

        if (isMacro && !((cellL === 0 || cellL === 21) && cellC > 0)) {
            const currentGroupId = getGroupId(lVal, cVal, hVal);
            
            if (currentGroupId === 'white') { groupBg = groupBackgrounds.white.bg; groupL = groupBackgrounds.white.l; }
            else if (currentGroupId === 'black') { groupBg = groupBackgrounds.black.bg; groupL = groupBackgrounds.black.l; }
            else if (currentGroupId === 'lightGray') { groupBg = groupBackgrounds.lightGray.bg; groupL = groupBackgrounds.lightGray.l; }
            else if (currentGroupId === 'darkGray') { groupBg = groupBackgrounds.darkGray.bg; groupL = groupBackgrounds.darkGray.l; }
            else {
                const match = currentGroupId.match(/h(\d+)-q(\d+)/);
                if (match) {
                    groupBg = groupBackgrounds.quads[parseInt(match[1])][parseInt(match[2])].bg;
                    groupL = groupBackgrounds.quads[parseInt(match[1])][parseInt(match[2])].l;
                }
            }

            const getGroupAt = (x, y) => {
                if (x < 0 || x >= finalXData.length || y < 0 || y >= finalYData.length) return 'out_of_bounds';
                const p = getExplorerParams(activeView, isFlipped, x, y);
                if ((p.lIdx === 0 || p.lIdx === 21) && p.cIdx > 0) return 'empty';
                return getGroupId(p.lVal, p.cVal, p.hVal);
            };

            const visualUpY = flipY ? yIdx + 1 : yIdx - 1;
            const visualDownY = flipY ? yIdx - 1 : yIdx + 1;
            const visualLeftX = flipX ? xIdx + 1 : xIdx - 1;
            const visualRightX = flipX ? xIdx - 1 : xIdx + 1;

            borders.top = currentGroupId !== getGroupAt(xIdx, visualUpY);
            borders.bottom = currentGroupId !== getGroupAt(xIdx, visualDownY);
            borders.left = currentGroupId !== getGroupAt(visualLeftX, yIdx);
            borders.right = currentGroupId !== getGroupAt(visualRightX, yIdx);

            if (groupCenters[`${yIdx}-${xIdx}`] === currentGroupId) {
                if (currentGroupId === 'white') showGroupName = extremeGroups.white;
                else if (currentGroupId === 'black') showGroupName = extremeGroups.black;
                else if (currentGroupId === 'lightGray') showGroupName = extremeGroups.lightGray;
                else if (currentGroupId === 'darkGray') showGroupName = extremeGroups.darkGray;
                else {
                    const match = currentGroupId.match(/h(\d+)-q(\d+)/);
                    if (match) showGroupName = majorGroups[parseInt(match[1])][parseInt(match[2])];
                }
            }
        }

        return (
            <MatrixCell 
                key={`${yIdx}-${xIdx}`}
                rI={yIdx} cI={xIdx} 
                isActive={isActive} isLocked={isLocked} cellL={cellL} cellC={cellC} 
                lVal={lVal} cVal={cVal} hVal={hVal} 
                noun={noun} adj={adj} displayGamut={displayGamut}
                onClick={handleCellClick}
                isMacro={isMacro} borders={borders}
                groupBg={groupBg} groupL={groupL}
                showGroupName={showGroupName}
                zoom={gridZoom}
            />
        );
    }, [activeView, isFlipped, getExplorerParams, safeLIdx, safeCIdx, hIdx, parsedNouns, adjectiveMatrix, displayGamut, handleCellClick, lockedCells, matrixLOD, finalXData.length, finalYData.length, groupBackgrounds, flipX, flipY, groupCenters, extremeGroups, majorGroups, getGroupId, gridZoom]);

    const handleRgbConvert = (val) => {
        const hasPercent = val.includes('%');
        const cleanVal = val.replace(/[^0-9., \-]/g, '').trim();
        const parts = cleanVal.includes(',') ? cleanVal.split(',') : cleanVal.split(/\s+/);
        const numParts = parts.map(n => parseFloat(n.trim()));
        
        if (numParts.length === 3 && numParts.every(n => !isNaN(n))) {
            const r = hasPercent ? (numParts[0] / 100) * 255 : numParts[0];
            const g = hasPercent ? (numParts[1] / 100) * 255 : numParts[1];
            const b = hasPercent ? (numParts[2] / 100) * 255 : numParts[2];
            const res = rgbToLchConvert(r, g, b, h);
            updateColorWithHistory(res.l, res.c, res.h);
        }
    };

    const handleHexConvert = (val) => {
        let clean = val.replace(/[^0-9A-F]/gi, '');
        if (clean.length === 3) clean = clean.split('').map(c => c+c).join('');
        if (clean.length !== 6) return null;
        let r = parseInt(clean.substring(0,2), 16);
        let g = parseInt(clean.substring(2,4), 16);
        let b = parseInt(clean.substring(4,6), 16);
        const res = rgbToLchConvert(r, g, b, h);
        if (res) updateColorWithHistory(res.l, res.c, res.h);
    };

    const handleLabConvert = (val) => {
        const parts = val.replace(/[^0-9., \-]/g, '').split(',').map(n => parseFloat(n.trim()));
        if (parts.length === 3 && parts.every(n => !isNaN(n))) {
            const res = labToLchConvert(parts[0], parts[1], parts[2], h);
            updateColorWithHistory(res.l, res.c, res.h);
        }
    };

    const handleExport = () => { 
        const wb = XLSX.utils.book_new(); 
        const rangesData = [["Type", "Label", "Min", "Max", "Mid"], ...lightRanges.map(r => ["Light", r.label, r.min, r.max, r.mid]), ...chromaRanges.map(r => ["Chroma", r.label, r.min, r.max, r.mid])];
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rangesData), "Ranges");
        const adjHeader = ["(L/C)", ...chromaRanges.map(c => c.label)];
        const adjBody = adjectiveMatrix.map((row, i) => [lightRanges[i]?.label || `L${i}`, ...row]);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([adjHeader, ...adjBody]), "Adjectives"); 
        const nounHeader = ["Hue Angle", "Shades (L<50)", "Tints (L≥50)"];
        const nounBody = nounData.map((row, i) => [`${hueValues[i]}°`, ...row.split(',')]);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([nounHeader, ...nounBody]), "Nouns"); 
        
        const mgHeader = ["Hue Range", "Toned Shades (L<50, C<40)", "Vivid Shades (L<50, C>=40)", "Vivid Tints (L>=50, C>=40)", "Toned Tints (L>=50, C<40)"];
        const mgBody = majorGroups.map((row, i) => [HUE_RANGES_MAJOR[i], row[0], row[1], row[3], row[2]]);
        const extremeBody = [
            ["Extremes", "Value"],
            ["White (L>95)", extremeGroups.white],
            ["Black (L<5)", extremeGroups.black],
            ["Light Gray (C<10, L>=50)", extremeGroups.lightGray],
            ["Dark Gray (C<10, L<50)", extremeGroups.darkGray],
            [],
            mgHeader,
            ...mgBody
        ];
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(extremeBody), "Major Groups");

        const sessionBody = [["Current L", l], ["Current C", c], ["Current H", h], ["Active View", activeView], ["Flipped", isFlipped], ["Locked Cells", JSON.stringify(lockedCells)], ["Flip X", flipX], ["Flip Y", flipY], ["Palette JSON", JSON.stringify(palette)]];
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([["Key", "Value"], ...sessionBody]), "Session");
        XLSX.writeFile(wb, "ColorSAMIficator_Manufacturing.xlsx"); 
    }; 

    const handleImport = (e) => { 
        const file = e.target.files[0]; if(!file) return; 
        const reader = new FileReader(); 
        reader.onload = (evt) => { 
            const wb = XLSX.read(evt.target.result, {type: 'binary'}); 
            if(wb.Sheets["Ranges"]) {
                const rangeRaw = XLSX.utils.sheet_to_json(wb.Sheets["Ranges"]);
                const newL = rangeRaw.filter(r => r.Type === "Light").map(r => ({ label: r.Label, min: parseInt(r.Min), max: parseInt(r.Max), mid: parseFloat(r.Mid) }));
                const newC = rangeRaw.filter(r => r.Type === "Chroma").map(r => ({ label: r.Label, min: parseInt(r.Min), max: parseInt(r.Max), mid: parseFloat(r.Mid) }));
                if (newL.length > 0) setLightRanges(newL); if (newC.length > 0) setChromaRanges(newC);
            }
            if(wb.Sheets["Adjectives"]) { 
                const rawAdj = XLSX.utils.sheet_to_json(wb.Sheets["Adjectives"], {header: 1}); 
                let matrixData = rawAdj.length > 0 && rawAdj[0][0] === "(L/C)" ? rawAdj.slice(1).map(row => row.slice(1)) : rawAdj;
                setAdjectiveMatrix(matrixData.map(row => row.map(cell => cell || "")));
            } 
            if(wb.Sheets["Nouns"]) { 
                const rawNouns = XLSX.utils.sheet_to_json(wb.Sheets["Nouns"], {header: 1}); 
                if (rawNouns.length > 0) {
                    const startIndex = rawNouns[0][0] === "Hue Angle" ? 1 : 0;
                    const newHues = [];
                    const newNouns = rawNouns.slice(1).map(row => {
                        newHues.push(parseInt(row[0].toString().replace('°','')));
                        return row.slice(startIndex, startIndex + 2).map(n => n || "Hue").join(',');
                    });
                    setHueValues(newHues); setNounData(newNouns);
                }
            }
            if(wb.Sheets["Major Groups"]) {
                const rawMG = XLSX.utils.sheet_to_json(wb.Sheets["Major Groups"], {header: 1});
                const newMG = [];
                let newExtremes = { ...extremeGroups };
                rawMG.forEach(row => {
                    if(!row[0]) return;
                    const key = row[0].toString();
                    if(key.includes("White")) newExtremes.white = row[1] || "White";
                    else if(key.includes("Black")) newExtremes.black = row[1] || "Black";
                    else if(key.includes("Light Gray") || key.includes("Light")) newExtremes.lightGray = row[1] || "Light Gray";
                    else if(key.includes("Dark Gray") || key.includes("Dark")) newExtremes.darkGray = row[1] || "Dark Gray";
                    else if(key.includes("Gray")) newExtremes.lightGray = row[1] || "Gray";
                    else if(key.includes("°")) {
                        newMG.push([row[1]||"", row[2]||"", row[3]||"", row[4]||""]);
                    }
                });
                if(newMG.length === 12) setMajorGroups(newMG);
                setExtremeGroups(newExtremes);
            }
            if(wb.Sheets["Session"]) {
                const sessionRaw = XLSX.utils.sheet_to_json(wb.Sheets["Session"]);
                const lockedRow = sessionRaw.find(r => r.Key === "Locked Cells");
                if (lockedRow && lockedRow.Value) {
                    try { setLockedCells(JSON.parse(lockedRow.Value)); } catch(e) {}
                }
                const fXRow = sessionRaw.find(r => r.Key === "Flip X");
                if (fXRow && fXRow.Value !== undefined) setFlipX(fXRow.Value === true || fXRow.Value === "true");
                const fYRow = sessionRaw.find(r => r.Key === "Flip Y");
                if (fYRow && fYRow.Value !== undefined) setFlipY(fYRow.Value === true || fYRow.Value === "true");
            }
        }; 
        reader.readAsBinaryString(file); e.target.value = "";
    }; 

    const activeNounColIdx = l < 50 ? 0 : 1; 

    return ( 
    <div className="w-full h-full bg-white dark:bg-neutral-950 md:rounded-3xl shadow-xl border border-slate-100 dark:border-neutral-900 flex flex-col overflow-hidden transition-colors duration-300"> 
    {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
    
    <div className="shrink-0 py-2 md:py-3 flex flex-col items-center bg-white dark:bg-neutral-950 z-20 shadow-sm relative transition-colors duration-300 border-b border-slate-100 dark:border-neutral-900"> 
        <h1 className="text-xl md:text-3xl font-black tracking-tighter text-slate-900 dark:text-neutral-100">The COLOR<span className="text-green-600 dark:text-green-500">SAMI</span>FICATOR</h1> 
        <span className="text-xs font-bold text-slate-400 dark:text-neutral-500 tracking-wider">1.84</span>
        
        {/* Left Toolbar (History + Help) */}
        <div className="absolute left-2 md:left-6 top-1/2 -translate-y-1/2 flex items-center gap-1 md:gap-2">
            <button onClick={handleUndo} disabled={historyIndex === 0} className={`p-2 rounded-full transition-colors ${historyIndex === 0 ? 'opacity-30 cursor-not-allowed text-slate-400' : 'hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300'}`}>
                <UndoIcon className="w-5 h-5" />
            </button>
            <button onClick={handleRedo} disabled={historyIndex === history.length - 1} className={`p-2 rounded-full transition-colors ${historyIndex === history.length - 1 ? 'opacity-30 cursor-not-allowed text-slate-400' : 'hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300'}`}>
                <RedoIcon className="w-5 h-5" />
            </button>
            <div className="w-px h-6 bg-slate-200 dark:bg-neutral-800 mx-1 self-center hidden md:block"></div>
            
            <img 
                src="Stelumar_PNG-CLR.png" 
                alt="Stelumar Logo" 
                className="h-6 md:h-10 object-contain mr-1 md:mr-2"
                onError={(e) => { 
                    e.target.onerror = null; 
                    e.target.src = 'https://placehold.co/150x40/09281a/efebe1?text=STELUMAR'; 
                }}
            />

            <button onClick={() => setShowHelp(true)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300 transition-colors hidden md:block">
                <HelpCircle className="w-5 h-5" />
            </button>
        </div>

        {/* Right Toolbar (Export/Import/Theme) */}
        <div className="absolute right-2 md:right-6 top-1/2 -translate-y-1/2 flex items-center gap-1 md:gap-2"> 
            <div className="hidden sm:flex items-center px-2 py-1.5 rounded-md bg-slate-50 dark:bg-neutral-900/50 border border-slate-100 dark:border-neutral-800 mr-1 transition-colors" title="Detected Display Gamut">
                <Monitor className="w-3 h-3 text-slate-400 mr-1.5" />
                <span className="text-[9px] font-black text-slate-500 dark:text-neutral-400 uppercase tracking-widest">{displayGamut === 'p3' ? 'Display P3' : 'sRGB'}</span>
            </div>
            <button onClick={() => setIsDark(!isDark)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300 transition-colors">
                {isDark ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
            </button>
            <div className="w-px h-6 bg-slate-200 dark:bg-neutral-800 mx-1 self-center hidden md:block"></div>
            <button onClick={handleExport} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300 transition-colors hidden md:block">
                <Download className="w-5 h-5" />
            </button>
            <label className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300 cursor-pointer transition-colors"><Upload className="w-5 h-5" /><input type="file" onChange={handleImport} className="hidden" accept=".xlsx, .xls" /></label> 
        </div> 
    </div> 
    
    <div className="flex-1 min-h-0 flex flex-col md:flex-row"> 
        {/* Left Control Panel: Width fixed on desktop for more grid space */}
        <div className="order-1 w-full md:w-80 lg:w-[360px] shrink-0 flex-none h-[45%] md:h-full border-b md:border-b-0 md:border-r border-slate-100 dark:border-neutral-900 flex flex-col p-4 md:p-6 bg-white dark:bg-neutral-950 z-10 overflow-y-auto transition-colors duration-300 custom-scroll"> 
        
        {/* SWATCH CONTAINER */}
        <div className="w-full shrink-0 aspect-video md:aspect-[2/1] rounded-xl md:rounded-3xl flex flex-col items-center justify-center relative overflow-hidden mb-4 transition-all duration-300 min-h-[200px] border border-slate-200 dark:border-neutral-800 shadow-sm" style={swatchStyle}> 
            {isExactOut && <div className="absolute inset-0 opacity-100 pointer-events-none" style={{backgroundImage: 'repeating-linear-gradient(45deg, var(--hatch-dark) 0px, var(--hatch-dark) 4px, var(--hatch-light) 4px, var(--hatch-light) 8px)'}}></div>}
            
            {/* Top Left: Color Code */}
            <div className="absolute top-3 left-3 z-30 bg-white/90 dark:bg-black/80 backdrop-blur text-slate-900 dark:text-neutral-100 px-3 py-1 rounded-full text-xs font-mono font-bold shadow-sm border border-white/50 dark:border-white/10 flex items-center gap-1 pointer-events-auto">
                <Tag className="w-3 h-3 text-blue-500" /> {currentMapping.code}
            </div>
            
            {/* Top Right: Padlock */}
            <div className={`absolute top-3 right-3 z-30 transition-colors pointer-events-auto`}>
                <button 
                    onClick={() => {
                        setLockedCells(prev => 
                            prev.includes(currentCellKey) 
                                ? prev.filter(k => k !== currentCellKey) 
                                : [...prev, currentCellKey]
                        );
                    }}
                    title={isCurrentExplicitlyLocked ? "Unlock Cell" : "Lock Cell"}
                    className="p-1.5 rounded-full hover:bg-black/20 dark:hover:bg-white/20 transition-all"
                >
                    {isCurrentExplicitlyLocked ? (
                        <Lock className={`w-5 h-5 drop-shadow-md ${l < 50 ? 'text-white' : 'text-black'}`} />
                    ) : (
                        <Unlock className={`w-5 h-5 drop-shadow-md opacity-40 hover:opacity-100 ${l < 50 ? 'text-white' : 'text-black'}`} />
                    )}
                </button>
            </div>

            {/* Bottom Left: LCH & Delta E */}
            <div className="absolute bottom-3 left-3 z-30 flex flex-wrap gap-2 pointer-events-auto max-w-[60%]">
                <div className="px-2 py-1 bg-black/40 backdrop-blur-md rounded text-[10px] font-mono text-white flex items-center gap-1">L{Number(l).toFixed(1)} C{Number(c).toFixed(1)} H{Number(h).toFixed(1)}</div> 
                {deltaE !== '0.0' && (
                    <div className="px-2 py-1 bg-white dark:bg-neutral-900 text-blue-600 dark:text-blue-400 backdrop-blur-md rounded text-[10px] font-black flex items-center gap-1"><Ruler className="w-3 h-3" /> ΔE {deltaE}</div> 
                )}
            </div>

            {/* Bottom Right: Major Group */}
            <div className="absolute bottom-3 right-3 z-30 pointer-events-auto max-w-[40%] text-right">
                <div className="px-2 py-1 bg-purple-600 text-white dark:bg-purple-500/20 dark:text-purple-300 backdrop-blur-md rounded text-[10px] font-black uppercase tracking-wider flex items-center justify-end gap-1"><Layers className="w-3 h-3" /> {majorGroup}</div>
            </div>

            {/* Center: Names & Warnings */}
            <div className="z-20 text-center flex flex-col items-center justify-center w-full px-4 pointer-events-none mt-2"> 
                {nameWarning && (
                    <div className="mb-2 px-3 py-1.5 bg-red-500/90 backdrop-blur text-white text-[10px] font-bold rounded-xl flex items-center justify-center gap-1 shadow-lg animate-pulse pointer-events-auto max-w-full text-center">
                        <AlertTriangle className="w-4 h-4 shrink-0" />
                        {nameWarning}
                    </div>
                )}
                
                { (safeLIdx === 0 || safeLIdx === 21) ? (
                    <div className="font-black text-2xl md:text-4xl w-full text-center leading-tight break-words relative pointer-events-auto" style={{ color: l > 50 ? 'black' : 'white', textShadow: l > 50 ? 'none' : '0 2px 10px rgba(0,0,0,0.6)' }}>
                        {currentMapping.baseNoun}
                    </div>
                ) : (
                    <div className="flex flex-col w-full max-w-[95%] mx-auto items-center justify-center gap-1 md:gap-2 relative pointer-events-auto"> 
                        <AutoInput 
                            value={tempAdj !== null ? tempAdj : currentMapping.adj} 
                            onChange={(e) => setTempAdj(e.target.value)}
                            onBlur={() => { handleAdjChange(tempAdj !== null ? tempAdj : currentMapping.adj); setTempAdj(null); }}
                            disabled={isAdjLocked}
                            placeholder="Adjective"
                            emptyText="+"
                            className={`font-black text-xl md:text-3xl rounded transition-colors ${isAdjLocked ? 'opacity-50 cursor-not-allowed' : 'hover:bg-white/10 dark:hover:bg-black/20 focus:bg-white/20 dark:focus:bg-black/30'}`} 
                            style={{ color: l > 50 ? 'black' : 'white', textShadow: l > 50 ? 'none' : '0 2px 10px rgba(0,0,0,0.6)' }} 
                        />
                        <AutoInput 
                            value={tempNoun !== null ? tempNoun : currentMapping.baseNoun} 
                            onChange={(e) => setTempNoun(e.target.value)}
                            onBlur={() => { handleNounChange(tempNoun !== null ? tempNoun : currentMapping.baseNoun); setTempNoun(null); }}
                            disabled={isNounLocked || safeCIdx === 0}
                            placeholder="Noun"
                            emptyText="Noun"
                            className={`font-black text-2xl md:text-4xl rounded transition-colors ${(isNounLocked || safeCIdx === 0) ? 'opacity-50 cursor-not-allowed' : 'hover:bg-white/10 dark:hover:bg-black/20 focus:bg-white/20 dark:focus:bg-black/30'}`} 
                            style={{ color: l > 50 ? 'black' : 'white', textShadow: l > 50 ? 'none' : '0 2px 10px rgba(0,0,0,0.6)' }} 
                        />
                    </div>
                )}
            </div> 
        </div> 

        <div className="bg-slate-50 dark:bg-neutral-950/50 p-4 md:p-6 rounded-2xl border border-slate-100 dark:border-neutral-900 space-y-2 shrink-0 transition-colors duration-300"> 
            <SnapControl label="Light" value={l} setter={setL} max={100} displayVal={Math.round(l)} gradient={lightGradientBg} isActive={activeView.includes('hue') || activeView.includes('chroma')} /> 
            <SnapControl label="Chroma" value={c} setter={setC} max={140} displayVal={Math.round(c)} gradient={chromaGradientBg} isActive={activeView.includes('hue') || activeView.includes('light')} /> 
            <SnapControl label="Hue" value={h} setter={setH} max={360} displayVal={Math.round(h) + "°"} gradient={hueGradientBg} isActive={activeView.includes('chroma') || activeView.includes('light')} /> 
        </div> 

        <div className="bg-slate-50 dark:bg-neutral-950/50 p-4 rounded-2xl border border-slate-100 dark:border-neutral-900 shrink-0 mt-4 transition-colors duration-300">
            <div className="text-[10px] font-bold text-slate-400 dark:text-neutral-500 uppercase mb-3 flex items-center gap-2"><RefreshCw className="w-3 h-3" /> Exact Converter</div>
            <div className="grid grid-cols-3 gap-3">
                <ConverterInput label="HEX" value={exactHex} onConvert={handleHexConvert} placeholder="#000000" />
                <ConverterInput label="RGB" value={`${exactRawRgb.r}, ${exactRawRgb.g}, ${exactRawRgb.b}`} onConvert={handleRgbConvert} placeholder="R, G, B" />
                <ConverterInput label="LAB" value={exactLabStr} onConvert={handleLabConvert} placeholder="L, a, b" />
            </div>
        </div>

        <div className="bg-slate-50 dark:bg-neutral-950/50 p-4 rounded-2xl border border-slate-100 dark:border-neutral-900 shrink-0 my-4 transition-colors duration-300"> 
            <div className="text-[10px] font-bold text-slate-400 dark:text-neutral-500 uppercase mb-3 flex items-center gap-2"><Palette className="w-3 h-3" /> Harmonies</div> 
            <div className="flex justify-between items-center px-2 overflow-x-auto scroll-hide pb-2"> 
                <HarmonySwatch offset={0} label="Base" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <div className="w-px h-6 bg-slate-200 dark:bg-neutral-800 mx-2 flex-shrink-0"></div> 
                <HarmonySwatch offset={180} label="Comp" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <HarmonySwatch offset={-30} label="Ana -" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <HarmonySwatch offset={30} label="Ana +" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <div className="w-px h-6 bg-slate-200 dark:bg-neutral-800 mx-2 flex-shrink-0"></div> 
                <HarmonySwatch offset={120} label="Tri 1" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <HarmonySwatch offset={240} label="Tri 2" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
            </div> 
        </div>

        {/* PALETTE PLAYGROUND */}
        <div className="bg-slate-50 dark:bg-neutral-950/50 p-4 rounded-2xl border border-slate-100 dark:border-neutral-900 shrink-0 mb-4 transition-colors duration-300">
            <div className="flex justify-between items-center mb-3">
                <div className="text-[10px] font-bold text-slate-400 dark:text-neutral-500 uppercase flex items-center gap-2"><Layers className="w-3 h-3" /> Palette Playground</div>
                <div className="text-[9px] font-bold text-slate-400 dark:text-neutral-600 uppercase">{palette.length}/10</div>
            </div>
            <div className="flex flex-wrap gap-2">
                {palette.map((p, i) => {
                     const gamutStatus = checkGamut(p.l, p.c, p.h);
                     const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
                     
                     const pBg = getMappedCssColor(p.l, p.c, p.h, displayGamut);
                     return (
                         <div key={i} onClick={() => updateColorWithHistory(p.l, p.c, p.h)} className="w-8 h-8 rounded-lg shadow-sm border border-black/10 dark:border-white/10 cursor-pointer relative group transition-transform hover:scale-110 shrink-0 overflow-hidden" style={{backgroundColor: pBg}}>
                            {isOut && <div className="absolute inset-0 opacity-100 pointer-events-none" style={{backgroundImage: 'repeating-linear-gradient(45deg, var(--hatch-dark) 0px, var(--hatch-dark) 4px, var(--hatch-light) 4px, var(--hatch-light) 8px)'}}></div>}
                            <div onClick={(e) => { e.stopPropagation(); setPalette(palette.filter((_, idx) => idx !== i)); }} className="absolute -top-1 -right-1 bg-white dark:bg-neutral-800 text-slate-400 dark:text-neutral-300 hover:text-red-500 dark:hover:text-red-400 rounded-full p-0.5 shadow-md opacity-0 group-hover:opacity-100 transition-opacity">
                                <X className="w-2 h-2" />
                            </div>
                         </div>
                     );
                })}
                {palette.length < 10 && (
