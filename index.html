 // --- W3C REFERENCE MATH ENGINE (CSS COLOR 4) ---
 const lch2lab = (l, c, h) => {
    const hRad = (h * Math.PI) / 180;
    return [l, c * Math.cos(hRad), c * Math.sin(hRad)];
 };

 const lab2xyz = (l, a, b) => {
    const y = (l + 16) / 116;
    const x = a / 500 + y;
    const z = y - b / 200;
    const fInv = (n) => n > 0.20689655172413793 ? Math.pow(n, 3) : (116 * n - 16) / 903.2962962962963;
    const D50 = [0.96422, 1.00000, 0.82521]; 
    return [D50[0] * fInv(x), D50[1] * fInv(y), D50[2] * fInv(z)];
 };

 const xyz2lin_srgb = (X, Y, Z) => {
    const r =  3.1338561 * X - 1.6168667 * Y - 0.4906146 * Z;
    const g = -0.9787684 * X + 1.9161415 * Y + 0.0334540 * Z;
    const b =  0.0719453 * X - 0.2289914 * Y + 1.4052427 * Z;
    return [r, g, b];
 };

 const lin2srgb = (lin) => {
    const gamma = (v) => {
        let absV = Math.abs(v);
        let res = absV <= 0.0031308 ? 12.92 * absV : 1.055 * Math.pow(absV, 1/2.4) - 0.055;
        return v < 0 ? -res : res;
    };
    return [gamma(lin[0]), gamma(lin[1]), gamma(lin[2])];
 };

 const xyz2lin_p3 = (X, Y, Z) => {
    const r =  2.4039833 * X - 0.9898394 * Y - 0.3976295 * Z;
    const g = -0.8421528 * X + 1.7988085 * Y + 0.0163351 * Z;
    const b =  0.0482087 * X - 0.1093952 * Y + 1.6134379 * Z;
    return [r, g, b];
 };

 const inGamut = ([r, g, b]) => {
    const e = 0.001; 
    return r >= -e && r <= 1+e && g >= -e && g <= 1+e && b >= -e && b <= 1+e;
 };

 const realLchToRgb = (l, c, h) => {
    if (l >= 100) return { r: 255, g: 255, b: 255, outOfGamut: false };
    if (l <= 0) return { r: 0, g: 0, b: 0, outOfGamut: false };
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    let linRGB = xyz2lin_srgb(X, Y, Z);
    let outOfGamut = !inGamut(linRGB);
    
    if (outOfGamut) {
        let minC = 0; let maxC = c; let bestC = 0;
        for (let i = 0; i < 20; i++) {
            const midC = (minC + maxC) / 2;
            const [tL, ta, tb] = lch2lab(l, midC, h);
            const [tX, tY, tZ] = lab2xyz(tL, ta, tb);
            const tRGB = xyz2lin_srgb(tX, tY, tZ);
            if (inGamut(tRGB)) { bestC = midC; minC = midC; } else { maxC = midC; }
        }
        const [mL, ma, mb] = lch2lab(l, bestC, h);
        const [mX, mY, mZ] = lab2xyz(mL, ma, mb);
        linRGB = xyz2lin_srgb(mX, mY, mZ);
    }
    const [rr, gg, bb] = lin2srgb(linRGB);
    const clamp = (v) => Math.round(Math.max(0, Math.min(1, v)) * 255);
    return { r: clamp(rr), g: clamp(gg), b: clamp(bb), outOfGamut };
 };

 const checkGamutStatus = (l, c, h) => {
    if (l >= 100 || l <= 0) return { isSRGB: true, isP3: true }; 
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    const linSRGB = xyz2lin_srgb(X, Y, Z);
    const linP3 = xyz2lin_p3(X, Y, Z);
    return { isSRGB: inGamut(linSRGB), isP3: inGamut(linP3) };
 };
 
 const checkGamut = checkGamutStatus;

 const getMappedCssColor = (l, c, h, gamut) => {
    if (l >= 100) return '#FFFFFF';
    if (l <= 0) return '#000000';
    
    const [L, a, b] = lch2lab(l, c, h);
    const [X, Y, Z] = lab2xyz(L, a, b);
    let linColor = gamut === 'p3' ? xyz2lin_p3(X, Y, Z) : xyz2lin_srgb(X, Y, Z);
    
    if (!inGamut(linColor)) {
        let minC = 0; let maxC = c; let bestC = 0;
        for (let i = 0; i < 20; i++) {
            const midC = (minC + maxC) / 2;
            const [tL, ta, tb] = lch2lab(l, midC, h);
            const [tX, tY, tZ] = lab2xyz(tL, ta, tb);
            const tLin = gamut === 'p3' ? xyz2lin_p3(tX, tY, tZ) : xyz2lin_srgb(tX, tY, tZ);
            if (inGamut(tLin)) { bestC = midC; minC = midC; } else { maxC = midC; }
        }
        const [mL, ma, mb] = lch2lab(l, bestC, h);
        const [mX, mY, mZ] = lab2xyz(mL, ma, mb);
        linColor = gamut === 'p3' ? xyz2lin_p3(mX, mY, mZ) : xyz2lin_srgb(mX, mY, mZ);
    }

    const [v1, v2, v3] = lin2srgb(linColor); 
    const clamp = (v) => Math.max(0, Math.min(1, v));
    
    if (gamut === 'p3') {
        return `color(display-p3 ${clamp(v1).toFixed(4)} ${clamp(v2).toFixed(4)} ${clamp(v3).toFixed(4)})`;
    } else {
        const r = Math.round(clamp(v1) * 255);
        const g = Math.round(clamp(v2) * 255);
        const b = Math.round(clamp(v3) * 255);
        return `rgb(${r},${g},${b})`;
    }
 };

 // --- CONSTANTS & MIGRATION DATA ---
 const generateLightRanges = () => {
    const ranges = [{ label: "A", min: 0, max: 0, mid: 0 }]; 
    for (let i = 0; i < 19; i++) {
        const start = 1 + (i * 5);
        ranges.push({ label: String.fromCharCode(66 + i), min: start, max: start + 4, mid: start + 2 });
    }
    ranges.push({ label: "U", min: 96, max: 99, mid: 97.5 });
    ranges.push({ label: "V", min: 100, max: 100, mid: 100 });
    return ranges;
 };

 const generateChromaRanges = () => {
    const ranges = [{ label: "A", min: 0, max: 0, mid: 0 }];
    ranges.push({ label: "B", min: 1, max: 9, mid: 5 });
    for (let i = 0; i < 7; i++) {
        const start = 10 + (i * 10);
        ranges.push({ label: String.fromCharCode(67 + i), min: start, max: start + 9, mid: start + 4.5 });
    }
    ranges.push({ label: "J", min: 80, max: 100, mid: 90 });
    return ranges;
 };

 const NEW_LIGHT_RANGES = generateLightRanges();
 const NEW_CHROMA_RANGES = generateChromaRanges();
 const NEW_HUE_VALUES = Array.from({length: 120}, (_, i) => i * 3);
 const DEFAULT_ANCHORS = [{ label: "Dark", l: 25, c: 30 }, { label: "Light", l: 75, c: 30 }];

 const generateAdjectiveMatrix = () => {
    const lines = RAW_ADJECTIVES_CSV.trim().split('\n').map(l => l.trim()).filter(l => l && !l.toLowerCase().startsWith('l \\ c'));
    const matrix = Array(22).fill(null).map(() => Array(10).fill(""));

    lines.forEach(line => {
        const parts = line.split(',');
        const label = parts[0] || "";
        const match = label.match(/L(\d+)/i);
        if (match) {
            const lVal = parseInt(match[1]);
            if (lVal >= 1 && lVal <= 20) {
                const row = parts.slice(1, 11).map(s => s.trim());
                while(row.length < 10) row.push("");
                matrix[lVal] = row;
            }
        }
    });

    return matrix;
 };

 const generateNounData = () => {
    const lines = RAW_NOUNS_CSV.trim().split('\n').map(l => l.trim()).filter(l => l && !l.toLowerCase().startsWith('hue'));
    const nouns = Array(120).fill("Hue,Hue");
    
    lines.forEach((line) => {
        const parts = line.split(',');
        const angleMatch = (parts[0] || "").match(/\d+/);
        if (angleMatch) {
            const angle = parseInt(angleMatch[0]);
            const idx = Math.round(angle / 3);
            if (idx >= 0 && idx < 120) {
                nouns[idx] = `${(parts[1] || "Hue").trim()},${(parts[2] || "Hue").trim()}`;
            }
        }
    });
    return nouns;
 };

 // Safely returns the index for a value within custom range maps
 const getRangeIndex = (val, ranges) => {
    const rounded = Math.round(val);
    let idx = ranges.findIndex(rg => rounded >= rg.min && rounded <= rg.max);
    if (idx !== -1) return idx;
    
    let closest = 0;
    let minDiff = Infinity;
    ranges.forEach((rg, i) => {
        const diff = Math.abs(val - rg.mid);
        if (diff < minDiff) { minDiff = diff; closest = i; }
    });
    return closest;
 };

                    <h3 className="font-bold text-lg text-slate-800 dark:text-neutral-100 mb-2">Interface Overview</h3>
                    <ul className="list-disc pl-5 space-y-2">
                        <li><strong>Explorer Grid:</strong> A 2D matrix that lets you explore the color space. It locks one attribute (like Hue) and plots the other two against each other. Click cells to jump to colors, and use (+)(-) to zoom.</li>
                        <li><strong>Harmonies:</strong> Automatically generates mathematically related colors (analogous, complementary, triadic) based on your current selection.</li>

                    <ul className="list-disc pl-5 space-y-2">
                        <li><strong>L (Lightness):</strong> Ranges from 0 (pure black) to 100 (pure white).</li>
                        <li><strong>C (Chroma):</strong> Measures the intensity or saturation. 0 is a pure gray. Higher numbers mean more vivid colors.</li>
                        <li><strong>H (Hue):</strong> The actual color plotted on a 360-degree circle (e.g., 0° is Red, 120° is Green, 240° is Blue).</li>

 const ColorSAMIfier = () => { 
    // --- STATE ---
    const [h, setH] = useState(getFromLocal('h', 40)); 
    const [c, setC] = useState(getFromLocal('c', 50)); 
    const [l, setL] = useState(getFromLocal('l', 52)); 
    const [gridZoom, setGridZoom] = useState(() => getFromLocal('gridZoom', 1));
    
    // --- HISTORY STATE ---
    const [history, setHistory] = useState(() => {
        const local = getFromLocal('history', null);
        return local && local.length > 0 ? local : [{l: getFromLocal('l', 52), c: getFromLocal('c', 50), h: getFromLocal('h', 40)}];
    });
    const [historyIndex, setHistoryIndex] = useState(() => getFromLocal('historyIndex', 0));

    const [activeView, useStateView] = useState("hue_pivot"); 
    const setActiveView = (view) => useStateView(view);
    const [isFlipped, setIsFlipped] = useState(false); 
    const interactionSource = useRef(null); 
    const [displayGamut, setDisplayGamut] = useState("srgb");
    const [nameWarning, setNameWarning] = useState(null);
    const [isDark, setIsDark] = useState(() => getFromLocal('darkMode', false));
    const [showHelp, setShowHelp] = useState(false);

    const [lightRanges, setLightRanges] = useState(getFromLocal('lightRanges', NEW_LIGHT_RANGES));
    const [chromaRanges, setChromaRanges] = useState(getFromLocal('chromaRanges', NEW_CHROMA_RANGES));
    const [anchors, setAnchors] = useState(getFromLocal('anchors', DEFAULT_ANCHORS));
    const [hueValues, setHueValues] = useState(getFromLocal('hueValues', NEW_HUE_VALUES));
    
    const [adjectiveMatrix, setAdjectiveMatrix] = useState(() => {
        const local = getFromLocal('adjectiveMatrix', null);
        return (local && local.length === 22) ? local : generateAdjectiveMatrix();
    });
    
    const [nounData, setNounData] = useState(() => {
        const local = getFromLocal('nounData', null);
        return (local && local.length === 120) ? local : generateNounData();
    });
    
    const [palette, setPalette] = useState(getFromLocal('userPalette', []));
    const [tempName, setTempName] = useState(null);

    const parsedNouns = useMemo(() => nounData.map(row => row.split(',')), [nounData]);

    const handleZoomIn = () => setGridZoom(prev => {
        if (prev <= 0.1) return 0.25;
        const step = prev >= 1 ? 0.5 : 0.25;
        return Math.min(Math.round((prev + step) * 100) / 100, 3.0);
    });
    const handleZoomOut = () => setGridZoom(prev => {
        if (prev <= 0.25) return 0.1;
        const step = prev > 1 ? 0.5 : 0.25;
        return Math.max(Math.round((prev - step) * 100) / 100, 0.1);
    });

    // Handle Dark Mode toggling
    useEffect(() => {
        if (isDark) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        saveToLocal('darkMode', isDark);
    }, [isDark]);

    // Memoize the background generators to prevent intensive calculations every frame
    const lightGradientBg = useMemo(() => {
        const stops = []; const steps = 20; 
        for (let i = 0; i <= steps; i++) { 
            const pct = i / steps; let lV = pct * 100;
            const gamutStatus = checkGamut(lV, c, h);
            const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
            const color = getMappedCssColor(lV, c, h, displayGamut);
            // Even in the gradient track, keeping the actual color makes sense, we just won't show the hatching easily here
            stops.push(`${isOut ? 'transparent' : color} ${pct * 100}%`); 
        } 
        return `linear-gradient(to right, ${stops.join(', ')})`;
    }, [c, h, displayGamut]);

    const chromaGradientBg = useMemo(() => {
        const stops = []; const steps = 20; 
        for (let i = 0; i <= steps; i++) { 
            const pct = i / steps; let cV = pct * 100;
            const gamutStatus = checkGamut(l, cV, h);
            const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
            const color = getMappedCssColor(l, cV, h, displayGamut); 
            stops.push(`${isOut ? 'transparent' : color} ${pct * 100}%`); 
        } 
        return `linear-gradient(to right, ${stops.join(', ')})`;
    }, [l, h, displayGamut]);

    const hueGradientBg = useMemo(() => {
        const stops = []; const steps = 20; 
        for (let i = 0; i <= steps; i++) { 
            const pct = i / steps; let hV = hueValues[Math.min(hueValues.length-1, Math.round(pct * (hueValues.length-1)))]; 
            const gamutStatus = checkGamut(l, c, hV);
            const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
            const color = getMappedCssColor(l, c, hV, displayGamut); 
            stops.push(`${isOut ? 'transparent' : color} ${pct * 100}%`); 
        } 
        return `linear-gradient(to right, ${stops.join(', ')})`;
    }, [l, c, displayGamut, hueValues]);

    // DEBOUNCED LOCAL STORAGE SAVE (Crucial for Slider Performance)
    useEffect(() => {
        if (window.matchMedia && window.matchMedia("(color-gamut: p3)").matches) {
            setDisplayGamut("p3");
        } else {
            setDisplayGamut("srgb");
        }

        const timer = setTimeout(() => {
            saveToLocal('h', h); saveToLocal('c', c); saveToLocal('l', l);
            saveToLocal('gridZoom', gridZoom);
            saveToLocal('history', history); saveToLocal('historyIndex', historyIndex);
            saveToLocal('lightRanges', lightRanges); saveToLocal('chromaRanges', chromaRanges);
            saveToLocal('anchors', anchors); saveToLocal('hueValues', hueValues);
            saveToLocal('adjectiveMatrix', adjectiveMatrix);
            saveToLocal('nounData', nounData);
            saveToLocal('userPalette', palette);

        }, 300); // 300ms debounce

        return () => clearTimeout(timer);
    }, [h, c, l, gridZoom, history, historyIndex, adjectiveMatrix, nounData, lightRanges, chromaRanges, anchors, hueValues, palette]);
    
    useEffect(() => {
        setTempName(null);
    }, [l, c, h]);

    // History Logic 
    const updateColorWithHistory = useCallback((newL, newC, newH) => {
        setL(newL); setC(newC); setH(newH);
        setHistory(prev => {
            const newHist = prev.slice(0, historyIndex + 1);
            if (newHist.length > 0) {
                const last = newHist[newHist.length - 1];
                if (last.l === newL && last.c === newC && last.h === newH) return newHist;
            }
            newHist.push({l: newL, c: newC, h: newH});
            if(newHist.length > 50) newHist.shift(); 
            setHistoryIndex(newHist.length - 1);
            return newHist;
        });
    }, [historyIndex]);

    const handleCellClick = useCallback((lVal, cVal, hVal) => {
        interactionSource.current = 'click';
        updateColorWithHistory(lVal, cVal, hVal);
    }, [updateColorWithHistory]);

    // Independent closure ref so Noun list clicking doesn't depend on slider primitives for rendering
    const stateRef = useRef({ l, c, h });
    useEffect(() => { stateRef.current = { l, c, h }; }, [l, c, h]);

    const handleRowHueClick = useCallback((newH) => {
        updateColorWithHistory(stateRef.current.l, stateRef.current.c, newH);
    }, [updateColorWithHistory]);

    const handleUndo = () => {
        if (historyIndex > 0) {
            const prevIdx = historyIndex - 1;
            const state = history[prevIdx];
            setL(state.l); setC(state.c); setH(state.h);
            setHistoryIndex(prevIdx);
        }
    };

    const handleRedo = () => {
        if (historyIndex < history.length - 1) {
            const nextIdx = historyIndex + 1;
            const state = history[nextIdx];
            setL(state.l); setC(state.c); setH(state.h);
            setHistoryIndex(nextIdx);
        }
    };

    const updateAdjective = (r, cIdx, val) => {
        setAdjectiveMatrix(prev => {
            const next = [...prev];
            next[r] = [...next[r]];
            next[r][cIdx] = val;
            return next;
        });
    };

    const updateNoun = (r, cIdx, val) => {
        setNounData(prev => {
            const next = [...prev];
            const rowStr = next[r] || "";
            const parts = rowStr.split(',');
            while (parts.length < 2) parts.push("");
            parts[cIdx] = val;
            next[r] = parts.join(',');
            return next;
        });
    };

    const getIndexFromHue = (hue) => { 
        let closestIdx = 0;
        let minDiff = 360;
        hueValues.forEach((hVal, idx) => {
            let diff = Math.abs(hVal - hue);
            if(diff > 180) diff = 360 - diff; 
            if(diff < minDiff) {
                minDiff = diff;
                closestIdx = idx;
            }
        });
        return closestIdx;
    }; 
    
    const hIdx = getIndexFromHue(h);
    const lIdx = getRangeIndex(l, lightRanges); 
    const cIdx = getRangeIndex(c, chromaRanges); 

    const getNounColumnIndex = (lIdx) => { 
        return lIdx < 11 ? 0 : 1;
    }; 

    const currentMapping = useMemo(() => { 
        const rowLIdx = getRangeIndex(l, lightRanges);
        const rowCIdx = getRangeIndex(c, chromaRanges);
        
        if (rowLIdx === 0) return { baseNoun: "Nero", adj: "", code: `AA000`, strIdx:-1, hueRow:-1 }; 
        if (rowLIdx === 21) return { baseNoun: "Blanc", adj: "", code: `VA000`, strIdx:-1, hueRow:-1 }; 
        if (rowCIdx === 0) return { baseNoun: "Cinza", adj: adjectiveMatrix[rowLIdx]?.[0] || "", code: `${lightRanges[rowLIdx]?.label || 'A'}A000`, strIdx:-1, hueRow:-1 }; 
        
        const sIdx = getNounColumnIndex(rowLIdx);
        const bNoun = parsedNouns[hIdx]?.[sIdx] || "Hue"; 
        let adj = adjectiveMatrix[rowLIdx]?.[rowCIdx] || ""; 
        if (bNoun && adj && bNoun.toLowerCase() === adj.toLowerCase()) adj = ""; 
        return { baseNoun: bNoun, adj, code: `${lightRanges[rowLIdx]?.label || '?'}${chromaRanges[rowCIdx]?.label || '?'}${h.toString().padStart(3,'0')}`, strIdx: sIdx, hueRow: hIdx }; 
    }, [l, c, h, adjectiveMatrix, parsedNouns, hIdx, lightRanges, chromaRanges]);

    const fullDisplayName = currentMapping.adj ? `${currentMapping.adj} ${currentMapping.baseNoun}` : currentMapping.baseNoun; 

    const handleNameChange = (val) => {
        const rL = getRangeIndex(l, lightRanges);
        const rC = getRangeIndex(c, chromaRanges);
        if (rL === 0 || rL === 21) return; 

        const parts = val.trim().split(/\s+/);
        let newNoun = ""; let newAdj = "";
        if (parts.length === 1) { newNoun = parts[0]; } else { newNoun = parts.pop(); newAdj = parts.join(" "); }
        const checkNoun = newNoun.trim(); const checkAdj = newAdj.trim();
        let warning = null;

        if (rC === 0) {
            if (rL !== -1) updateAdjective(rL, 0, val.replace("Cinza", "").trim());
        } else {
             const sIdx = getNounColumnIndex(rL);
             const hRow = hIdx;
             if (hRow !== -1) updateNoun(hRow, sIdx, checkNoun);
             if (rL !== -1 && rC !== -1) updateAdjective(rL, rC, checkAdj);
             
             if (checkNoun && checkNoun.toLowerCase() !== "hue") {
                 for(let h=0; h<parsedNouns.length; h++) {
                     for(let s=0; s<2; s++) {
                         if (h === hRow && s === sIdx) continue;
                         const existing = parsedNouns[h][s];
                         if (existing && existing.toLowerCase() === checkNoun.toLowerCase()) {
                             warning = `Duplicate Noun '${checkNoun}' found at ${hueValues[h]}° / ${s === 0 ? 'Dark' : 'Light'}`;
                         }
                     }
                 }
             }
             if (checkAdj) {
                 for(let r=0; r<adjectiveMatrix.length; r++) {
                     for(let cIter=0; cIter<adjectiveMatrix[r].length; cIter++) {
                         if (r === rL && cIter === rC) continue;
                         const existing = adjectiveMatrix[r][cIter];
                         if (existing && existing.toLowerCase() === checkAdj.toLowerCase()) {
                             warning = `Duplicate Adjective '${checkAdj}' found at L:${lightRanges[r].label} C:${chromaRanges[cIter].label}`;
                         }
                     }
                 }
             }
        }
        setNameWarning(warning);
    };

    const safeLIdx = getRangeIndex(l, lightRanges);
    const safeCIdx = getRangeIndex(c, chromaRanges);
    
    let canonicalL = lightRanges[safeLIdx]?.mid ?? 50;
    let canonicalC = chromaRanges[safeCIdx]?.mid ?? 0;
    let canonicalH = hueValues[hIdx] ?? 0;

    if (safeLIdx === 0 || safeLIdx === 21 || safeCIdx === 0) {
        canonicalC = 0;
        canonicalH = 0;
    }

    const canonRgb = realLchToRgb(canonicalL, canonicalC, canonicalH);
    const canonHex = `#${canonRgb.r.toString(16).padStart(2,'0')}${canonRgb.g.toString(16).padStart(2,'0')}${canonRgb.b.toString(16).padStart(2,'0')}`.toUpperCase();
    const canonGamut = checkGamut(canonicalL, canonicalC, canonicalH);
    const deltaE = Math.sqrt(Math.pow(canonicalL - l, 2) + Math.pow(canonicalC - c, 2)).toFixed(1); 

    const getExplorerParams = useCallback((view, flipped, rI, cI) => {
        let localLIdx = safeLIdx, localCIdx = safeCIdx, localHIdx = hIdx;

        if (view === "hue_pivot") { localLIdx = flipped ? cI : rI; localCIdx = flipped ? rI : cI; } 
        else if (view === "chroma_pivot") { localHIdx = flipped ? cI : rI; localLIdx = flipped ? rI : cI; localCIdx = safeCIdx; } 
        else if (view === "light_pivot") { localHIdx = flipped ? cI : rI; localCIdx = flipped ? rI : cI; localLIdx = safeLIdx; }
        
        const safeL = lightRanges[localLIdx] || lightRanges[0];
        const safeC = chromaRanges[localCIdx] || chromaRanges[0];
        const safeH = hueValues[localHIdx] ?? 0;

        let cVal = safeC.mid;
        let hVal = safeH;
        
        if (localLIdx === 0 || localLIdx === 21 || localCIdx === 0) {
            cVal = 0;
            hVal = 0;
        }

        return { lVal: safeL.mid, cVal, hVal, lIdx: localLIdx, cIdx: localCIdx, hIdx: localHIdx };
    }, [safeLIdx, safeCIdx, hIdx, lightRanges, chromaRanges, hueValues]);

    const handleExport = () => { 
        const wb = XLSX.utils.book_new(); 
        const rangesData = [
            ["Type", "Label", "Min", "Max", "Mid"],
            ...lightRanges.map(r => ["Light", r.label, r.min, r.max, r.mid]),
            ...chromaRanges.map(r => ["Chroma", r.label, r.min, r.max, r.mid])
        ];
        const rangeWS = XLSX.utils.aoa_to_sheet(rangesData);
        XLSX.utils.book_append_sheet(wb, rangeWS, "Ranges");

        const adjHeader = ["(L/C)", ...chromaRanges.map(c => c.label)];
        const adjBody = adjectiveMatrix.map((row, i) => [lightRanges[i]?.label || `L${i}`, ...row]);
        const adjWS = XLSX.utils.aoa_to_sheet([adjHeader, ...adjBody]);
        XLSX.utils.book_append_sheet(wb, adjWS, "Adjectives"); 
        
        const nounHeader = ["Hue Angle", "Dark Shade (L<50)", "Light Shade (L≥50)"];
        const nounBody = nounData.map((row, i) => [`${hueValues[i]}°`, ...row.split(',')]);
        const nounWS = XLSX.utils.aoa_to_sheet([nounHeader, ...nounBody]);
        XLSX.utils.book_append_sheet(wb, nounWS, "Nouns"); 
        
        const sessionHeader = ["Key", "Value"];
        const sessionBody = [
            ["Current L", l], ["Current C", c], ["Current H", h],
            ["Active View", activeView], ["Flipped", isFlipped],
            ["Palette JSON", JSON.stringify(palette)]
        ];
        const sessionWS = XLSX.utils.aoa_to_sheet([sessionHeader, ...sessionBody]);
        XLSX.utils.book_append_sheet(wb, sessionWS, "Session");

        XLSX.writeFile(wb, "ColorSAMIficator_Manufacturing.xlsx"); 
    }; 

    const handleImport = (e) => { 
        const file = e.target.files[0]; if(!file) return; 
        const reader = new FileReader(); 
        reader.onload = (evt) => { 
            const wb = XLSX.read(evt.target.result, {type: 'binary'}); 
            if(wb.Sheets["Ranges"]) {
                const rangeRaw = XLSX.utils.sheet_to_json(wb.Sheets["Ranges"]);
                const newL = rangeRaw.filter(r => r.Type === "Light").map(r => ({ label: r.Label, min: parseInt(r.Min), max: parseInt(r.Max), mid: parseFloat(r.Mid) }));
                const newC = rangeRaw.filter(r => r.Type === "Chroma").map(r => ({ label: r.Label, min: parseInt(r.Min), max: parseInt(r.Max), mid: parseFloat(r.Mid) }));
                if (newL.length > 0) setLightRanges(newL);
                if (newC.length > 0) setChromaRanges(newC);
            }
            if(wb.Sheets["Adjectives"]) { 
                const rawAdj = XLSX.utils.sheet_to_json(wb.Sheets["Adjectives"], {header: 1}); 
                let matrixData = rawAdj;
                if (rawAdj.length > 0 && rawAdj[0][0] === "(L/C)") {
                     const body = rawAdj.slice(1);
                     matrixData = body.map(row => row.slice(1));
                }
                setAdjectiveMatrix(matrixData.map(row => row.map(cell => cell || "")));
            } 
            if(wb.Sheets["Nouns"]) { 
                const rawNouns = XLSX.utils.sheet_to_json(wb.Sheets["Nouns"], {header: 1}); 
                if (rawNouns.length > 0) {
                    const headerRow = rawNouns[0]; let startIndex = 0;
                    if (headerRow[0] === "Hue Angle") startIndex = 1;
                    const body = rawNouns.slice(1);
                    const newHues = [];
                    const newNouns = body.map(row => {
                        const hueStr = row[0].toString().replace('°','');
                        newHues.push(parseInt(hueStr));
                        const nounParts = row.slice(startIndex, startIndex + 2); 
                        return nounParts.map(n => n || "Hue").join(',');
                    });
                    setHueValues(newHues); setNounData(newNouns);
                }
            }
            if(wb.Sheets["Session"]) {
                const sessionRaw = XLSX.utils.sheet_to_json(wb.Sheets["Session"], {header: 1}); 
                sessionRaw.forEach(row => {
                    const k = row[0]; const v = row[1];
                    if (k === "Current L") setL(parseFloat(v));
                    if (k === "Current C") setC(parseFloat(v));
                    if (k === "Current H") setH(parseFloat(v));
                    if (k === "Active View") setActiveView(v);
                    if (k === "Flipped") setIsFlipped(v === "true" || v === true);
                    if (k === "Palette JSON") { try { setPalette(JSON.parse(v)); } catch(e) {} }
                });
            }
        }; 
        reader.readAsBinaryString(file); e.target.value = "";
    }; 

    const lightRangeData = useMemo(() => lightRanges.map((r, i) => ({ label: r.label, index: i, isActive: i === safeLIdx, data: r })), [safeLIdx, lightRanges]);
    const chromaRangeData = useMemo(() => chromaRanges.map((r, i) => ({ label: r.label, index: i, isActive: i === safeCIdx, data: r })), [safeCIdx, chromaRanges]);
    const hueRangesData = useMemo(() => hueValues.map((val, i) => {
        const nextVal = hueValues[i+1] !== undefined ? hueValues[i+1] : 360;
        const maxVal = nextVal - (nextVal > val ? 1 : 0);
        return { label: `${val}°`, index: i, isActive: i === hIdx, data: { min: val, max: maxVal > val ? maxVal : val } };
    }), [hIdx, hueValues]);

    const renderCell = useCallback((rI, cI) => {
        const { lVal, cVal, hVal, lIdx: cellL, cIdx: cellC, hIdx: cellH } = getExplorerParams(activeView, isFlipped, rI, cI);
        const isActive = cellL === safeLIdx && cellC === safeCIdx && cellH === hIdx;
        
        const anchor = getNounColumnIndex(cellL);
        let noun = parsedNouns[cellH]?.[anchor] || "Hue";
        if (cellL === 0) noun = "Nero"; else if (cellL === 21) noun = "Blanc"; else if (cellC === 0) noun = "Cinza";

        const adj = adjectiveMatrix[cellL]?.[cellC] || "";

        return (
            <MatrixCell 
                key={`${rI}-${cI}`}
                rI={rI} cI={cI} 
                isActive={isActive} cellL={cellL} cellC={cellC} 
                lVal={lVal} cVal={cVal} hVal={hVal} 
                noun={noun} adj={adj} displayGamut={displayGamut}
                onClick={handleCellClick}
            />
        );
    }, [activeView, isFlipped, getExplorerParams, safeLIdx, safeCIdx, hIdx, parsedNouns, adjectiveMatrix, displayGamut, handleCellClick]);

    const isCanonOut = displayGamut === 'p3' ? !canonGamut.isP3 : !canonGamut.isSRGB;
    const canonBgColor = getMappedCssColor(canonicalL, canonicalC, canonicalH, displayGamut);
    
    // Maintain canon background color overlaid with transparent hatch pattern
    const swatchStyle = { 
        backgroundColor: canonBgColor,
        backgroundImage: isCanonOut ? 'repeating-linear-gradient(45deg, var(--hatch-color) 0px, var(--hatch-color) 4px, transparent 4px, transparent 8px)' : 'none' 
    };

    // Boolean primitive passed down to prevent rerenders inside Noun list map
    const activeNounColIdx = l < 50 ? 0 : 1; 

    return ( 
    <div className="w-full h-full bg-white dark:bg-neutral-950 md:rounded-3xl shadow-xl border border-slate-100 dark:border-neutral-900 flex flex-col overflow-hidden transition-colors duration-300"> 
    {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
    
    <div className="shrink-0 py-2 md:py-3 flex flex-col items-center bg-white dark:bg-neutral-950 z-20 shadow-sm relative transition-colors duration-300 border-b border-slate-100 dark:border-neutral-900"> 
        <h1 className="text-xl md:text-3xl font-black tracking-tighter text-slate-900 dark:text-neutral-100">The COLOR<span className="text-green-600 dark:text-green-500">SAMI</span>FICATOR</h1> 
        <span className="text-xs font-bold text-slate-400 dark:text-neutral-500 tracking-wider">VERSION 1.24</span>
        
        {/* Left Toolbar (History + Help) */}
        <div className="absolute left-2 md:left-6 top-1/2 -translate-y-1/2 flex gap-1 md:gap-2">
            <button onClick={handleUndo} disabled={historyIndex === 0} className={`p-2 rounded-full transition-colors ${historyIndex === 0 ? 'opacity-30 cursor-not-allowed text-slate-400' : 'hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300'}`}>
                <UndoIcon className="w-5 h-5" />
            </button>
            <button onClick={handleRedo} disabled={historyIndex === history.length - 1} className={`p-2 rounded-full transition-colors ${historyIndex === history.length - 1 ? 'opacity-30 cursor-not-allowed text-slate-400' : 'hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300'}`}>
                <RedoIcon className="w-5 h-5" />
            </button>
            <div className="w-px h-6 bg-slate-200 dark:bg-neutral-800 mx-1 self-center hidden md:block"></div>
            <button onClick={() => setShowHelp(true)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300 transition-colors hidden md:block">
                <HelpCircle className="w-5 h-5" />
            </button>
        </div>

        {/* Right Toolbar (Export/Import/Theme) */}
        <div className="absolute right-2 md:right-6 top-1/2 -translate-y-1/2 flex gap-1 md:gap-2"> 
            <button onClick={() => setIsDark(!isDark)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300 transition-colors">
                {isDark ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
            </button>
            <div className="w-px h-6 bg-slate-200 dark:bg-neutral-800 mx-1 self-center hidden md:block"></div>
            <button onClick={handleExport} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300 transition-colors hidden md:block">
                <Download className="w-5 h-5" />
            </button>
            <label className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-600 dark:text-neutral-300 cursor-pointer transition-colors"><Upload className="w-5 h-5" /><input type="file" onChange={handleImport} className="hidden" accept=".xlsx, .xls" /></label> 
        </div> 
    </div> 
    
    <div className="flex-1 min-h-0 flex flex-col md:flex-row"> 
        {/* Left Control Panel: Width fixed on desktop for more grid space */}
        <div className="order-1 w-full md:w-80 lg:w-[360px] shrink-0 flex-none h-[45%] md:h-full border-b md:border-b-0 md:border-r border-slate-100 dark:border-neutral-900 flex flex-col p-4 md:p-6 bg-white dark:bg-neutral-950 z-10 overflow-y-auto transition-colors duration-300 custom-scroll"> 
        
        {/* SWATCH CONTAINER */}
        <div className="w-full shrink-0 aspect-[3/1] md:aspect-[2/1] rounded-xl md:rounded-3xl flex flex-col items-center justify-center relative overflow-hidden mb-4 transition-all duration-300 min-h-[160px] border border-slate-200 dark:border-neutral-800 shadow-sm" style={swatchStyle}> 
            <div className="z-20 text-center flex flex-col items-center w-full px-6 pointer-events-none"> 
                <div className="bg-white/90 dark:bg-black/80 backdrop-blur text-slate-900 dark:text-neutral-100 px-3 py-1 rounded-full text-xs font-mono font-bold mb-2 md:mb-4 shadow-sm border border-white/50 dark:border-white/10 flex items-center gap-1 z-10 pointer-events-auto"><Tag className="w-3 h-3 text-blue-500" /> {currentMapping.code}</div> 
                
                <input 
                    type="text" 
                    value={tempName !== null ? tempName : fullDisplayName} 
                    onChange={(e) => {
                        setTempName(e.target.value);
                        handleNameChange(e.target.value);
                    }}
                    onBlur={() => setTempName(null)}
                    className="font-black text-xl md:text-3xl w-full text-center leading-tight break-words bg-transparent border-none outline-none text-shadow-sm hover:bg-white/10 dark:hover:bg-black/20 rounded transition-colors z-10 relative pointer-events-auto" 
                    style={{ color: canonicalL > 50 ? 'black' : 'white', textShadow: canonicalL > 50 ? 'none' : '0 2px 10px rgba(0,0,0,0.6)' }} 
                />

                {nameWarning && (
                    <div className="mt-2 px-3 py-1 bg-red-500/90 backdrop-blur text-white text-[10px] font-bold rounded-full flex items-center gap-1 shadow-lg animate-bounce z-10 pointer-events-auto">
                        <AlertTriangle className="w-3 h-3" />
                        {nameWarning}
                    </div>
                )}

                <div className="mt-2 md:mt-4 flex gap-2 flex-wrap justify-center z-10 pointer-events-auto"> 
                    <div className="px-2 py-1 bg-black/40 backdrop-blur-md rounded text-[10px] font-mono text-white flex items-center gap-1">L{Math.round(canonicalL)} C{Math.round(canonicalC)} H{Math.round(canonicalH)}</div> 
                    <div className="px-2 py-1 bg-black/40 backdrop-blur-md rounded text-[10px] font-mono text-white flex items-center gap-1"><Hash className="w-3 h-3 opacity-70" /> {canonHex}</div> 
                    <div className="px-2 py-1 bg-black/40 backdrop-blur-md rounded text-[10px] font-mono text-white flex items-center gap-1">RGB {canonRgb.r},{canonRgb.g},{canonRgb.b}</div> 
                    <div className="px-2 py-1 bg-white dark:bg-neutral-900 text-blue-600 dark:text-blue-400 backdrop-blur-md rounded text-[10px] font-black flex items-center gap-1"><Ruler className="w-3 h-3" /> ΔE {deltaE}</div> 
                </div> 
            </div> 
        </div> 

        <div className="bg-slate-50 dark:bg-neutral-950/50 p-4 md:p-6 rounded-2xl border border-slate-100 dark:border-neutral-900 space-y-2 shrink-0 transition-colors duration-300"> 
            <SnapControl label="Light" value={l} setter={setL} max={100} displayVal={Math.round(l)} gradient={lightGradientBg} isActive={activeView.includes('hue') || activeView.includes('chroma')} /> 
            <SnapControl label="Chroma" value={c} setter={setC} max={100} displayVal={Math.round(c)} gradient={chromaGradientBg} isActive={activeView.includes('hue') || activeView.includes('light')} /> 
            <SnapControl label="Hue" value={h} setter={setH} max={360} displayVal={Math.round(h) + "°"} gradient={hueGradientBg} isActive={activeView.includes('chroma') || activeView.includes('light')} /> 
        </div> 

        <div className="bg-slate-50 dark:bg-neutral-950/50 p-4 rounded-2xl border border-slate-100 dark:border-neutral-900 shrink-0 my-4 transition-colors duration-300"> 
            <div className="text-[10px] font-bold text-slate-400 dark:text-neutral-500 uppercase mb-3 flex items-center gap-2"><Palette className="w-3 h-3" /> Harmonies</div> 
            <div className="flex justify-between items-center px-2 overflow-x-auto scroll-hide pb-2"> 
                <HarmonySwatch offset={0} label="Base" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <div className="w-px h-6 bg-slate-200 dark:bg-neutral-800 mx-2 flex-shrink-0"></div> 
                <HarmonySwatch offset={180} label="Comp" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <HarmonySwatch offset={-30} label="Ana -" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <HarmonySwatch offset={30} label="Ana +" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <div className="w-px h-6 bg-slate-200 dark:bg-neutral-800 mx-2 flex-shrink-0"></div> 
                <HarmonySwatch offset={120} label="Tri 1" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
                <HarmonySwatch offset={240} label="Tri 2" currentH={h} currentL={l} currentC={c} onSelect={(newH) => updateColorWithHistory(l, c, newH)} displayGamut={displayGamut} /> 
            </div> 
        </div>

        {/* PALETTE PLAYGROUND */}
        <div className="bg-slate-50 dark:bg-neutral-950/50 p-4 rounded-2xl border border-slate-100 dark:border-neutral-900 shrink-0 mb-4 transition-colors duration-300">
            <div className="flex justify-between items-center mb-3">
                <div className="text-[10px] font-bold text-slate-400 dark:text-neutral-500 uppercase flex items-center gap-2"><Layers className="w-3 h-3" /> Palette Playground</div>
                <div className="text-[9px] font-bold text-slate-400 dark:text-neutral-600 uppercase">{palette.length}/10</div>
            </div>
            <div className="flex flex-wrap gap-2">
                {palette.map((p, i) => {
                     const gamutStatus = checkGamut(p.l, p.c, p.h);
                     const isOut = displayGamut === 'p3' ? !gamutStatus.isP3 : !gamutStatus.isSRGB;
                     
                     const pBg = getMappedCssColor(p.l, p.c, p.h, displayGamut);
                     const style = { 
                         backgroundColor: pBg, 
                         backgroundImage: isOut ? 'repeating-linear-gradient(45deg, var(--hatch-color) 0px, var(--hatch-color) 2px, transparent 2px, transparent 6px)' : 'none' 
                     };
                     return (
                         <div key={i} onClick={() => updateColorWithHistory(p.l, p.c, p.h)} className="w-8 h-8 rounded-lg shadow-sm border border-black/10 dark:border-white/10 cursor-pointer relative group transition-transform hover:scale-110 shrink-0" style={style}>
                            <div onClick={(e) => { e.stopPropagation(); setPalette(palette.filter((_, idx) => idx !== i)); }} className="absolute -top-1 -right-1 bg-white dark:bg-neutral-800 text-slate-400 dark:text-neutral-300 hover:text-red-500 dark:hover:text-red-400 rounded-full p-0.5 shadow-md opacity-0 group-hover:opacity-100 transition-opacity">
                                <X className="w-2 h-2" />
                            </div>
                         </div>
                     );
                })}
                {palette.length < 10 && (
                    <button onClick={() => setPalette([...palette, {l, c, h}])} className="w-8 h-8 rounded-lg border-2 border-dashed border-slate-200 dark:border-neutral-700 flex items-center justify-center text-slate-300 dark:text-neutral-600 hover:border-slate-400 dark:hover:text-neutral-400 transition-colors shrink-0">
                        <Plus className="w-4 h-4" />
                    </button>
                )}
            </div>
        </div>

        </div> 
        
        <div className="order-2 flex-1 flex flex-col min-w-0 h-[55%] md:h-full bg-slate-50/50 dark:bg-black/50 transition-colors duration-300"> 
        <div className="h-14 border-b border-slate-200 dark:border-neutral-900 flex items-center px-4 md:px-6 justify-between bg-white dark:bg-neutral-950 shrink-0 transition-colors duration-300"> 
            
            <div className="flex items-center gap-2">
                <Grid className="w-4 h-4 text-blue-500 dark:text-blue-400" />
                <span className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-neutral-400 hidden sm:inline">Explorer Grid</span>
                <div className="ml-1 md:ml-3 flex items-center bg-slate-100 dark:bg-neutral-900 rounded-lg shadow-inner">
                    <ZoomOut onClick={handleZoomOut} className="w-6 h-6 p-1 text-slate-400 dark:text-neutral-500 hover:text-blue-500 dark:hover:text-blue-400 cursor-pointer transition-colors" />
                    <span className="text-[10px] font-mono w-8 text-center text-slate-500 dark:text-neutral-400">{Math.round(gridZoom * 100)}%</span>
                    <ZoomIn onClick={handleZoomIn} className="w-6 h-6 p-1 text-slate-400 dark:text-neutral-500 hover:text-blue-500 dark:hover:text-blue-400 cursor-pointer transition-colors" />
                </div>
            </div> 

            <div className="flex items-center gap-2"> 
                <RefreshCw onClick={() => setIsFlipped(!isFlipped)} className={`p-2 w-8 h-8 rounded hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-500 dark:text-neutral-400 cursor-pointer transition-colors ${isFlipped ? 'text-blue-600 dark:text-blue-400' : ''}`} /> 
                <select value={activeView} onChange={(e) => setActiveView(e.target.value)} className="bg-slate-100 dark:bg-neutral-900 pl-4 pr-8 py-1.5 rounded-lg text-xs font-bold text-slate-700 dark:text-neutral-200 cursor-pointer appearance-none transition-colors border border-transparent dark:border-neutral-800 focus:outline-none focus:border-blue-500"> 
                    <option value="hue_pivot">HUE FIXED</option> 
                    <option value="chroma_pivot">CHROMA FIXED</option> 
                    <option value="light_pivot">LIGHT FIXED</option> 
                    <option value="noun">NOUN LIST</option> 
                </select> 
            </div> 
        </div> 
        <div className="flex-1 overflow-hidden relative p-2 md:p-4"> 
            {activeView === 'hue_pivot' && ( 
            <MatrixTable zoom={gridZoom} yLabel={isFlipped ? "C" : "L"} xLabel={isFlipped ? "L" : "C"} yData={isFlipped ? chromaRangeData : lightRangeData} xData={isFlipped ? lightRangeData : chromaRangeData} activeIds={{r: isFlipped ? safeCIdx : safeLIdx, c: isFlipped ? safeLIdx : safeCIdx}} renderCell={renderCell} interactionSource={interactionSource} /> 
            )} 
            {activeView === 'chroma_pivot' && ( 
            <MatrixTable zoom={gridZoom} yLabel={isFlipped ? "L" : "H"} xLabel={isFlipped ? "H" : "L"} yData={isFlipped ? lightRangeData : hueRangesData} xData={isFlipped ? hueRangesData : lightRangeData} activeIds={{r: isFlipped ? safeLIdx : hIdx, c: isFlipped ? hIdx : safeLIdx}} renderCell={renderCell} interactionSource={interactionSource} /> 
            )} 
            {activeView === 'light_pivot' && ( 
            <MatrixTable zoom={gridZoom} yLabel={isFlipped ? "C" : "H"} xLabel={isFlipped ? "H" : "C"} yData={isFlipped ? chromaRangeData : hueRangesData} xData={isFlipped ? hueRangesData : chromaRangeData} activeIds={{r: isFlipped ? safeCIdx : hIdx, c: isFlipped ? hIdx : safeCIdx}} renderCell={renderCell} interactionSource={interactionSource} /> 
            )} 
            {activeView === 'noun' && ( 
             <div className="h-full w-full overflow-auto rounded-xl border border-slate-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 shadow-sm transition-colors duration-300 custom-scroll"> 
                 <table className="w-full text-xs text-left table-fixed border-separate border-spacing-0"> 
                 <thead className="bg-white dark:bg-neutral-950 sticky top-0 z-20 shadow-sm border-b border-slate-200 dark:border-neutral-900"> 
                     <tr> 
                     <th className="p-3 font-bold text-slate-400 dark:text-neutral-500 w-16 text-center bg-white dark:bg-neutral-950 sticky left-0 z-30 border-b border-slate-200 dark:border-neutral-900">Hue</th> 
                     <th className="p-3 font-bold text-slate-600 dark:text-neutral-300 bg-slate-50 dark:bg-neutral-950/50 border-b border-r border-slate-200 dark:border-neutral-900">Dark Shade (L&lt;50)</th>
                     <th className="p-3 font-bold text-slate-600 dark:text-neutral-300 bg-slate-50 dark:bg-neutral-950/50 border-b border-slate-200 dark:border-neutral-900">Light Shade (L&ge;50)</th>
                     </tr> 
                 </thead> 
                 <tbody> 
                 {nounData.map((rowStr, idx) => { 
                     const displayHue = hueValues[idx]; 
                     const parts = rowStr.split(','); 
                     const isHueActive = hIdx === idx;
                     return ( 
                     <tr key={idx} className={`transition-all duration-200 cursor-pointer ${isHueActive ? 'bg-blue-50/50 dark:bg-blue-900/20' : 'hover:bg-slate-50 dark:hover:bg-neutral-900/50'}`} data-active={isHueActive}> 
                         <td onClick={() => updateColorWithHistory(l, c, displayHue)} className={`p-2 text-center font-mono opacity-80 bg-white dark:bg-neutral-950 sticky left-0 z-10 border-b border-r border-slate-100 dark:border-neutral-900 ${isHueActive ? '!bg-blue-50 dark:!bg-blue-900/40 font-bold text-blue-600 dark:text-blue-400' : 'text-slate-600 dark:text-neutral-400'}`}>{displayHue}°</td> 
                         {[0, 1].map((colIdx) => {
                             const n = parts[colIdx] || "";
                             const isCellActive = isHueActive && (colIdx === (l < 50 ? 0 : 1));
                             const repL = colIdx === 0 ? 40 : 75;
                             const repC = 25; 
                             
                             const cellRgb = realLchToRgb(repL, repC, displayHue);
                             const cellColor = getMappedCssColor(repL, repC, displayHue, displayGamut);
                             
                             return (
                                 <td key={colIdx} onClick={() => updateColorWithHistory(repL, repC, displayHue)} className={`p-0 relative h-10 border-b border-r border-slate-100 dark:border-neutral-900 ${isCellActive ? 'ring-2 ring-blue-500 dark:ring-blue-400 z-20' : ''}`}>
                                    <div className="flex items-center h-full px-3 gap-2">
                                        <div className="w-4 h-4 rounded-full border border-black/10 dark:border-white/10 shrink-0" style={{backgroundColor: cellColor, backgroundImage: cellRgb.outOfGamut ? 'repeating-linear-gradient(45deg, var(--hatch-color) 0px, var(--hatch-color) 4px, transparent 4px, transparent 8px)' : 'none'}}></div>
                                        <input type="text" value={n} onChange={(e) => updateNoun(idx, colIdx, e.target.value)} className="w-full bg-transparent border-none outline-none font-medium text-slate-700 dark:text-neutral-200" />
                                    </div>
                                 </td>
                             )
                         })}
                     </tr> 
                     ); 
                 })} 
                 </tbody> 
                 </table> 
             </div> 
            )} 
        </div> 
        </div> 
    </div> 
    </div> 
    ); 
 }; 
 const root = ReactDOM.createRoot(document.getElementById('root')); 
 root.render(<ColorSAMIfier />); 
 </script> 
</body> 
</html>
