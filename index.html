                    <button onClick={() => setPalette([...palette, {l, c, h}])} className="w-8 h-8 rounded-lg border-2 border-dashed border-slate-200 dark:border-neutral-700 flex items-center justify-center text-slate-300 dark:text-neutral-600 hover:border-slate-400 dark:hover:text-neutral-400 transition-colors shrink-0">
                        <Plus className="w-4 h-4" />
                    </button>
                )}
            </div>
        </div>

        </div> 
        
        <div className="order-2 flex-1 flex flex-col min-w-0 h-[55%] md:h-full bg-slate-50/50 dark:bg-black/50 transition-colors duration-300"> 
        <div className="h-14 border-b border-slate-200 dark:border-neutral-900 flex items-center px-4 md:px-6 justify-between bg-white dark:bg-neutral-950 shrink-0 transition-colors duration-300"> 
            
            <div className="flex items-center gap-2">
                <div className="flex items-center gap-1 p-1 bg-slate-100 dark:bg-neutral-900 rounded-lg mr-2 hidden sm:flex">
                    <button onClick={() => setMatrixLOD('seamless')} className={`p-1.5 rounded transition-colors ${matrixLOD === 'seamless' ? 'bg-white dark:bg-neutral-800 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-neutral-300'}`} title="Continuous Seamless Space"><CrosshairIcon className="w-4 h-4" /></button>
                    <button onClick={() => setMatrixLOD('grid')} className={`p-1.5 rounded transition-colors ${matrixLOD === 'grid' ? 'bg-white dark:bg-neutral-800 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-neutral-300'}`} title="Discrete Grid Space"><Grid3x3 className="w-4 h-4" /></button>
                    <button onClick={() => setMatrixLOD('macro')} className={`p-1.5 rounded transition-colors ${matrixLOD === 'macro' ? 'bg-white dark:bg-neutral-800 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-neutral-300'}`} title="Major Groups Space"><Blocks className="w-4 h-4" /></button>
                </div>

                <div className="ml-1 md:ml-1 flex items-center bg-slate-100 dark:bg-neutral-900 rounded-lg shadow-inner px-2 py-1 gap-2">
                    <button onClick={() => setGridZoom(1)} className="text-[10px] font-black text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" title="Reset Zoom">100%</button>
                    <input 
                        type="range" min="0.1" max="3" step="0.01" 
                        value={gridZoom} 
                        onChange={(e) => setGridZoom(parseFloat(e.target.value))} 
                        className="w-16 md:w-24 h-1.5 bg-slate-300 dark:bg-neutral-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
                    />
                    <span className="text-[10px] font-mono w-8 text-right text-slate-500 dark:text-neutral-400">{Math.round(gridZoom * 100)}%</span>
                </div>
            </div> 

            <div className="flex items-center gap-1 md:gap-2"> 
                <ArrowLeftRight onClick={() => setFlipX(!flipX)} className={`p-2 w-8 h-8 rounded hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-500 dark:text-neutral-400 cursor-pointer transition-colors ${flipX ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30' : ''}`} title="Flip Horizontal" />
                <ArrowUpDown onClick={() => setFlipY(!flipY)} className={`p-2 w-8 h-8 rounded hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-500 dark:text-neutral-400 cursor-pointer transition-colors ${flipY ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30' : ''}`} title="Flip Vertical" />
                <RefreshCw onClick={() => setIsFlipped(!isFlipped)} className={`p-2 w-8 h-8 rounded hover:bg-slate-100 dark:hover:bg-neutral-900 text-slate-500 dark:text-neutral-400 cursor-pointer transition-colors ${isFlipped ? 'text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30' : ''}`} title="Transpose Axes" /> 
                <select value={activeView} onChange={(e) => setActiveView(e.target.value)} className="bg-slate-100 dark:bg-neutral-900 pl-4 pr-8 py-1.5 rounded-lg text-xs font-bold text-slate-700 dark:text-neutral-200 cursor-pointer appearance-none transition-colors border border-transparent dark:border-neutral-800 focus:outline-none focus:border-blue-500 ml-1"> 
                    <option value="hue_pivot">HUE FIXED</option> 
                    <option value="chroma_pivot">CHROMA FIXED</option> 
                    <option value="light_pivot">LIGHT FIXED</option> 
                    <option value="noun">NOUN LIST</option> 
                    <option value="adjective">ADJECTIVE LIST</option> 
                    <option value="major_groups">MAJOR GROUPS</option> 
                    <option value="locked_cells">LOCKED COLORS</option> 
                </select> 
            </div> 
        </div> 
        <div className="flex-1 overflow-hidden relative p-2 md:p-4"> 
            {(activeView === 'hue_pivot' || activeView === 'chroma_pivot' || activeView === 'light_pivot') && (
                <MatrixTable zoom={gridZoom} setZoom={setGridZoom} yLabel={currentYLabel} xLabel={currentXLabel} yData={finalYData} xData={finalXData} activeIds={{r: currentActiveR, c: currentActiveC}} renderCell={renderCell} interactionSource={interactionSource} matrixLOD={matrixLOD} h={h} c={c} l={l} flipX={flipX} flipY={flipY} displayGamut={displayGamut} updateColor={updateColorWithHistory} isDark={isDark} />
            )}
            {activeView === 'noun' && ( 
             <div className="h-full w-full overflow-auto rounded-xl border border-slate-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 shadow-sm transition-colors duration-300 custom-scroll"> 
                 <table className="w-full text-xs text-left table-fixed border-separate border-spacing-0"> 
                 <thead className="bg-white dark:bg-neutral-950 sticky top-0 z-20 shadow-sm border-b border-slate-200 dark:border-neutral-900"> 
                     <tr> 
                     <th className="p-3 font-bold text-slate-400 dark:text-neutral-500 w-16 text-center bg-white dark:bg-neutral-950 sticky left-0 z-30 border-b border-slate-200 dark:border-neutral-900">Hue</th> 
                     <th className="p-3 font-bold text-slate-600 dark:text-neutral-300 bg-slate-50 dark:bg-neutral-950/50 border-b border-r border-slate-200 dark:border-neutral-900">
                        <div className="flex flex-col">
                            Shades (L&lt;50)
                            <span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">{(cellCounts && cellCounts.nounCounts && cellCounts.nounCounts[hIdx]) ? cellCounts.nounCounts[hIdx][0] : 0} in-gamut</span>
                        </div>
                     </th>
                     <th className="p-3 font-bold text-slate-600 dark:text-neutral-300 bg-slate-50 dark:bg-neutral-950/50 border-b border-slate-200 dark:border-neutral-900">
                        <div className="flex flex-col">
                            Tints (L&ge;50)
                            <span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">{(cellCounts && cellCounts.nounCounts && cellCounts.nounCounts[hIdx]) ? cellCounts.nounCounts[hIdx][1] : 0} in-gamut</span>
                        </div>
                     </th>
                     </tr> 
                 </thead> 
                 <tbody> 
                 {nounData.map((_, idx) => { 
                     const displayHue = hueValues[idx]; 
                     const isHueActive = hIdx === idx;
                     const parts = parsedNouns[idx];
                     
                     const isNounDarkLocked = lockedCells.some(k => {
                         const pts = k.split('_');
                         const locL = parseInt(pts[1]);
                         const locC = parseInt(pts[3]);
                         const locH = parseInt(pts[5]);
                         return locC !== 0 && locL !== 0 && locL !== 21 && locH === idx && locL < 11;
                     });
                     
                     const isNounLightLocked = lockedCells.some(k => {
                         const pts = k.split('_');
                         const locL = parseInt(pts[1]);
                         const locC = parseInt(pts[3]);
                         const locH = parseInt(pts[5]);
                         return locC !== 0 && locL !== 0 && locL !== 21 && locH === idx && locL >= 11;
                     });
                     
                     return (
                         <NounRow 
                             key={idx} idx={idx} 
                             displayHue={displayHue} isHueActive={isHueActive} 
                             activeColIdx={activeNounColIdx}
                             parts={parts} displayGamut={displayGamut} 
                             isDarkLocked={isNounDarkLocked}
                             isLightLocked={isNounLightLocked}
                             onHueClick={handleRowHueClick} 
                             updateColorWithHistory={updateColorWithHistory} 
                             updateNoun={updateNoun}
                             counts={cellCounts?.nounCounts?.[idx]}
                         />
                     );
                 })} 
                 </tbody> 
                 </table> 
             </div> 
            )} 
            {activeView === 'adjective' && (
             <div className="h-full w-full overflow-auto rounded-xl border border-slate-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 shadow-sm transition-colors duration-300 custom-scroll"> 
                 <table className="w-full text-xs text-left table-fixed border-separate border-spacing-0"> 
                 <thead className="bg-white dark:bg-neutral-950 sticky top-0 z-20 shadow-sm border-b border-slate-200 dark:border-neutral-900"> 
                     <tr> 
                     <th className="p-2 font-bold text-slate-400 dark:text-neutral-500 w-16 text-center bg-white dark:bg-neutral-950 sticky left-0 z-30 border-b border-r border-slate-200 dark:border-neutral-900">L \ C</th> 
                     {chromaRanges.slice(1).map(c => (
                         <th key={c.index} className="p-2 font-bold text-slate-600 dark:text-neutral-300 bg-slate-50 dark:bg-neutral-950/50 border-b border-r border-slate-200 dark:border-neutral-900 text-center min-w-[90px]">{c.label}</th>
                     ))}
                     </tr> 
                 </thead> 
                 <tbody> 
                 {lightRanges.map((l, i) => ({...l, originalIndex: i})).slice(1, 21).reverse().map((lRange) => { 
                     const lIdx = lRange.originalIndex;
                     const isRowActive = safeLIdx === lIdx;
                     return (
                         <tr key={lIdx} className={`transition-all duration-200 ${isRowActive ? 'bg-blue-50/30 dark:bg-blue-900/10' : 'hover:bg-slate-50 dark:hover:bg-neutral-900/50'}`}> 
                             <td className={`p-2 text-center font-mono opacity-80 bg-white dark:bg-neutral-950 sticky left-0 z-10 border-b border-r border-slate-100 dark:border-neutral-900 ${isRowActive ? '!bg-blue-50 dark:!bg-blue-900/40 font-bold text-blue-600 dark:text-blue-400' : 'text-slate-600 dark:text-neutral-400'}`}>L{lIdx}</td> 
                             {chromaRanges.map((c, i) => ({...c, originalIndex: i})).slice(1).map(cRange => {
                                 const cIdx = cRange.originalIndex;
                                 const val = adjectiveMatrix[lIdx]?.[cIdx] || "";
                                 const count = cellCounts?.adjCounts?.[lIdx]?.[cIdx];
                                 const isCellActive = isRowActive && safeCIdx === cIdx;
                                 const isLocked = lockedCells.some(k => k.split('_')[1] == lIdx && k.split('_')[3] == cIdx);
                                 
                                 return (
                                     <td key={cIdx} onClick={() => updateColorWithHistory(lRange.mid, cRange.mid, h)} className={`p-0 relative h-12 border-b border-r border-slate-100 dark:border-neutral-900 cursor-pointer ${isCellActive ? 'ring-2 ring-inset ring-blue-500 dark:ring-blue-400 z-20 bg-blue-50/50 dark:bg-blue-900/20' : ''}`}>
                                        <div className="flex flex-col items-center justify-center h-full px-1 py-1 gap-1 relative">
                                            {isLocked && <Lock className="w-2 h-2 absolute top-1 right-1 text-slate-400" />}
                                            <input type="text" disabled={isLocked} value={val} onChange={(e) => updateAdjective(lIdx, cIdx, e.target.value)} className={`w-full text-center bg-transparent border-none outline-none font-medium text-slate-700 dark:text-neutral-200 ${isLocked ? 'opacity-40 cursor-not-allowed' : ''}`} placeholder="-" />
                                            {count !== undefined && <span className={`text-[8px] font-mono whitespace-nowrap px-1.5 py-0.5 rounded shadow-inner ${count > 0 ? 'text-slate-500 dark:text-neutral-400 bg-slate-100 dark:bg-neutral-900' : 'text-red-400 bg-red-50 dark:bg-red-900/20'}`}>
                                                {count} <span className="opacity-60">in-gamut</span>
                                            </span>}
                                        </div>
                                     </td>
                                 )
                             })}
                         </tr>
                     );
                 })} 
                 </tbody> 
                 </table> 
             </div> 
            )}
            {activeView === 'major_groups' && ( 
             <div className="h-full w-full overflow-auto rounded-xl border border-slate-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 shadow-sm transition-colors duration-300 custom-scroll flex flex-col p-4 md:p-6 gap-6 md:gap-8"> 
                 <div>
                     <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-3">Extreme Values</h3>
                     <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                         {['white', 'black', 'lightGray', 'darkGray'].map(k => {
                             const isExtActive = (k === 'white' && isWhiteActive) || (k === 'black' && isBlackActive) || (k === 'lightGray' && isLightGrayActive) || (k === 'darkGray' && isDarkGrayActive);
                             const cellData = groupBackgrounds[k];
                             return (
                                 <div key={k} className="flex flex-col gap-1">
                                     <label className="text-[9px] font-bold text-slate-500 capitalize pl-1 flex items-center justify-between">
                                        <span>{k.replace(/([A-Z])/g, ' $1').trim()} {k === 'white' ? '(L > 95, C < 10)' : k === 'black' ? '(L < 10, C < 10)' : k === 'lightGray' ? '(50 ≤ L ≤ 95, C < 10)' : '(10 ≤ L < 50, C < 10)'}</span>
                                        {cellCounts && cellCounts.groupCounts && cellCounts.groupCounts[k] !== undefined && <span className={`px-1.5 py-0.5 rounded text-[8px] font-mono ${cellCounts.groupCounts[k] > 0 ? 'bg-slate-200 dark:bg-neutral-800 text-slate-500 dark:text-neutral-400' : 'bg-red-100 text-red-500 dark:bg-red-900/30'}`}>{cellCounts.groupCounts[k]} in-gamut</span>}
                                     </label>
                                     <div className={`relative rounded-lg overflow-hidden border ${isExtActive ? 'border-blue-500 ring-2 ring-blue-500 shadow-md z-10' : 'border-slate-200 dark:border-neutral-800 shadow-sm'} transition-all duration-300`} style={{backgroundColor: cellData.bg}}>
                                         <input type="text" value={extremeGroups[k]} onChange={e => setExtremeGroups(p => ({...p, [k]: e.target.value}))} className={`w-full bg-transparent p-2.5 text-xs font-bold focus:outline-none transition-colors ${cellData.l < 50 ? 'text-white' : 'text-black'}`} style={{textShadow: cellData.l < 50 ? '0 1px 3px rgba(0,0,0,0.8)' : 'none'}}/>
                                     </div>
                                 </div>
                             )
                         })}
                     </div>
                 </div>

                 <div className="pb-8">
                     <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-3">Hue Segments (L × C)</h3>
                     <div className="border border-slate-200 dark:border-neutral-800 rounded-xl overflow-hidden shadow-sm">
                         <table className="w-full text-xs text-left table-fixed border-separate border-spacing-0">
                             <thead className="bg-slate-50 dark:bg-neutral-900/50">
                                 <tr>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 w-1/5 text-center bg-white dark:bg-neutral-950 sticky left-0 z-20">Hue Range</th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800"><div className="flex flex-col items-start">Toned Shades<span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">L&lt;50, C&lt;40</span></div></th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800"><div className="flex flex-col items-start">Vivid Shades<span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">L&lt;50, C&ge;40</span></div></th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800"><div className="flex flex-col items-start">Vivid Tints<span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">L&ge;50, C&ge;40</span></div></th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-slate-200 dark:border-neutral-800"><div className="flex flex-col items-start">Toned Tints<span className="font-normal opacity-70 text-[9px] font-mono mt-0.5">L&ge;50, C&lt;40</span></div></th>
                                 </tr>
                             </thead>
                             <tbody>
                                 {majorGroups.map((row, rIdx) => {
                                     const isRowActive = activeMajorHueIdx === rIdx && !isWhiteActive && !isBlackActive && !isLightGrayActive && !isDarkGrayActive;
                                     return (
                                         <tr key={rIdx} className={isRowActive ? 'bg-blue-50/10 dark:bg-blue-900/5' : ''} data-active={isRowActive}>
                                             <td className={`p-3 border-b border-r border-slate-100 dark:border-neutral-900 font-mono text-center text-[10px] sticky left-0 z-10 ${isRowActive ? 'font-bold text-blue-600 dark:text-blue-400 bg-white dark:bg-neutral-950' : 'text-slate-500 dark:text-neutral-500 bg-slate-50/50 dark:bg-neutral-900/30'}`}>
                                                 {HUE_RANGES_MAJOR[rIdx]}
                                             </td>
                                             {[0,1,2,3].map(cIdx => {
                                                 const isCellActive = isRowActive && activeMajorQuadIdx === cIdx;
                                                 const cellData = groupBackgrounds.quads[rIdx][cIdx];
                                                 const count = cellCounts && cellCounts.groupCounts && cellCounts.groupCounts.quads && cellCounts.groupCounts.quads[rIdx] ? cellCounts.groupCounts.quads[rIdx][cIdx] : 0;
                                                 
                                                 return (
                                                     <td key={cIdx} className={`p-0 border-b border-slate-100 dark:border-neutral-900 ${cIdx < 3 ? 'border-r' : ''}`} style={{backgroundColor: cellData.bg}}>
                                                        <div className="relative w-full h-full flex flex-col justify-center">
                                                             <input 
                                                                 type="text" 
                                                                 value={row[cIdx]} 
                                                                 onChange={(e) => updateMajorGroup(rIdx, cIdx, e.target.value)} 
                                                                 className={`w-full h-11 px-3 pb-3 pt-2 bg-transparent border-none outline-none font-medium transition-colors ${cellData.l < 50 ? 'text-white' : 'text-black'} ${isCellActive ? 'ring-2 ring-inset ring-blue-500 bg-white/20 dark:bg-black/20 font-bold' : 'hover:bg-white/10 dark:hover:bg-black/10'}`}
                                                                 style={{textShadow: cellData.l < 50 ? '0 1px 3px rgba(0,0,0,0.8)' : 'none'}}
                                                             />
                                                             {count !== undefined && <span className={`absolute bottom-1 right-2 text-[8px] font-mono font-bold pointer-events-none ${count > 0 ? (cellData.l < 50 ? 'text-white opacity-60' : 'text-black opacity-60') : 'text-red-400 opacity-100 drop-shadow-md'}`}>
                                                                 {count} in-gamut
                                                             </span>}
                                                         </div>
                                                     </td>
                                                 )
                                             })}
                                         </tr>
                                     );
                                 })}
                             </tbody>
                         </table>
                     </div>
                 </div>
             </div> 
            )} 
            {activeView === 'locked_cells' && (
             <div className="h-full w-full overflow-auto rounded-xl border border-slate-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 shadow-sm transition-colors duration-300 custom-scroll flex flex-col p-4 md:p-6">
                 <div className="flex justify-between items-center mb-4">
                     <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider flex items-center gap-2"><Lock className="w-4 h-4"/> Locked Colors</h3>
                     <span className="text-[10px] font-bold text-slate-500 bg-slate-100 dark:bg-neutral-900 px-3 py-1 rounded-full">{lockedList.length} Total</span>
                 </div>
                 {lockedList.length === 0 ? (
                     <div className="flex-1 flex flex-col items-center justify-center text-slate-400 dark:text-neutral-600 space-y-3 opacity-60">
                         <Unlock className="w-12 h-12" />
                         <p className="text-sm font-medium">No locked colors currently.</p>
                     </div>
                 ) : (
                     <div className="border border-slate-200 dark:border-neutral-800 rounded-xl overflow-hidden shadow-sm">
                         <table className="w-full text-xs text-left table-auto border-separate border-spacing-0">
                             <thead className="bg-slate-50 dark:bg-neutral-900/50">
                                 <tr>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 w-16 text-center">Color</th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800">Coordinates</th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-r border-slate-200 dark:border-neutral-800 w-[25%]">Adjective</th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-slate-200 dark:border-neutral-800 w-[35%]">Noun</th>
                                     <th className="p-3 font-bold text-slate-500 border-b border-slate-200 dark:border-neutral-800 w-16 text-center">Action</th>
                                 </tr>
                             </thead>
                             <tbody>
                                 {lockedList.map((item) => (
                                     <tr key={item.key} className="hover:bg-slate-50/50 dark:hover:bg-neutral-900/30 transition-colors">
                                         <td className="p-2 border-b border-r border-slate-100 dark:border-neutral-900 text-center">
                                             <div className="w-8 h-8 rounded-md mx-auto shadow-inner border border-black/10 dark:border-white/10" style={{backgroundColor: item.color, backgroundImage: item.isOut ? 'repeating-linear-gradient(45deg, var(--hatch-dark) 0px, var(--hatch-dark) 4px, var(--hatch-light) 4px, var(--hatch-light) 8px)' : 'none'}}></div>
                                         </td>
                                         <td className="p-3 border-b border-r border-slate-100 dark:border-neutral-900 font-mono text-[10px] text-slate-500 dark:text-neutral-400">
                                             <div className="flex gap-2 font-bold"><span className="w-6">L {Math.round(item.lVal)}</span> <span className="w-6">C {Math.round(item.cVal)}</span> <span className="w-6">H {Math.round(item.hVal)}</span></div>
                                         </td>
                                         <td className="p-3 border-b border-r border-slate-100 dark:border-neutral-900 font-bold text-slate-700 dark:text-neutral-200">
                                             {item.adj || <span className="opacity-30">-</span>}
                                         </td>
                                         <td className="p-3 border-b border-r border-slate-100 dark:border-neutral-900 font-black text-slate-800 dark:text-neutral-100">
                                             {item.noun}
                                         </td>
                                         <td className="p-2 border-b border-slate-100 dark:border-neutral-900 text-center">
                                             <button 
                                                 onClick={() => setLockedCells(prev => prev.filter(k => k !== item.key))}
                                                 className="p-1.5 rounded-md hover:bg-red-100 hover:text-red-600 dark:hover:bg-red-900/30 dark:hover:text-red-400 text-slate-400 transition-colors mx-auto flex items-center justify-center"
                                                 title="Unlock"
                                             >
                                                 <Unlock className="w-4 h-4" />
                                             </button>
                                         </td>
                                     </tr>
                                 ))}
                             </tbody>
                         </table>
                     </div>
                 )}
             </div>
            )}
        </div> 
        </div> 
    </div> 
    </div> 
    ); 
 }; 
 const root = ReactDOM.createRoot(document.getElementById('root')); 
 root.render(<ColorSAMIfier />); 
 </script> 
</body> 
</html>
